<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易日誌</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1118;--bg2:#131720;
  --card:#181d2c;--card2:#1e2438;
  --border:#252c42;--border2:#1e2438;
  --text:#f0f3fc;--text2:#8fa0c0;--text3:#506080;--text4:#2d3a55;
  --accent:#e8a228;--accent2:#f5b840;
  --green:#3ecf8e;--green2:#25b074;
  --g-bg:rgba(62,207,142,.08);--g-bd:rgba(62,207,142,.22);
  --red:#e05555;--red2:#c83333;
  --r-bg:rgba(224,85,85,.08);--r-bd:rgba(224,85,85,.22);
  --blue:#5b9bf5;--b-bg:rgba(91,155,245,.08);--b-bd:rgba(91,155,245,.22);
  --paper:#a78bfa;--p-bg:rgba(167,139,250,.08);--p-bd:rgba(167,139,250,.22);
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","PingFang TC",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;
  -webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ══ NAV ══ */
.nav{background:rgba(14,17,24,.95);border-bottom:1px solid var(--border);height:52px;
  display:flex;align-items:center;padding:0 28px;gap:14px;position:sticky;top:0;z-index:200;
  backdrop-filter:blur(16px)}
.nav-back{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--text3);
  padding:6px 12px;border:1px solid var(--border);border-radius:7px;transition:all .15s;white-space:nowrap}
.nav-back:hover{color:var(--text);border-color:var(--text3)}
.nav-title{font-size:.95rem;font-weight:700;color:var(--text)}
.nav-sync{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text3);margin-left:auto}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.img-loading{display:flex;align-items:center;gap:8px;padding:10px 0;color:var(--text2);font-size:.8rem}
.img-loading::before{content:'';width:14px;height:14px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.nav-pill{background:var(--b-bg);border:1px solid var(--b-bd);color:var(--blue);
  font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;display:none}

/* ══ DASHBOARD ══ */
.dash{max-width:1080px;margin:0 auto;padding:28px 28px 0}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:22px 22px 18px;position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s;cursor:default}
.kpi:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.08)}
.kpi-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);
  font-weight:600;margin-bottom:10px}
.kpi-val{font-size:2.6rem;font-weight:900;line-height:1;letter-spacing:-.04em;color:#fff;margin-bottom:6px}
.kpi-sub{font-size:.73rem;color:var(--text4)}
.kpi-accent{position:absolute;bottom:0;left:0;height:3px}
.kpi.k-total .kpi-accent{background:linear-gradient(90deg,var(--accent),var(--accent2));width:100%}
.kpi.k-rate  .kpi-accent{background:linear-gradient(90deg,var(--green),var(--green2))}
.kpi.k-pnl  .kpi-accent{background:linear-gradient(90deg,var(--paper),var(--blue));width:65%}
.kpi.k-open .kpi-accent{background:linear-gradient(90deg,var(--blue),#82b8ff);width:45%}
.kpi-val.pos{color:var(--green)}.kpi-val.neg{color:var(--red)}.kpi-val.neu{color:var(--text3)}
.kpi-val.bull{color:var(--red)}.kpi-val.bear{color:var(--green)}
.kpi-val.g{color:var(--accent2)}.kpi-val.b{color:var(--blue)}

.wr-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.wr-fill{height:100%;border-radius:3px;transition:width .9s ease;width:0}

/* secondary */
.sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.sec-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px}
.sec-val{font-size:1.6rem;font-weight:800;letter-spacing:-.025em;line-height:1;color:#fff}
.sec-val.pos{color:var(--green)}.sec-val.neg{color:var(--red)}.sec-val.pu{color:var(--paper)}
.sec-val.bull{color:var(--red)}.sec-val.bear{color:var(--green)}
.sec-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-top:5px}

/* chart */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;margin-bottom:20px;display:none}
.chart-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.chart-ttl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2)}
.chart-badge{font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:700}
.chart-badge.pos{background:var(--g-bg);color:var(--green);border:1px solid var(--g-bd)}
.chart-badge.neg{background:var(--r-bg);color:var(--red);border:1px solid var(--r-bd)}
.chart-badge.bull{background:var(--r-bg);color:var(--red);border:1px solid var(--r-bd)}
.chart-badge.bear{background:var(--g-bg);color:var(--green);border:1px solid var(--g-bd)}
.chart-badge.neu{background:rgba(255,255,255,.05);color:var(--text3)}
canvas{display:block;width:100%}

/* ══ FILTER BAR ══ */
.fbar{max-width:1080px;margin:0 auto;padding:0 28px;margin-bottom:12px}
.fbar-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 0;
  border-bottom:1px solid var(--border)}
.fbar-row:last-child{border-bottom:none;padding-top:8px;padding-bottom:0}
.date-custom-wrap{display:none;align-items:center;gap:6px;flex-wrap:wrap}
.date-custom-wrap.show{display:flex}
.date-custom-wrap input[type=date]{background:var(--card2);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px;color:var(--text);font-size:.78rem;outline:none;
  transition:border-color .14s;cursor:pointer}
.date-custom-wrap input[type=date]:focus{border-color:rgba(232,162,40,.55)}
.date-custom-wrap input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}
.date-sep{font-size:.8rem;color:var(--text4)}
.fbar-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text4);white-space:nowrap;min-width:32px}
.fpill{background:none;border:1px solid var(--border);color:var(--text3);
  padding:5px 14px;border-radius:8px;font-size:.76rem;cursor:pointer;
  transition:all .14s;font-weight:500;white-space:nowrap}
.fpill:hover{border-color:var(--text2);color:var(--text2)}
.fpill.on{background:rgba(232,162,40,.1);border-color:rgba(232,162,40,.4);
  color:var(--accent2);font-weight:700}

/* ══ TOOLBAR ══ */
.tbar{max-width:1080px;margin:0 auto;padding:0 28px 12px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-add{background:var(--accent);color:#000;font-weight:800;border:none;
  border-radius:10px;padding:10px 24px;font-size:.88rem;cursor:pointer;
  letter-spacing:.01em;box-shadow:0 3px 12px rgba(232,162,40,.3);transition:all .16s;white-space:nowrap}
.btn-add:hover{background:var(--accent2);box-shadow:0 5px 18px rgba(232,162,40,.45);transform:translateY(-1px)}
.btn-add:active{transform:translateY(0)}
.tcount{font-size:.75rem;color:var(--text4);margin-left:auto}

/* ══ LIST ══ */
.lst{max-width:1080px;margin:0 auto;padding:0 28px 80px}
.empty{text-align:center;padding:70px 20px}
.empty h3{font-size:1rem;color:var(--text2);margin-bottom:6px}
.empty p{font-size:.82rem;color:var(--text3);line-height:1.8}
.loading{text-align:center;padding:60px;color:var(--text3)}

/* ══ TRADE CARD ══ */
.tc{background:var(--card);border:1px solid var(--border);border-radius:14px;
  margin-bottom:10px;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.tc:hover{border-color:rgba(255,255,255,.09);box-shadow:0 4px 20px rgba(0,0,0,.35)}
.tc.win {border-left:4px solid var(--green)}
.tc.loss{border-left:4px solid var(--red)}
.tc.open{border-left:4px solid var(--blue)}

/* card header */
.tch{padding:16px 20px;display:grid;grid-template-columns:44px 1fr auto;
  gap:14px;align-items:center;cursor:pointer;user-select:none}
.tcav{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;letter-spacing:.01em}
.tc.win  .tcav{background:var(--g-bg);color:var(--green);border:1px solid var(--g-bd)}
.tc.loss .tcav{background:var(--r-bg);color:var(--red);border:1px solid var(--r-bd)}
.tc.open .tcav{background:var(--b-bg);color:var(--blue);border:1px solid var(--b-bd)}

.tcm{min-width:0}
.tcm-top{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.tc-ticker{font-size:1rem;font-weight:800}
.tc-name{font-size:.78rem;color:var(--text3)}
.tc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.tc-mtag{font-size:.63rem;padding:2px 7px;border-radius:5px;
  background:var(--b-bg);color:var(--blue);font-weight:600}
.tc-date{font-size:.7rem;color:var(--text4);margin-top:3px}

.tcr{text-align:right;flex-shrink:0}
.tc-pnl{font-size:1.4rem;font-weight:900;letter-spacing:-.025em;line-height:1;margin-bottom:5px}
.tc-pnl.pos{color:var(--green)}.tc-pnl.neg{color:var(--red)}.tc-pnl.neu{color:var(--text3)}
.tc-pnl.bull{color:var(--red)}.tc-pnl.bear{color:var(--green)}
.tc-badges{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.badge{font-size:.63rem;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.04em;white-space:nowrap}
.bw{background:var(--g-bg);color:var(--green);border:1px solid var(--g-bd)}
.bl{background:var(--r-bg);color:var(--red);border:1px solid var(--r-bd)}
.bo{background:var(--b-bg);color:var(--blue);border:1px solid var(--b-bd)}
.bp{background:var(--p-bg);color:var(--paper);border:1px solid var(--p-bd)}
.ba{background:rgba(232,162,40,.08);color:var(--accent2);border:1px solid rgba(232,162,40,.22)}

/* card body */
.tcb{display:none;border-top:1px solid var(--border2)}
.tcb.open{display:block}

.tc-prices{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  border-bottom:1px solid var(--border2)}
.pf{padding:13px 16px;border-right:1px solid var(--border2)}
.pf:last-child{border-right:none}
.pf label{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text2);margin-bottom:4px;font-weight:600}
.pf .pv{font-size:.95rem;font-weight:700;color:#fff}
.pf .pv.pos{color:var(--green)}.pf .pv.neg{color:var(--red)}.pf .pv.acc{color:var(--accent2)}
.pf .pv.bull{color:var(--red)}.pf .pv.bear{color:var(--green)}

.tc-notes{padding:16px;border-bottom:1px solid var(--border2);display:grid;gap:12px}
.nc-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);
  font-weight:600;margin-bottom:4px}
.nc-txt{font-size:.84rem;color:var(--text2);line-height:1.75;white-space:pre-wrap}
.tag-row{display:flex;flex-wrap:wrap;gap:5px}
.rtag{font-size:.7rem;padding:3px 9px;border-radius:6px;font-weight:600}
.rtag.r{background:var(--b-bg);color:var(--blue);border:1px solid var(--b-bd)}
.rtag.m{background:var(--r-bg);color:var(--red);border:1px solid var(--r-bd)}
.rtag.kred{background:var(--r-bg);color:var(--red);border:1px solid var(--r-bd)}
.rtag.kgrn{background:var(--g-bg);color:var(--green);border:1px solid var(--g-bd)}

.tc-foot{padding:10px 16px;display:flex;gap:7px;justify-content:flex-end}
.btn-sm{background:none;border:1px solid var(--border);color:var(--text3);
  padding:6px 14px;border-radius:7px;font-size:.76rem;cursor:pointer;transition:all .14s;font-weight:500}
.btn-sm:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
.btn-sm.c{background:var(--g-bg);border-color:var(--g-bd);color:var(--green)}
.btn-sm.c:hover{background:rgba(62,207,142,.14)}
.btn-sm.d:hover{border-color:var(--r-bd);color:var(--red)}

/* ══ MODALS ══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;
  display:none;align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(8px)}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;
  width:100%;max-width:600px;margin:auto;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.mhd{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border2)}
.mhd h2{font-size:.95rem;font-weight:700}
.mx{background:rgba(255,255,255,.05);border:none;color:var(--text3);cursor:pointer;
  width:28px;height:28px;border-radius:7px;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;transition:all .14s}
.mx:hover{background:rgba(255,255,255,.1);color:var(--text)}
.mbody{padding:20px 24px 24px}

/* type toggle */
.type-toggle{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;margin-bottom:14px}
.ttp{flex:1;border:none;padding:10px;font-size:.84rem;font-weight:600;cursor:pointer;
  background:none;color:var(--text2);transition:all .15s}
.ttp.on{background:var(--accent);color:#000;font-weight:800}
.ttp:first-child.on{background:var(--accent)}
.ttp:last-child.on{background:var(--paper);color:#fff}

.fg{margin-bottom:12px}
.fg label{display:block;font-size:.7rem;font-weight:600;color:var(--text2);
  margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.fg input,.fg textarea{width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:9px;padding:10px 14px;color:var(--text);font-size:.92rem;outline:none;
  transition:border-color .14s}
.fg input:focus,.fg textarea:focus{
  border-color:rgba(232,162,40,.55);box-shadow:0 0 0 3px rgba(232,162,40,.08)}
.fg textarea{resize:vertical;min-height:72px;line-height:1.6}
.fg input::placeholder,.fg textarea::placeholder{color:var(--text4)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fdiv{border:none;border-top:1px solid var(--border2);margin:16px 0}
.fsec{font-size:.65rem;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}

.tpk{display:flex;flex-wrap:wrap;gap:5px}
.topt{background:var(--card2);border:1px solid var(--border);color:var(--text);
  padding:5px 11px;border-radius:7px;font-size:.74rem;cursor:pointer;
  transition:all .14s;user-select:none;font-weight:500}
.topt:hover{border-color:var(--text2);color:var(--text)}
.topt.sel{background:var(--b-bg);border-color:var(--b-bd);color:var(--blue);font-weight:700}
.topt.sel.err{background:var(--r-bg);border-color:var(--r-bd);color:var(--red)}
.topt.sel-r{background:rgba(224,85,85,.28);border-color:var(--red);color:var(--red);font-weight:700}
.topt.sel-g{background:rgba(62,207,142,.22);border-color:var(--green);color:var(--green);font-weight:700}

.btn-sub{width:100%;background:var(--accent);color:#000;font-weight:800;border:none;
  border-radius:10px;padding:12px;font-size:.92rem;cursor:pointer;margin-top:16px;
  letter-spacing:.01em;box-shadow:0 3px 12px rgba(232,162,40,.3);transition:all .16s}
.btn-sub:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 5px 18px rgba(232,162,40,.45)}
.btn-sub:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ══ IMAGE UPLOAD ══ */
.img-up-lbl{display:inline-flex;align-items:center;gap:7px;background:var(--card2);
  border:1px dashed var(--border);border-radius:9px;padding:9px 16px;
  color:var(--text2);cursor:pointer;font-size:.82rem;transition:all .15s;margin-top:6px}
.img-up-lbl:hover{border-color:var(--accent);color:var(--accent)}
.img-prev-wrap{position:relative;display:inline-block;margin-top:8px;width:100%}
.img-prev{max-width:100%;max-height:220px;object-fit:contain;display:block;
  border-radius:9px;border:1px solid var(--border)}
.img-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.75);border:none;
  color:#fff;border-radius:6px;padding:3px 9px;cursor:pointer;font-size:.72rem;transition:background .14s}
.img-del:hover{background:var(--red)}
.card-img{max-width:100%;border-radius:9px;border:1px solid var(--border);
  display:block;cursor:zoom-in;transition:opacity .15s}
.card-img:hover{opacity:.85}
.img-zoom-ov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;
  display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:16px}
.img-zoom-ov img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain}

/* ══ RESPONSIVE ══ */
@media(max-width:860px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .sec-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .dash,.fbar,.tbar,.lst{padding-left:14px;padding-right:14px}
  .nav{padding:0 14px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
  .kpi-val{font-size:2rem}
  .sec-grid{grid-template-columns:1fr;gap:8px}
  .frow{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-back" href="index.html">← 股學筆記</a>
  <span class="nav-title">交易日誌</span>
  <div class="nav-sync">
    <div class="sync-dot"></div>
    <span>即時同步</span>
  </div>
  <span class="nav-pill" id="navPill"></span>
</nav>

<!-- DASHBOARD -->
<div class="dash">
  <div class="kpi-grid">
    <div class="kpi k-total">
      <div class="kpi-lbl">總交易筆數</div>
      <div class="kpi-val g" id="kTotal">—</div>
      <div class="kpi-sub" id="kSub1">—</div>
      <div class="kpi-accent"></div>
    </div>
    <div class="kpi k-rate">
      <div class="kpi-lbl">勝率</div>
      <div class="kpi-val" id="kWR">—</div>
      <div class="wr-track"><div class="wr-fill" id="wrFill"></div></div>
      <div class="kpi-accent"></div>
    </div>
    <div class="kpi k-pnl">
      <div class="kpi-lbl">累積盈虧</div>
      <div class="kpi-val" id="kPnl">—</div>
      <div class="kpi-sub" id="kSub3">—</div>
      <div class="kpi-accent"></div>
    </div>
    <div class="kpi k-open">
      <div class="kpi-lbl">持倉中</div>
      <div class="kpi-val b" id="kOpen">—</div>
      <div class="kpi-sub" id="kSub4">—</div>
      <div class="kpi-accent"></div>
    </div>
  </div>
  <div class="sec-grid">
    <div class="sec-card">
      <div class="sec-val bull" id="sAvgW">—</div>
      <div class="sec-lbl">平均獲利幅度</div>
    </div>
    <div class="sec-card">
      <div class="sec-val bear" id="sAvgL">—</div>
      <div class="sec-lbl">平均虧損幅度</div>
    </div>
    <div class="sec-card">
      <div class="sec-val pu" id="sPF">—</div>
      <div class="sec-lbl">獲利因子（盈虧比）</div>
    </div>
  </div>
  <div class="chart-wrap" id="chartWrap">
    <div class="chart-hd">
      <span class="chart-ttl">資產曲線</span>

/* ── image helpers ── */
async function compressImg(file){
  return new Promise(res=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      const s=Math.min(1,900/img.width);
      const cv=document.createElement('canvas');
      cv.width=img.width*s; cv.height=img.height*s;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(b=>{URL.revokeObjectURL(url);res(b);},'image/jpeg',.70);
    };
    img.src=url;
  });
}
async function uploadImg(blob, name){
  const r=sRef(storage,`trades/${name}_${Date.now()}`);
  await uploadBytes(r,blob);
  return getDownloadURL(r);
}
window.prevImg=async(input,prevId,type)=>{

/* ── load ── */
async function load(){

/* ── filter helpers ── */
function inDate(dateStr){
  if(curDate==='all'||!dateStr) return true;
  const d=new Date(dateStr), now=new Date(); now.setHours(23,59,59,999);
  if(curDate==='week'){
    const dow=now.getDay()===0?6:now.getDay()-1;
    const mon=new Date(now); mon.setDate(now.getDate()-dow); mon.setHours(0,0,0,0);
    return d>=mon;
  }
  if(curDate==='month') return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  if(curDate==='quarter'){
    const q=Math.floor(now.getMonth()/3);
    return d.getFullYear()===now.getFullYear()&&Math.floor(d.getMonth()/3)===q;
  }
  if(curDate==='year') return d.getFullYear()===now.getFullYear();
  if(curDate==='custom'){
    if(customFrom){const f=new Date(customFrom);f.setHours(0,0,0,0);if(d<f)return false;}
    if(customTo){const t=new Date(customTo);t.setHours(23,59,59,999);if(d>t)return false;}
    return true;
  }
  return true;
}
window.applyCustomDate=()=>{
  customFrom=document.getElementById('dateFrom').value;
  customTo=document.getElementById('dateTo').value;
  renderAll();
};
function typeOf(t){ return t.type||'actual'; }
function getFiltered(){
  return trades.filter(t=>{
    const tyOk=curType==='all'||typeOf(t)===curType;
    const stOk=curStat==='all'||t.status===curStat;
    const dtOk=inDate(t.entryDate);
    return tyOk&&stOk&&dtOk;
  });
}

/* ── stats ── */
function pct(t){ return t.exitPrice&&t.entryPrice?(t.exitPrice-t.entryPrice)/t.entryPrice*100:0; }
function avg(arr){ return arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:null; }

function renderAll(){
  const all  = getFiltered();
  const closed= all.filter(t=>t.status!=='open');
  const wins  = closed.filter(t=>t.status==='win');
  const losses= closed.filter(t=>t.status==='loss');
  const openN = all.filter(t=>t.status==='open').length;
  const wr    = closed.length?wins.length/closed.length*100:null;
  const avgW  = avg(wins.map(pct));
  const avgL  = avg(losses.map(pct));
  const pf    = avgW!=null&&avgL!=null&&avgL!==0?Math.abs(avgW/avgL):null;
  const netPnl= closed.reduce((s,t)=>s+pct(t),0);

  /* KPI */
  tx('kTotal', all.length||'0');
  tx('kSub1', `${closed.length} 筆已結單`);
  const wrEl=document.getElementById('wrFill');
  if(wr!=null){
    document.getElementById('kWR').textContent=wr.toFixed(1)+'%';
    document.getElementById('kWR').className='kpi-val neg';
    wrEl.style.width=wr+'%';
    wrEl.style.background='linear-gradient(90deg,var(--red),var(--red2))';
  }else{document.getElementById('kWR').textContent='—';document.getElementById('kWR').className='kpi-val neu';}
  document.getElementById('kPnl').textContent=netPnl?((netPnl>0?'+':'')+netPnl.toFixed(2)+'%'):'—';
  document.getElementById('kPnl').className='kpi-val '+(netPnl>0?'bull':netPnl<0?'bear':'neu');
  tx('kSub3', `${wins.length} 勝 / ${losses.length} 敗`);
  tx('kOpen', openN||'0');
  tx('kSub4', openN>0?'筆部位未平倉':'目前無持倉');

  /* sec */
  document.getElementById('sAvgW').textContent=avgW!=null?'+'+avgW.toFixed(2)+'%':'—';
  document.getElementById('sAvgL').textContent=avgL!=null?avgL.toFixed(2)+'%':'—';
  const pfEl=document.getElementById('sPF');
  pfEl.textContent=pf!=null?pf.toFixed(2)+'x':'—';
  pfEl.className='sec-val '+(pf!=null?'pos':'');

  /* nav pill */
  const allOpen=trades.filter(t=>t.status==='open').length;
  const pill=document.getElementById('navPill');
  if(allOpen>0){pill.textContent=`${allOpen} 筆持倉中`;pill.style.display='';}
  else pill.style.display='none';

  drawChart(closed);
  renderList(all);
}

function tx(id,val){const el=document.getElementById(id);if(el)el.textContent=val;}

/* ── chart ── */
function drawChart(closed){
  const wrap=document.getElementById('chartWrap');
  if(closed.length<2){wrap.style.display='none';return;}
  wrap.style.display='block';
  const sorted=[...closed].sort((a,b)=>(a.exitDate||'')<(b.exitDate||'')?-1:1);
  let cum=0, pts=[0];
  sorted.forEach(t=>{cum+=pct(t);pts.push(+cum.toFixed(4));});
  const last=pts[pts.length-1];
  const badge=document.getElementById('chartBadge');
  badge.textContent=(last>=0?'+':'')+last.toFixed(2)+'%';
  badge.className='chart-badge '+(last>0?'bull':last<0?'bear':'neu');
  document.getElementById('chartRange').textContent=`${sorted[0].exitDate||''}  →  ${sorted[sorted.length-1].exitDate||''}`;

  const cv=document.getElementById('eqCanvas');
  const dpr=window.devicePixelRatio||1;
  const W=cv.parentElement.clientWidth-40, H=160;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const p={t:10,b:28,l:48,r:12};
  const cW=W-p.l-p.r, cH=H-p.t-p.b;
  const minY=Math.min(0,...pts), maxY=Math.max(0,...pts), rY=maxY-minY||1;
  const tx2=i=>p.l+i/(pts.length-1)*cW;
  const ty=v=>p.t+(1-(v-minY)/rY)*cH;
  ctx.clearRect(0,0,W,H);

  /* grid */
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  for(let f=0;f<=4;f++){const y=p.t+f/4*cH;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cW,y);ctx.stroke();}

  /* zero line */
  const zy=ty(0);
  ctx.strokeStyle='rgba(255,255,255,.14)';ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(p.l,zy);ctx.lineTo(p.l+cW,zy);ctx.stroke();
  ctx.setLineDash([]);

  /* fill */
  const grd=ctx.createLinearGradient(0,p.t,0,p.t+cH);
  if(last>=0){grd.addColorStop(0,'rgba(62,207,142,.28)');grd.addColorStop(1,'rgba(62,207,142,.02)');}
  else       {grd.addColorStop(0,'rgba(224,85,85,.02)');grd.addColorStop(1,'rgba(224,85,85,.28)');}
  ctx.beginPath();ctx.moveTo(tx2(0),zy);
  pts.forEach((v,i)=>ctx.lineTo(tx2(i),ty(v)));
  ctx.lineTo(tx2(pts.length-1),zy);ctx.closePath();
  ctx.fillStyle=grd;ctx.fill();

  /* line */
  ctx.beginPath();
  pts.forEach((v,i)=>i===0?ctx.moveTo(tx2(i),ty(v)):ctx.lineTo(tx2(i),ty(v)));
  ctx.strokeStyle=last>=0?'var(--green)':'var(--red)';
  ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();

  /* dots */
  pts.forEach((v,i)=>{
    ctx.beginPath();ctx.arc(tx2(i),ty(v),i===0||i===pts.length-1?4:2.5,0,Math.PI*2);
    ctx.fillStyle=v>0?'var(--green)':v<0?'var(--red)':'rgba(255,255,255,.4)';
    ctx.strokeStyle='var(--bg2)';ctx.lineWidth=1.5;ctx.fill();ctx.stroke();
  });

  /* labels Y */
  ctx.fillStyle='var(--text4)';ctx.font=`11px system-ui`;ctx.textAlign='right';
  [minY,0,maxY].forEach(v=>ctx.fillText((v>=0?'+':'')+v.toFixed(1)+'%',p.l-5,ty(v)+4));
  /* labels X */
  ctx.textAlign='center';ctx.fillStyle='var(--text4)';
  const step=Math.max(1,Math.floor(sorted.length/6));
  sorted.forEach((t,i)=>{if(i%step===0||i===sorted.length-1) ctx.fillText(t.ticker||'',tx2(i+1),H-8);});
}

/* ── list ── */
function renderList(filtered){
  const el=document.getElementById('list');
  document.getElementById('tcount').textContent=filtered.length?`顯示 ${filtered.length} 筆`:'';
  if(!filtered.length){
    el.innerHTML=`<div class="empty">
      <h3>沒有符合的交易記錄</h3>
      <p>嘗試更改篩選條件，或點「新增交易」加入第一筆記錄</p>
    </div>`;return;
  }
  el.innerHTML=filtered.map(cardHtml).join('');
}

function cardHtml(t){
  const p2=pct(t);
  const pStr=t.status!=='open'?(p2>=0?'+':'')+p2.toFixed(2)+'%':'持倉中';
  const pCls=p2>0?'bull':p2<0?'bear':'neu';
  const rV=t.exitPrice&&t.entryPrice&&t.stopLoss&&(t.entryPrice-t.stopLoss)!==0
    ?((t.exitPrice-t.entryPrice)/(t.entryPrice-t.stopLoss)).toFixed(2)+'R':'';
  const days=t.entryDate&&t.exitDate
    ?Math.round((new Date(t.exitDate)-new Date(t.entryDate))/86400000)+'天':null;
  const av=(t.ticker||'?').slice(0,4);
  const dStr=t.exitDate?`${t.entryDate} → ${t.exitDate}${days?' ('+days+')':''}`
             :t.entryDate?`進場 ${t.entryDate}`:'—';
  const typ=typeOf(t);
  const statBadge=t.status==='win'?`<span class="badge bw">獲利</span>`
                 :t.status==='loss'?`<span class="badge bl">虧損</span>`
                 :`<span class="badge bo">持倉中</span>`;
  const typBadge=typ==='paper'?`<span class="badge bp">預估盤</span>`
                              :`<span class="badge ba">實際交易</span>`;
  const firstR=t.reasons?.length
    ?t.reasons.map(r=>`<span class="tc-mtag">${esc(r)}</span>`).join(''):'';

  const priceBlk=`<div class="tc-prices">
    <div class="pf"><label>進場價</label><span class="pv acc">${t.entryPrice||'—'}</span></div>
    ${t.stopLoss?`<div class="pf"><label>停損</label><span class="pv neg">${t.stopLoss}</span></div>`:''}
    ${t.target  ?`<div class="pf"><label>目標</label><span class="pv pos">${t.target}</span></div>`:''}
    ${t.exitPrice?`<div class="pf"><label>出場價</label><span class="pv ${p2>=0?'bull':'bear'}">${t.exitPrice}</span></div>`:''}
    ${rV?`<div class="pf"><label>R 值</label><span class="pv ${p2>=0?'bull':'bear'}">${rV}</span></div>`:''}
    ${days?`<div class="pf"><label>持有</label><span class="pv">${days}</span></div>`:''}
  </div>`;

  const hasN=t.reasons?.length||t.entryKbar?.length||t.entryNote||t.exitKbar?.length||t.mistakes?.length||t.reviewNote;
  const notes=hasN?`<div class="tc-notes">
    ${t.entryKbar?.length?`<div><div class="nc-lbl">進場 K棒型態</div><div class="tag-row">${t.entryKbar.map(k=>{const[n,c]=k.split(':');return`<span class="rtag ${c==='red'?'kred':c==='green'?'kgrn':'r'}">${esc(n)}</span>`;}).join('')}</div></div>`:''}
    ${t.reasons?.length?`<div><div class="nc-lbl">進場原因</div><div class="tag-row">${t.reasons.map(r=>`<span class="rtag r">${esc(r)}</span>`).join('')}</div></div>`:''}
    ${t.entryNote?`<div><div class="nc-lbl">進場想法</div><p class="nc-txt">${esc(t.entryNote)}</p></div>`:''}
    ${t.exitKbar?.length?`<div><div class="nc-lbl">出場 K棒型態</div><div class="tag-row">${t.exitKbar.map(k=>{const[n,c]=k.split(':');return`<span class="rtag ${c==='red'?'kred':c==='green'?'kgrn':'m'}">${esc(n)}</span>`;}).join('')}</div></div>`:''}
    ${t.mistakes?.length?`<div><div class="nc-lbl">犯的錯誤</div><div class="tag-row">${t.mistakes.map(m=>`<span class="rtag m">${esc(m)}</span>`).join('')}</div></div>`:''}
    ${t.reviewNote?`<div><div class="nc-lbl">收盤後檢討</div><p class="nc-txt">${esc(t.reviewNote)}</p></div>`:''}
    ${t.entryImgUrl?`<div><div class="nc-lbl">進場當日K線圖</div><img src="${t.entryImgUrl}" class="card-img" onclick="zoomImg(this)"></div>`:''}
    ${t.exitImgUrl?`<div><div class="nc-lbl">出場當日K線圖</div><img src="${t.exitImgUrl}" class="card-img" onclick="zoomImg(this)"></div>`:''}
  </div>`:'';

  return `<div class="tc ${t.status||'open'}" id="tc-${t.id}">
  <div class="tch" onclick="tog('${t.id}')">
    <div class="tcav">${esc(av)}</div>
    <div class="tcm">
      <div class="tcm-top"><span class="tc-ticker">${esc(t.ticker)}</span><span class="tc-name">${esc(t.name||'')}</span></div>
      <div class="tc-tags">${firstR}</div>
      <div class="tc-date">${dStr}</div>
    </div>
    <div class="tcr">
      <div class="tc-pnl ${pCls}">${pStr}</div>
      <div class="tc-badges">${statBadge}${typBadge}${rV?`<span class="badge" style="color:var(--text4);border-color:var(--border)">${rV}</span>`:''}</div>
    </div>
  </div>
  <div class="tcb" id="b-${t.id}">
    ${priceBlk}${notes}
    <div class="tc-foot">
      ${t.status==='open'?`<button class="btn-sm c" onclick="openClose('${t.id}')">結單</button>`:''}
      <button class="btn-sm" onclick="openEdit('${t.id}')">編輯</button>
      <button class="btn-sm d" onclick="del('${t.id}')">刪除</button>
    </div>
  </div>
</div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

/* ── filter handlers ── */
window.setType=(v,btn)=>{curType=v;setPills('ftype',btn);renderAll();};
window.setStat=(v,btn)=>{curStat=v;setPills('fstat',btn);renderAll();};
window.setDate=(v,btn)=>{curDate=v;setPills('fdate',btn);renderAll();};

// Track filter groups by onclick pattern
window.setType=(v,btn)=>{
  curType=v;
  document.querySelectorAll('[onclick^="setType"]').forEach(b=>b.classList.toggle('on',b===btn));
  renderAll();
};
window.setStat=(v,btn)=>{
  curStat=v;
  document.querySelectorAll('[onclick^="setStat"]').forEach(b=>b.classList.toggle('on',b===btn));
  renderAll();
};
window.setDate=(v,btn)=>{
  curDate=v;
  document.querySelectorAll('[onclick^="setDate"]').forEach(b=>b.classList.toggle('on',b===btn));
  const wrap=document.getElementById('customDateWrap');
  if(wrap) wrap.classList.toggle('show',v==='custom');
  if(v!=='custom'){customFrom='';customTo='';}
  renderAll();
};

/* ── CRUD ── */
window.save=async()=>{
  const t=v('fT'),ep=parseFloat(v('fEP'));
  if(!t||!ep){alert('請填寫股票代號和進場價格');return;}
  const xp=parseFloat(v('fXP'))||null;
  const status=xp?(xp>ep?'win':'loss'):'open';
  const data={ticker:t.toUpperCase(),name:v('fN'),type:curTT,entryDate:v('fED'),
    entryPrice:ep,stopLoss:parseFloat(v('fSL'))||null,target:parseFloat(v('fTP'))||null,
    exitDate:v('fXD')||null,exitPrice:xp,status,reasons:[...selR],mistakes:[...selM],
    entryKbar:[...selEK],exitKbar:[...selXK],
    entryNote:v('fEN'),reviewNote:v('fRV'),createdAt:Timestamp.now()};
  const b=document.getElementById('btnSv');b.disabled=true;b.textContent='儲存中…';
  try{
    let eUrl=existingEUrl, xUrl=existingXUrl;
    if(entryImgFile){b.textContent='上傳進場圖…';eUrl=await uploadImg(entryImgFile,`${t}_entry`);}
    if(exitImgFile) {b.textContent='上傳出場圖…';xUrl=await uploadImg(exitImgFile,`${t}_exit`);}
    if(eUrl!=null) data.entryImgUrl=eUrl;
    if(xUrl!=null) data.exitImgUrl=xUrl;
    b.textContent='寫入資料…';
    if(editId) await updateDoc(doc(db,COL,editId),data);
    else       await addDoc(collection(db,COL),data);
    closeAdd();await load();
  }catch(e){alert('儲存失敗：'+e.message);}
  finally{b.disabled=false;b.textContent='儲存交易記錄';}
};

window.saveClose=async()=>{
  const xp=parseFloat(document.getElementById('cXP').value);
  if(!xp){alert('請填寫出場價格');return;}
  const t2=trades.find(x=>x.id===closeId);if(!t2) return;
  const status=xp>t2.entryPrice?'win':'loss';
  try{
    await updateDoc(doc(db,COL,closeId),{
      exitDate:document.getElementById('cXD').value,exitPrice:xp,status,
      mistakes:[...cSelM],reviewNote:document.getElementById('cRV').value
    });
    closeOv();await load();
  }catch(e){alert('儲存失敗：'+e.message);}
};

window.del=async id=>{
  if(!confirm('確定刪除這筆交易記錄？'))return;
  try{await deleteDoc(doc(db,COL,id));await load();}catch(e){alert('刪除失敗');}
};

/* ── modal helpers ── */
window.tog     =id=>document.getElementById('b-'+id)?.classList.toggle('open');
window.bgC     =(e,id)=>{if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('open');};
window.closeOv =()=>document.getElementById('closeOv').classList.remove('open');
window.closeAdd=()=>document.getElementById('addOv').classList.remove('open');
const v  =id=>document.getElementById(id)?.value||'';
const sv =id=>val=>{const el=document.getElementById(id);if(el&&val!=null)el.value=val;};

window.setTT=type=>{
  curTT=type;
  document.getElementById('ttpA').classList.toggle('on',type==='actual');
  document.getElementById('ttpP').classList.toggle('on',type==='paper');
};

function buildPk(cid,opts,arr,isErr){
  const el=document.getElementById(cid);if(!el)return;el.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.type='button';
    b.className='topt'+(isErr?' err':'')+(arr.includes(o)?' sel':'');b.textContent=o;
    b.onclick=()=>{const i=arr.indexOf(o);i===-1?arr.push(o):arr.splice(i,1);b.classList.toggle('sel',arr.includes(o));};
    el.appendChild(b);
  });
}
function buildKPk(cid,arr){
  const el=document.getElementById(cid);if(!el)return;el.innerHTML='';
  KBARS.forEach(o=>{
    const b=document.createElement('button');b.type='button';
    const ir=arr.indexOf(o+':red'),ig=arr.indexOf(o+':green');
    b.className='topt'+(ir!==-1?' sel-r':ig!==-1?' sel-g':'');
    b.textContent=o;
    b.onclick=()=>{
      const ir2=arr.indexOf(o+':red'),ig2=arr.indexOf(o+':green');
      if(ir2!==-1){arr.splice(ir2,1);arr.push(o+':green');b.className='topt sel-g';}
      else if(ig2!==-1){arr.splice(ig2,1);b.className='topt';}
      else{arr.push(o+':red');b.className='topt sel-r';}
    };
    el.appendChild(b);
  });
}

window.openAdd=()=>{
  editId=null;selR=[];selM=[];selEK=[];selXK=[];curTT='actual';
  entryImgFile=null;exitImgFile=null;existingEUrl=null;existingXUrl=null;
  document.getElementById('mTitle').textContent='新增交易';
  ['fT','fN','fEP','fSL','fTP','fXD','fXP','fEN','fRV'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('ePrev').innerHTML='';document.getElementById('xPrev').innerHTML='';
  document.getElementById('fEImg').value='';document.getElementById('fXImg').value='';
  document.getElementById('fED').value=new Date().toISOString().split('T')[0];
  setTT('actual');
  buildKPk('ekPk',selEK);buildPk('rPk',REASONS,selR,false);
  buildKPk('xkPk',selXK);buildPk('mPk',MISTAKES,selM,true);
  document.getElementById('addOv').classList.add('open');
};

window.openEdit=id=>{
  const t=trades.find(x=>x.id===id);if(!t)return;
  editId=id;selR=[...(t.reasons||[])];selM=[...(t.mistakes||[])];
  selEK=[...(t.entryKbar||[])];selXK=[...(t.exitKbar||[])];
  entryImgFile=null;exitImgFile=null;
  existingEUrl=t.entryImgUrl||null;existingXUrl=t.exitImgUrl||null;
  curTT=t.type||'actual';
  document.getElementById('mTitle').textContent='編輯交易';
  const fields={fT:t.ticker,fN:t.name,fED:t.entryDate,fEP:t.entryPrice,
    fSL:t.stopLoss,fTP:t.target,fXD:t.exitDate,fXP:t.exitPrice,fEN:t.entryNote,fRV:t.reviewNote};
  Object.entries(fields).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.value=val??'';});
  setTT(curTT);
  buildKPk('ekPk',selEK);buildPk('rPk',REASONS,selR,false);
  buildKPk('xkPk',selXK);buildPk('mPk',MISTAKES,selM,true);
  document.getElementById('fEImg').value='';document.getElementById('fXImg').value='';
  const ep2=document.getElementById('ePrev'),xp2=document.getElementById('xPrev');
  ep2.innerHTML=existingEUrl?`<div class="img-prev-wrap"><img src="${existingEUrl}" class="img-prev"><button class="img-del" onclick="clearImg('entry','ePrev')">移除</button></div>`:'';
  xp2.innerHTML=existingXUrl?`<div class="img-prev-wrap"><img src="${existingXUrl}" class="img-prev"><button class="img-del" onclick="clearImg('exit','xPrev')">移除</button></div>`:'';
  document.getElementById('addOv').classList.add('open');
};

window.openClose=id=>{
  const t=trades.find(x=>x.id===id);if(!t)return;
  closeId=id;cSelM=[];
  document.getElementById('closeT').textContent=`結單：${t.ticker} ${t.name||''}`;
  document.getElementById('cXD').value=new Date().toISOString().split('T')[0];
  document.getElementById('cXP').value='';document.getElementById('cRV').value='';
  buildPk('cMPk',MISTAKES,cSelM,true);
  document.getElementById('closeOv').classList.add('open');
};

load();
window.addEventListener('resize',()=>{drawChart(trades.filter(t=>t.status!=='open'));});
</script>
