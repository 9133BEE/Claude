<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
a{color:#58a6ff;text-decoration:none}
.topbar{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.topbar-title{font-size:1.1rem;font-weight:700}
.topbar a{font-size:.85rem;color:#8b949e;padding:4px 10px;border-radius:6px;border:1px solid #30363d}
.topbar a:hover{color:#58a6ff;border-color:#58a6ff}
.hero{background:linear-gradient(135deg,#0d1117,#161b22,#1a1f2e);padding:40px 20px 28px;text-align:center;border-bottom:1px solid #30363d}
.hero h1{font-size:1.9rem;font-weight:800;background:linear-gradient(135deg,#22c55e,#58a6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.hero p{color:#8b949e;font-size:.95rem}
.score-bar{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
.score-item{font-size:.9rem;color:#8b949e}
.score-item span{font-weight:700;font-size:1.1rem}
#s-correct span{color:#22c55e}
#s-wrong span{color:#ef4444}
#s-total span{color:#58a6ff}
.reset-btn{background:rgba(88,166,255,.15);border:1px solid #58a6ff;color:#58a6ff;padding:5px 16px;border-radius:6px;cursor:pointer;font-size:.85rem}
.reset-btn:hover{background:rgba(88,166,255,.25)}
.filters{display:flex;gap:8px;padding:14px 20px;flex-wrap:wrap;justify-content:center;position:sticky;top:0;z-index:100;background:#0d1117;border-bottom:1px solid #21262d}
.fb{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:5px 14px;border-radius:18px;cursor:pointer;font-size:.82rem;transition:all .2s}
.fb:hover,.fb.on{background:rgba(88,166,255,.15);border-color:#58a6ff;color:#58a6ff}
.fb.ck1.on{background:rgba(34,197,94,.15);border-color:#22c55e;color:#22c55e}
.fb.ck2.on{background:rgba(245,158,11,.15);border-color:#f59e0b;color:#f59e0b}
.fb.cma.on{background:rgba(88,166,255,.15);border-color:#58a6ff;color:#58a6ff}
.fb.cvp.on{background:rgba(139,92,246,.15);border-color:#8b5cf6;color:#8b5cf6}
.fb.cti.on{background:rgba(236,72,153,.15);border-color:#ec4899;color:#ec4899}
.fb.csr.on{background:rgba(249,115,22,.15);border-color:#f97316;color:#f97316}
.fb.cth.on{background:rgba(20,184,166,.15);border-color:#14b8a6;color:#14b8a6}
.grid{max-width:1100px;margin:0 auto;padding:24px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:20px}
@media(max-width:560px){.grid{grid-template-columns:1fr;padding:14px 12px}}
.qcard{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;transition:border-color .2s}
.qcard.ck1{border-top:3px solid #22c55e}
.qcard.ck2{border-top:3px solid #f59e0b}
.qcard.cma{border-top:3px solid #58a6ff}
.qcard.cvp{border-top:3px solid #8b5cf6}
.qcard.cti{border-top:3px solid #ec4899}
.qcard.csr{border-top:3px solid #f97316}
.qcard.cth{border-top:3px solid #14b8a6}
.qhead{padding:16px 18px 0;display:flex;gap:10px;align-items:flex-start}
.qnum{background:#21262d;color:#8b949e;font-size:.72rem;font-weight:700;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.qmeta{flex:1}
.qtag{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px}
.ck1 .qtag{background:rgba(34,197,94,.15);color:#22c55e}
.ck2 .qtag{background:rgba(245,158,11,.15);color:#f59e0b}
.cma .qtag{background:rgba(88,166,255,.15);color:#58a6ff}
.cvp .qtag{background:rgba(139,92,246,.15);color:#8b5cf6}
.cti .qtag{background:rgba(236,72,153,.15);color:#ec4899}
.csr .qtag{background:rgba(249,115,22,.15);color:#f97316}
.cth .qtag{background:rgba(20,184,166,.15);color:#14b8a6}
.qtext{font-size:.92rem;color:#e6edf3;line-height:1.5;font-weight:600}
.qsvg{padding:12px 18px 0}
.qsvg svg{width:100%;height:auto;display:block;border-radius:6px;background:#0d1117;border:1px solid #21262d}
.opts{padding:12px 18px}
.opt{display:block;width:100%;background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:.87rem;text-align:left;margin-bottom:6px;transition:all .15s}
.opt:hover{border-color:#58a6ff;color:#e6edf3}
.opt.correct{background:rgba(34,197,94,.2);border-color:#22c55e;color:#22c55e;font-weight:700}
.opt.wrong{background:rgba(239,68,68,.18);border-color:#ef4444;color:#ef4444}
.opt.show-correct{background:rgba(34,197,94,.1);border-color:#22c55e;color:#22c55e}
.explain{display:none;margin:0 18px 16px;background:rgba(88,166,255,.07);border:1px solid rgba(88,166,255,.2);border-left:3px solid #58a6ff;border-radius:8px;padding:12px 14px;font-size:.85rem;color:#8b949e;line-height:1.65}
.explain strong{color:#e6edf3}
.explain.show{display:block}
</style>

<div class="topbar">
  <span class="topbar-title">股票考題</span>
  <a href="index.html">首頁</a>

</div>
<div class="hero">
  <h1>股票實戰考題</h1>
  <p>100 題 — 70% 圖形判斷 · 30% 理論 · 每題附詳解</p>
</div>
<div class="score-bar">
  <div class="score-item" id="s-correct">答對 <span id="nc">0</span></div>
  <div class="score-item" id="s-wrong">答錯 <span id="nw">0</span></div>
  <div class="score-item" id="s-total">完成 <span id="nt">0</span>/100</div>
  <button class="reset-btn" onclick="resetAll()">重置</button>
</div>
<div class="filters">
  <button class="fb on" onclick="filt('all',this)">全部(100)</button>
  <button class="fb ck1" onclick="filt('ck1',this)">K棒單根(15)</button>
  <button class="fb ck2" onclick="filt('ck2',this)">K棒組合(15)</button>
  <button class="fb cma" onclick="filt('cma',this)">趨勢均線(12)</button>
  <button class="fb cvp" onclick="filt('cvp',this)">量價關係(12)</button>
  <button class="fb cti" onclick="filt('cti',this)">技術指標(8)</button>
  <button class="fb csr" onclick="filt('csr',this)">支撐阻力(8)</button>
  <button class="fb cth" onclick="filt('cth',this)">理論知識(30)</button>
</div>
<div class="grid" id="grid"></div>

<script>
const CAT={'ck1':'K棒單根','ck2':'K棒組合','cma':'趨勢均線','cvp':'量價關係','cti':'技術指標','csr':'支撐阻力','cth':'理論知識'};
const S='<svg viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">';
const E='</svg>';
function c(x,y,t,b,col){const top=Math.min(t,b),h=Math.abs(b-t)||2;return`<rect x="${x-4}" y="${top}" width="8" height="${h}" fill="${col}" rx="1"/>`;}
function w(x,high,low,col){return`<line x1="${x}" y1="${high}" x2="${x}" y2="${low}" stroke="${col}" stroke-width="1.5"/>`;}
function cd(x,o,c2,high,low){const col=c2<o?'#dc2626':'#059669';return w(x,high,low,col)+c(x,o,c2,col);}

const Q=[
// K棒單根 1-15
{c:'ck1',q:'圖中單根K棒型態稱為什麼？代表何種意義？',
s:S+w(120,10,110,'#dc2626')+c(120,40,20,'#dc2626')+E,
o:['長陽線 — 多方強勢','長陰線 — 空方強勢','十字星 — 多空平衡','紡錘線 — 方向不明'],a:0,
e:'長陽線實體長、上下影線短，代表開盤到收盤多方持續買進，<strong>多頭強勢訊號</strong>。'},

{c:'ck1',q:'圖中K棒型態稱為什麼？',
s:S+w(120,10,110,'#059669')+c(120,20,90,'#059669')+E,
o:['長陽線','長陰線 — 空方控盤','錘子線','上吊線'],a:1,
e:'長陰線開高走低，收盤遠低於開盤，代表<strong>空方控盤</strong>，後市偏空。'},

{c:'ck1',q:'圖中K棒實體極小、上下影線長，稱為？',
s:S+w(120,15,105,'#8b949e')+c(120,55,60,'#8b949e')+E,
o:['流星線','錘子線','十字星 — 多空平衡','紡錘線'],a:3,
e:'紡錘線實體小、上下影線均長，代表多空雙方激烈拉鋸但無勝負，<strong>方向不明，等待確認</strong>。'},

{c:'ck1',q:'圖中K棒下影線長、實體小且位於頂端，出現在下跌末端代表？',
s:S+w(120,20,110,'#dc2626')+c(120,20,30,'#dc2626')+E,
o:['上吊線 — 頂部反轉','錘子線 — 底部反轉訊號','流星線 — 頂部反轉','十字錘'],a:1,
e:'錘子線（Hammer）下影線長度≥實體2倍，實體在頂端，出現在<strong>下跌末端</strong>是強烈底部反轉訊號。'},

{c:'ck1',q:'圖中K棒上影線長、實體小位於底端，出現在上漲末端代表？',
s:S+w(120,15,105,'#059669')+c(120,90,100,'#059669')+E,
o:['倒錘子線','上吊線','流星線 — 頂部反轉訊號','捨子線'],a:2,
e:'流星線（Shooting Star）上影線長度≥實體2倍，實體在底端，出現在<strong>上漲末端</strong>是強烈頂部反轉訊號。'},

{c:'ck1',q:'開盤=最低價，收盤=最高價，無影線的大陽線稱為？',
s:S+`<rect x="112" y="15" width="16" height="90" fill="#22c55e" rx="1"/>`+E,
o:['光頭光腳陽線 — 最強多頭','長陽線','禿棒','紅三兵'],a:0,
e:'光頭光腳陽線（禿棒）無上下影線，開盤即最低、收盤即最高，代表<strong>全程多方控盤，最強多頭訊號</strong>。'},

{c:'ck1',q:'圖中K棒形狀像十字架，稱為？',
s:S+w(120,15,105,'#8b949e')+`<line x1="108" y1="60" x2="132" y2="60" stroke="#8b949e" stroke-width="2"/>`+E,
o:['紡錘線','十字星 — 多空勢均力敵','捨子線','T字線'],a:1,
e:'十字星開盤價=收盤價，實體幾乎為零，代表<strong>多空完全平衡，趨勢可能轉折</strong>。出現在高點/低點意義更重大。'},

{c:'ck1',q:'下影線極長、上影線幾乎沒有、實體小的陽線，出現在上漲趨勢高點代表？',
s:S+w(120,25,110,'#dc2626')+c(120,25,33,'#dc2626')+E,
o:['錘子線 — 做多','上吊線 — 頂部警訊','流星線','倒錘子線'],a:1,
e:'上吊線與錘子線外型相同，但出現在<strong>上漲趨勢的高點</strong>，代表賣壓出現，是<strong>頂部反轉警訊</strong>。'},

{c:'ck1',q:'圖中上影線長、無下影線的陰線，代表什麼？',
s:S+w(120,15,60,'#059669')+c(120,40,80,'#059669')+E,
o:['長上影陰線 — 上方賣壓重','流星線','長陽線','錘子線'],a:0,
e:'長上影線陰線代表盤中曾大幅拉高但被賣壓打回，<strong>上方賣壓沉重</strong>，後市偏空。'},

{c:'ck1',q:'T字線（倒T）的特徵是什麼？',
s:S+w(120,15,80,'#dc2626')+`<line x1="108" y1="80" x2="132" y2="80" stroke="#22c55e" stroke-width="2"/>`+E,
o:['上影線長下影線無，實體在底端','開盤=收盤=最低點，上影線長','實體在中間，無影線','開盤=最高=最低'],a:1,
e:'T字線又稱倒十字或Dragonfly Doji，<strong>開盤=收盤=最低點</strong>，上影線長，代表下方支撐強，出現在底部是做多訊號。'},

{c:'ck1',q:'倒T字線（T字）出現在高點代表什麼？',
s:S+w(120,15,80,'#059669')+`<line x1="108" y1="15" x2="132" y2="15" stroke="#ef4444" stroke-width="2"/>`+E,
o:['底部反轉 — 做多','頂部反轉訊號 — 賣壓重','橫盤整理','量縮整理'],a:1,
e:'Gravestone Doji（墓碑十字）：開盤=收盤=最高點，下影線極短，代表<strong>上方賣壓極重</strong>，出現在高點是強烈賣出訊號。'},

{c:'ck1',q:'連續三根逐漸縮小的陰線出現在下跌中，代表？',
s:S+cd(90,30,60,20,70)+cd(120,45,65,38,75)+cd(150,55,68,50,80)+E,
o:['空頭確認','多空平衡，觀望','底部反轉訊號','三烏鴉，空頭延續'],a:3,
e:'三根連續收黑實體K棒稱為<strong>三烏鴉（Three Black Crows）</strong>，是強烈空頭延續訊號。'},

{c:'ck1',q:'圖中陽線實體長但上影線很長，代表什麼風險？',
s:S+w(120,5,110,'#dc2626')+c(120,35,80,'#dc2626')+E,
o:['多方完全控盤','上方仍有大量賣壓，追多要小心','底部確認訊號','最強多頭'],a:1,
e:'長上影線代表盤中曾拉到高點但受賣壓壓回，雖收陽但<strong>上方賣壓不輕</strong>，不宜盲目追多。'},

{c:'ck1',q:'開盤高跳後收長陽線，且有量能配合，稱為？',
s:S+`<line x1="80" y1="90" x2="100" y2="90" stroke="#8b949e"/>`+
`<line x1="100" y1="72" x2="108" y2="72" stroke="#22c55e" stroke-width="1"/>` +
w(120,30,105,'#dc2626')+c(120,50,32,'#dc2626')+E,
o:['跳空陽線 — 突破確認','填補缺口陽線','錘子線','長陽線普通'],a:0,
e:'開盤跳空且收長陽代表<strong>多頭積極突破</strong>，若有放量更為可信，缺口為支撐，是強勢買入訊號。'},

{c:'ck1',q:'實體極小，上下影線近乎相等的K棒稱為？',
s:S+w(120,15,105,'#dc2626')+c(120,56,64,'#dc2626')+E,
o:['十字星','蜻蜓十字','小實體紡錘線 — 多空均衡','長陽線'],a:2,
e:'小實體紡錘線（Short Spinning Top）上下影線相當、實體極小，表示<strong>多空勢均力敵</strong>，趨勢可能轉換，需觀察下一根K棒方向。'},

// K棒組合 16-30
{c:'ck2',q:'圖中三根K棒：陰線→小星→陽線，出現在低點代表？',
s:S+cd(80,25,60,18,68)+cd(120,63,67,55,75)+w(160,15,110,'#dc2626')+c(160,55,20,'#dc2626')+E,
o:['黃昏之星 — 頂部反轉','早晨之星 — 底部反轉訊號','三烏鴉','啟明星'],a:1,
e:'早晨之星（Morning Star）：大陰線+小星+大陽線，出現在<strong>下跌末端低點</strong>，是強烈底部反轉訊號，陽線須收回陰線實體一半以上。'},

{c:'ck2',q:'圖中三根K棒：陽線→小星→陰線，出現在高點代表？',
s:S+w(80,15,110,'#dc2626')+c(80,55,20,'#dc2626')+cd(120,56,60,48,68)+cd(160,28,75,18,82)+E,
o:['早晨之星 — 做多','黃昏之星 — 頂部反轉訊號','三白兵','吞噬形態'],a:1,
e:'黃昏之星（Evening Star）：大陽線+小星+大陰線，出現在<strong>上漲末端高點</strong>，是強烈頂部反轉訊號。'},

{c:'ck2',q:'陽線後出現大陰線，陰線開盤在陽線實體之上、收盤在陽線實體之下，稱為？',
s:S+w(90,25,100,'#dc2626')+c(90,60,30,'#dc2626')+cd(150,20,85,15,90)+E,
o:['穿刺形態','烏雲蓋頂 — 頂部反轉訊號','吞噬形態','孕線'],a:1,
e:'烏雲蓋頂（Dark Cloud Cover）：陰線開盤在前陽線高點以上，收盤穿入陽線實體一半以下，代表<strong>多頭力竭、空頭反撲</strong>。'},

{c:'ck2',q:'陰線後出現陽線，陽線開盤在陰線實體之下、收盤在陰線實體之上，稱為？',
s:S+cd(90,25,75,18,82)+w(150,15,105,'#dc2626')+c(150,80,22,'#dc2626')+E,
o:['烏雲蓋頂','穿刺形態 — 底部反轉訊號','孕線','晨星'],a:1,
e:'穿刺形態（Piercing Line）：陽線開盤在前陰線低點以下，收盤穿入陰線實體一半以上，代表<strong>空頭力竭、多頭反攻</strong>。'},

{c:'ck2',q:'圖中前一根K棒實體完全包含後一根，稱為？',
s:S+w(90,15,105,'#dc2626')+c(90,55,22,'#dc2626')+cd(150,65,42,62,45)+E,
o:['吞噬形態','孕線（Harami） — 趨勢可能轉折','烏雲蓋頂','捨子線'],a:1,
e:'孕線（Harami）：第一根K棒的實體完全包住第二根小K棒，代表<strong>趨勢力道減弱、可能轉折</strong>，需等後續確認。'},

{c:'ck2',q:'大陰線後出現完全吞噬陰線實體的大陽線，稱為？',
s:S+cd(90,25,78,18,85)+w(150,15,108,'#dc2626')+c(150,85,18,'#dc2626')+E,
o:['多頭吞噬（看漲吞噬） — 強烈底部反轉','穿刺形態','孕線','早晨之星'],a:0,
e:'看漲吞噬（Bullish Engulfing）：陽線完全吞噬前根陰線實體，代表<strong>多方強力反攻</strong>，是底部強烈買入訊號。'},

{c:'ck2',q:'連續三根陽線，每根開盤在前一根實體內，收盤逐步走高，稱為？',
s:S+w(80,58,105,'#dc2626')+c(80,80,60,'#dc2626')+w(120,42,88,'#dc2626')+c(120,65,44,'#dc2626')+w(160,25,72,'#dc2626')+c(160,50,28,'#dc2626')+E,
o:['三白兵 — 強勢上漲確認','三烏鴉','紅三兵','早晨之星'],a:0,
e:'三白兵（Three White Soldiers）：三根連續陽線逐步走高，影線短，代表<strong>多頭強勢連續攻擊</strong>，是上漲趨勢有力確認。'},

o:['W底 — 底部反轉','頭肩頂','M頭（雙頂） — 跌破頸線做空','三重頂'],a:2,
e:'<strong>M頭（雙頂）</strong>：兩次碰觸相同高點阻力後回落，跌破兩個高點之間的低點（頸線）是明確空頭訊號。目標跌幅等同M頭高度。'},

s:S+`<polyline points="30,28 80,38 130,48 180,52 210,55" fill="none" stroke="#ef4444" stroke-width="1.5"/>`+

`<text x="35" y="18" fill="#f59e0b" font-size="9">對稱三角收斂 → 等待突破</text>`+E,
o:['趨勢結束','三角收斂 — 突破方向即是下一個趨勢方向','底部確認','量縮整理'],a:1,
e:'對稱三角形（Symmetrical Triangle）：高低點持續收縮，能量積蓄。<strong>突破上軌做多、跌破下軌做空</strong>，突破時應有放量確認，目標幅度等同三角最寬處。'},

s:S+`<polyline points="30,72 90,72 115,55 160,42 220,28" fill="none" stroke="#22c55e" stroke-width="2"/>`+

`<circle cx="112" cy="55" r="4" fill="#22c55e"/>`+E,
o:['仍是阻力','阻力轉支撐 — 突破後回測可做多','變成更強阻力','趨勢反轉'],a:1,
e:'<strong>阻力轉支撐</strong>（Support/Resistance Flip）：前方阻力被突破後，回測該位置時將成為有效支撐，是突破確認後的<strong>低風險加碼機會</strong>。'},

{c:'csr',q:'圖示股價在一定範圍內上下震盪，稱為什麼操作型態？',
s:S+`<line x1="30" y1="35" x2="220" y2="35" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>`+

`<text x="155" y="98" fill="#22c55e" font-size="8">箱底買</text>`+E,
o:['頭肩頂即將反轉','箱型操作 — 在上下軌之間高賣低買','三角收斂突破','趨勢延續'],a:1,
e:'<strong>箱型操作</strong>：股價在固定區間震盪，策略是<strong>近上軌賣出、近下軌買進</strong>，直到箱型被突破（確認後跟隨突破方向）。'},

{c:'csr',q:'圖中出現三個相近高點，稱為？',
s:S+`<polyline points="30,88 55,72 75,45 95,28 115,45 135,65 155,45 175,28 195,45 215,72 220,88" fill="none" stroke="#22c55e" stroke-width="2"/>`+

o:['三白兵 — 多頭','頭肩頂','三重頂 — 跌破頸線強烈賣出','W底'],a:2,
e:'<strong>三重頂</strong>：三次衝擊同一高點均失敗，是比雙頂更強烈的頂部訊號。跌破頸線後下跌幅度通常更大，目標跌幅約等同頂部到頸線距離的1.5–2倍。'},

o:['賣出，已到壓力','矩形突破 — 確認方向後進場做多，停損設壓力線下方','觀望等待','下跌訊號'],a:1,
e:'矩形盤整突破：股價向上突破阻力線並伴隨放量，是<strong>確認性買入訊號</strong>。停損設在突破線下方，目標幅度等同矩形高度。'},

// 理論知識 71-100
{c:'cth',q:'股市中「多頭市場（Bull Market）」的定義通常是？',o:['股價下跌超過20%','股價從低點上漲超過20%','股價在一年內上漲超過5%','成交量增加超過20%'],a:1,
e:'<strong>多頭市場（牛市）</strong>定義：從前期低點上漲20%以上。通常伴隨經濟好轉、企業獲利增加、投資人信心提升。'},

{c:'cth',q:'道氏理論中，市場趨勢分為三種，其中「主要趨勢」的持續時間通常為？',o:['數小時到數天','數週到數月','一年以上','5年以上'],a:2,
e:'道氏理論三種趨勢：主要趨勢（Primary Trend）持續<strong>1年以上</strong>；次要趨勢（Secondary Trend）數週到數月；小趨勢（Minor Trend）數小時到數天。'},

{c:'cth',q:'波浪理論中，一個完整的主升波浪結構包含幾個推動波和回調波？',o:['3個推動波+2個回調波','5個推動波+3個回調波','3個推動波+3個回調波','5個推動波+2個回調波'],a:1,
e:'艾略特波浪理論：一個完整週期包含<strong>5波推動（1-2-3-4-5）+ 3波修正（A-B-C）</strong>，共8個波浪，其中奇數波為主趨勢、偶數波為回調。'},

{c:'cth',q:'斐波那契回調中，最常用的支撐/阻力回調比率是？',o:['23.6%、38.2%、50%、61.8%','10%、20%、30%、40%','25%、50%、75%','33%、66%'],a:0,
e:'斐波那契數列產生的黃金比例：<strong>38.2%、50%、61.8%</strong> 是最重要的回調支撐/阻力位，其中61.8%（黃金分割）為最強支撐/阻力。'},

{c:'cth',q:'「本益比（P/E Ratio）」的計算公式是？',o:['股價 ÷ 每股盈餘(EPS)','市值 ÷ 淨資產','股價 × 股數','股息 ÷ 股價'],a:0,
e:'本益比 P/E = 股價 ÷ EPS（每股盈餘）。P/E 越高代表市場願意為每元獲利支付更高溢價，通常成長股P/E高、價值股P/E低。'},

{c:'cth',q:'「融資」的意思是？',o:['向券商借錢買股票（槓桿做多）','向券商借股票賣出','買入選擇權','做空期貨'],a:0,
e:'<strong>融資</strong>：向券商借款買股票，等於用槓桿做多。融資成數通常為股價的40-60%（即可以借40-60%），放大獲利也放大虧損。'},

{c:'cth',q:'「融券」的操作目的是？',o:['借錢買股票','借股票賣出後，低價買回還券獲利（做空）','增加股息收益','降低持股成本'],a:1,
e:'<strong>融券</strong>：向券商借股票賣出，等於做空。預期股價下跌時，先賣出借來的股票，等股價下跌後再低價買回還給券商，賺取差價。'},

{c:'cth',q:'除息日前一天買入、除息日賣出的策略，通常稱為？',o:['套利交易','除息套利（存股策略）','填息交易','搶帽子策略'],a:2,
e:'搶在除息前買入、除息後立即賣出的策略俗稱<strong>「搶填息」</strong>。但除息當天股價會開低（除息缺口），填息時間不確定，此策略有相當風險。'},

{c:'cth',q:'「護城河（Economic Moat）」在股票投資中代表什麼？',o:['公司的現金儲備','企業持久競爭優勢（難以被競爭對手複製的競爭壁壘）','股票的波動率','公司的負債比例'],a:1,
e:'護城河（Warren Buffett提出）：企業具備的<strong>持久競爭優勢</strong>，如品牌、專利、網絡效應、成本優勢、轉換成本等，使競爭對手難以取代。'},

{c:'cth',q:'「股票分割（Stock Split）」2:1代表什麼？',o:['股價加倍，股數不變','股數加倍，股價減半，市值不變','股數減半，股價加倍','配發股息加倍'],a:1,
e:'股票分割（2:1）：每股變兩股，股價減半，總市值不變。目的是降低每股股價，增加市場流動性，對公司基本面沒有影響。'},

{c:'cth',q:'「ROE（股東權益報酬率）」代表什麼？越高越好嗎？',o:['公司資產效益，越高越好','股東投入資本的獲利效率，一般而言越高越好（但需留意是否靠高槓桿推升）','公司負債狀況','市值與帳面價值比較'],a:1,
e:'<strong>ROE = 淨利 ÷ 股東權益</strong>。代表公司用股東資金創造獲利的效率，一般ROE>15%視為優良。但需注意高ROE若來自高槓桿（高負債）則風險也高。'},

{c:'cth',q:'「EPS」是什麼的縮寫？計算公式？',o:['每股股息 = 總股息 ÷ 股數','每股盈餘 = 稅後淨利 ÷ 股數','每股資產 = 總資產 ÷ 股數','每股現金 = 現金 ÷ 股數'],a:1,
e:'<strong>EPS（Earnings Per Share）= 稅後淨利 ÷ 流通在外股數</strong>。代表每一股能分到多少獲利，是評估公司獲利能力最重要的指標之一。'},

{c:'cth',q:'技術分析的基本假設，不包含以下哪項？',o:['市場行為反映一切資訊','價格以趨勢方式移動','歷史會重演','基本面分析比技術分析更重要'],a:3,
e:'技術分析三大假設：①<strong>市場行為反映一切資訊</strong>（包含基本面）②<strong>價格以趨勢移動</strong>③<strong>歷史會重演</strong>。它不認為基本面分析更重要。'},

{c:'cth',q:'「停損」的主要目的是？',o:['最大化獲利','限制單次虧損，保護資本','增加持股數量','降低稅率'],a:1,
e:'<strong>停損</strong>是風險管理最重要的工具：預先設定虧損上限，當股價跌至停損點時立即賣出，<strong>防止小虧損擴大為致命虧損</strong>。「保住本金」是交易第一原則。'},

{c:'cth',q:'「動能投資策略」的核心邏輯是？',o:['買入近期表現最差的股票','買入近期表現最強的股票，預期趨勢延續','根據基本面選股','只買低本益比股票'],a:1,
e:'<strong>動能投資</strong>（Momentum Investing）：買入近期表現最強的股票，認為強者恆強。學術研究證明動能效應在多個市場長期有效，但在趨勢反轉時風險很大。'},

{c:'cth',q:'大盤（指數）大跌時，大多數個股的相關性如何？',o:['完全不相關，機會更多','正相關性增加，大多數股票同步下跌','負相關，部分股票反而上漲','無法預測'],a:1,
e:'市場危機時，股票間的<strong>相關性大幅提高</strong>，幾乎所有股票同步下跌，分散化的保護效果大幅減弱。這也是為什麼需要準備現金或對沖工具。'},

{c:'cth',q:'「均值回歸（Mean Reversion）」在股市中的意義是？',o:['股價永遠保持上漲','股價偏離平均後有回到平均的傾向','股市只有單邊趨勢','成交量趨於零'],a:1,
e:'<strong>均值回歸</strong>：股價偏離長期均值後，往往會回歸均值附近。這是反向操作策略（如超漲賣、超跌買）的理論基礎，也是布林通道等指標的設計原理。'},

{c:'cth',q:'「自由現金流（FCF）」相較於EPS，為何有時被認為更能反映企業真實獲利？',o:['FCF計算更簡單','EPS可以被會計操縱，FCF較難造假因為是實際現金流出入','FCF包含借款','FCF等於總利潤'],a:1,
e:'<strong>自由現金流 FCF = 營業現金流 - 資本支出</strong>。相比EPS，FCF較難被會計手法操縱（如折舊政策），反映公司<strong>實際可動用的現金</strong>，是巴菲特最重視的指標之一。'},

{c:'cth',q:'「空頭陷阱（Bear Trap）」是指什麼情況？',o:['股價真正進入下跌趨勢','股價短暫跌破支撐後快速反彈，讓做空者被軋空','多方被套牢','成交量消失'],a:1,
e:'<strong>空頭陷阱（Bear Trap）</strong>：股價短暫跌破關鍵支撐誘使空單進場，隨後快速反彈，導致做空者被迫高價回補（軋空），是主力誘空的常見手法。'},

{c:'cth',q:'「多頭陷阱（Bull Trap）」是指什麼情況？',o:['股價真正突破創新高','股價短暫突破阻力後快速回落，讓追多者被套','空頭被軋空','成交量爆增'],a:1,
e:'<strong>多頭陷阱（Bull Trap）</strong>：股價短暫突破關鍵阻力誘使多單追進，隨後快速回落，導致追多者被套牢，是主力出貨的常見手法，突破需搭配放量確認。'},

{c:'cth',q:'「黑天鵝事件（Black Swan）」在金融市場中指？',o:['每季財報','無法預測、罕見但影響極大的事件（如金融危機、疫情）','成交量暴增','股息超預期'],a:1,
e:'黑天鵝（Nassim Taleb提出）：<strong>極度罕見、難以預測，但一旦發生影響巨大的事件</strong>，如2008年金融海嘯、COVID-19等。投資人應保持現金準備和風險控管以應對。'},

{c:'cth',q:'「價值投資」的核心策略是？',o:['追買最熱門股票','以低於內在價值的價格買入被低估的股票，等待市場修正','頻繁短線交易','只看技術分析'],a:1,
e:'<strong>價值投資</strong>（Buffett/Graham）：估算企業的內在價值，在市場價格低於內在價值時買入，獲取<strong>安全邊際</strong>，長期持有等待市場修正。'},

{c:'cth',q:'「Beta值」在股票分析中代表？Beta=1.5代表什麼？',o:['公司獲利能力','股票相對大盤的波動敏感度，β=1.5代表大盤漲1%該股漲約1.5%','股票流動性','本益比'],a:1,
e:'<strong>Beta（β）= 股票相對大盤的波動係數</strong>。β=1.5代表大盤漲1%時該股漲約1.5%（漲跌皆然），高Beta股票波動大，適合積極型投資人。'},

{c:'cth',q:'「配息後股價」除息當天會如何變動？',o:['不變','上漲配息金額','下跌配息金額（除息缺口）','完全隨機'],a:2,
e:'除息當天，股價會<strong>下調配息金額</strong>（形成除息缺口）。例如配息2元，除息當天開盤價 = 前日收盤 - 2元。後續是否填息（回到原價）取決於公司基本面。'},

{c:'cth',q:'「量化寬鬆（QE）」對股市通常的影響是？',o:['股市下跌，資金緊縮','增加市場流動性，推升股市上漲','對股市無影響','提高利率'],a:1,
e:'量化寬鬆（央行購買債券注入資金）→<strong>市場資金充裕、利率下降</strong>→資金流入股市→股市通常上漲。QE期間「別和央行作對」是著名投資格言。'},

{c:'cth',q:'短線交易最重要的風險控管原則是？',o:['每次全押一個標的','單次損失不超過帳戶的1-2%，控制最大回撤','不設停損等待反彈','追熱門股票'],a:1,
e:'短線交易風控黃金法則：<strong>單次損失 ≤ 帳戶2%</strong>。即使連虧10次也只損失20%，保留翻盤能力。違反此原則是大多數散戶爆倉的主因。'},

{c:'cth',q:'「填息」的定義是？',o:['股價跌到最低點','除息後股價回漲，回到除息前的價格','配息金額增加','股票分割'],a:1,
e:'<strong>填息</strong>：股票除息後，股價從除息缺口處回漲至除息前的水準。填息代表投資人不僅拿到股息，且資本利得也回復，是存股族最期待的結果。'},

{c:'cth',q:'「分散投資」的主要目的是？',o:['追求最高報酬','降低非系統性風險（個別股票風險）','集中資源在最強標的','提高流動性'],a:1,
e:'<strong>分散投資</strong>可降低<strong>非系統性風險</strong>（個別公司風險如破產、醜聞），但無法消除系統性風險（整體市場風險如金融危機）。現代投資組合理論的核心。'},

let correct=0,wrong=0,answered=new Set();
function upScore(){
  document.getElementById('nc').textContent=correct;
  document.getElementById('nw').textContent=wrong;
  document.getElementById('nt').textContent=answered.size;
}
function resetAll(){
  correct=0;wrong=0;answered.clear();upScore();
  document.querySelectorAll('.opt').forEach(b=>{b.className='opt';b.disabled=false});
  document.querySelectorAll('.explain').forEach(e=>e.classList.remove('show'));
}
function answer(btn,qid,isCorrect){
  if(answered.has(qid))return;
  answered.add(qid);
  const card=btn.closest('.qcard');
  card.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===Q[qid].a) b.classList.add(isCorrect?'correct':'show-correct');
  });
  if(!isCorrect) btn.classList.add('wrong');
  if(isCorrect)correct++;else wrong++;
  upScore();
  card.querySelector('.explain').classList.add('show');
}
function filt(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.qcard').forEach(c=>{
    c.style.display=(cat==='all'||c.classList.contains(cat))?'':'none';
  });
}
function render(){
  const g=document.getElementById('grid');
  Q.forEach((q,i)=>{
    const d=document.createElement('div');
    d.className='qcard '+q.c;
    const opts=q.o.map((o,j)=>`<button class="opt" onclick="answer(this,${i},${j===q.a})">${String.fromCharCode(65+j)}. ${o}</button>`).join('');
    d.innerHTML=`<div class="qhead"><div class="qnum">${i+1}</div><div class="qmeta"><span class="qtag">${CAT[q.c]}</span><div class="qtext">${q.q}</div></div></div>`+
      (q.s?`<div class="qsvg">${q.s}</div>`:'')+
      `<div class="opts">${opts}</div><div class="explain">${q.e}</div>`;
    g.appendChild(d);
  });
}
render();
