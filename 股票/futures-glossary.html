<script>
const TERMS = [
// ── 合約基礎 ──────────────────────────────────────────────────────────────
{term:'期貨合約',en:'Futures Contract',cat:'contract',
short:'雙方約定在未來特定日期，以今日議定的價格交割特定標的物的標準化合約。',
detail:'<b>標準化</b>：合約規格由交易所制定，不能任意更改（口數、到期日、結算方式）。<b>雙向操作</b>：可以先買後賣（做多），也可先賣後買（做空）。<b>台灣主流</b>：台灣期貨交易所（TAIFEX）的台指期（TX/MTX/TMF）。',
eg:'買進1口大台（TX）= 同意以今天的指數點位，在到期日結算差價。'},

{term:'現貨',en:'Spot / Cash Market',cat:'contract',
short:'指直接在市場上立即買賣實際資產（股票、商品）的市場，相對於期貨的「未來交割」。',
detail:'台股加權指數本身就是現貨指數。期貨合約追蹤的是這個指數的未來價格預期。現貨市場和期貨市場同向波動，但期貨可能因<b>升貼水</b>出現差距。'},

{term:'基差',en:'Basis',cat:'contract',
short:'期貨價格與現貨價格的差額，通常期貨比現貨高（正向基差/升水），到期時兩者收斂。',
detail:'<b>升水（Contango）</b>：期貨 > 現貨，代表市場對未來看多，或持有成本反映。台指期通常在多頭市場升水30~80點。<b>貼水（Backwardation）</b>：期貨 < 現貨，代表市場預期未來走弱或恐慌情緒。<b>到期當天</b>：基差自動歸零，期現貨收斂。',
formula:'基差 = 期貨價格 − 現貨價格'},

{term:'台指期（TX）',en:'Taiwan Stock Index Futures',cat:'contract',
short:'追蹤台灣加權股價指數的期貨合約，台灣交易量最大的衍生性商品。',
detail:'<b>每點價值</b>：200元/點。<b>最小跳動</b>：1點（200元）。<b>保證金</b>：約184,000元（原始保證金，依市況調整）。<b>到期日</b>：每月第三個週三。<b>交易時間</b>：日盤8:45~13:45，夜盤15:00~次日5:00。',
formula:'損益 = 口數 × 點數差 × 200元',
eg:'1口大台，以21,000點買進、21,100點賣出 → 獲利 100×200 = 20,000元'},

{term:'小台（MTX）',en:'Mini Taiwan Futures',cat:'contract',
short:'台指期的小型版本，每點50元，保證金約1/4，適合資金較小的交易者。',
detail:'<b>每點價值</b>：50元/點。<b>保證金</b>：約46,000元。<b>最大特色</b>：可以更精細地控制部位，適合初學者練習和小資金操作。4口小台≈1口大台，但手續費也是4倍。',
formula:'損益 = 口數 × 點數差 × 50元'},

{term:'微台（TMF）',en:'Micro Taiwan Futures',cat:'contract',
short:'台指期最小規格，每點10元，保證金約9,000元，專為入門者設計。',
detail:'<b>每點價值</b>：10元/點。<b>保證金</b>：約9,000元（依市況調整）。<b>適合</b>：剛開始學台指期的新手，用最少本金體驗期貨交易，虧損有限但也能學到完整的交易流程。',
formula:'損益 = 口數 × 點數差 × 10元',
eg:'1口微台，指數漲100點 → 獲利 100×10 = 1,000元'},

{term:'到期日',en:'Expiration Date',cat:'contract',
short:'台指期合約的最終交割日，台灣為每月第三個週三，到期當天強制以結算價結算。',
detail:'<b>近月合約</b>：最接近到期的合約，流動性最好、交易量最大。<b>遠月合約</b>：下月、下季合約，流動性較差。<b>到期前換月</b>：為了持續持有部位，需在到期前把近月合約平倉，重新買進下月合約。'},

{term:'結算',en:'Settlement',cat:'contract',
short:'期貨到期時，以「最後結算價」計算損益並自動平倉的機制，台指期為現金結算（非實物交割）。',
detail:'<b>最後結算價</b>：到期日當天，以開盤後前15分鐘（或特定規則）計算出的指數均值，作為最終結算基準。<b>現金結算</b>：直接計算差價轉帳，不涉及實際股票交割。<b>注意</b>：到期日有時出現異常波動（結算操控），需特別謹慎。'},

{term:'口',en:'Contract (lot)',cat:'contract',
short:'期貨的交易單位，買1口就是買1張標準合約，損益依合約規格計算。',
detail:'台灣期貨以「口」為單位，美國期貨以「contract」為單位。<b>不能買0.5口</b>：期貨合約不能細分，部位控制只能以整口數調整。'},

{term:'未平倉量',en:'Open Interest',cat:'contract',
short:'目前市場上所有未結算（尚未平倉）的期貨合約總數，代表市場的「賭注」大小。',
detail:'<b>未平倉量增加</b>：市場新資金進入，行情可能持續。<b>未平倉量減少</b>：有人平倉（獲利了結或停損），行情可能趨緩。<b>注意</b>：未平倉量是「買方＋賣方都算1口」，每一口多單對應一口空單。',
warn:'未平倉量大的合約流動性好，拉大倉位時選流動性高的近月合約。'},

// ── 保證金制度 ─────────────────────────────────────────────────────────────
{term:'原始保證金',en:'Initial Margin',cat:'margin',
short:'開倉時帳戶內必須存入的最低金額，由期貨交易所根據合約波動性設定。',
detail:'台指期（大台）目前約184,000元，小台約46,000元，微台約9,000元（會因市場波動調整）。保證金不是「買股票的成本」，而是「履約保證」——行情對你有利時可以超過原始保證金的虧損，期貨公司會每天結算。',
warn:'期貨公司每天將當日損益直接計入帳戶（每日結算），帳戶資金實時反映損益，不像股票要賣出才知道。'},

{term:'維持保證金',en:'Maintenance Margin',cat:'margin',
short:'帳戶最低必須維持的保證金水位（約原始的75%），低於此水位會收到追繳通知。',
detail:'台指期維持保證金約為原始保證金的75%~80%。<b>帳戶淨值低於維持保證金</b> → 期貨公司發出「追繳令」，你需要在指定時間內（通常是下個交易日早上）補足到原始保證金水位。',
formula:'大台維持保證金 ≈ 142,000元（原始184,000×77%）',
eg:'持1口大台，帳戶虧損到剩13萬 → 低於維持保證金 → 追繳到18.4萬'},

{term:'追繳令（Margin Call）',en:'Margin Call',cat:'margin',
short:'帳戶淨值低於維持保證金時，期貨公司要求在期限內補足的通知。',
detail:'收到追繳令後若不補繳，期貨公司有權在次日開盤時強制平倉（斷頭）。補繳金額必須補足到<b>原始保證金</b>水位（不只是補到維持保證金）。<b>計算方式</b>：追繳金額 = 原始保證金 − 目前帳戶淨值。',
warn:'追繳令通常在行情對你不利時出現，此時補錢等於在最糟的時機加碼——要非常謹慎考慮是否繼續持有。'},

{term:'斷頭',en:'Forced Liquidation / Stop Out',cat:'margin',
short:'帳戶資金不足維持保證金，期貨公司強制平倉，不管你同不同意。',
detail:'斷頭常發生在行情劇烈波動時（如跳空下跌），虧損速度超過補繳速度。<b>斷頭後仍可能欠期貨公司錢</b>（行情跳空超過帳戶本金時）。<b>防止斷頭</b>：帳戶保留充足緩衝（建議帳戶資金 ≥ 原始保證金×2），並嚴格設停損。',
warn:'不設停損而被動等待追繳或斷頭，是散戶爆倉的最主要原因。'},

{term:'槓桿倍數',en:'Leverage Ratio',cat:'margin',
short:'用保證金控制合約的倍數，台指期大台槓桿約10~15倍，波動風險等比放大。',
detail:'<b>計算方式</b>：合約市值 ÷ 保證金。大台指數21,000點時，合約市值 = 21,000×200 = 420萬，保證金18.4萬，槓桿 ≈ 22.8倍。這代表指數漲1%，你的保證金帳戶漲22.8%；跌1%也同樣虧22.8%。',
formula:'槓桿倍數 = 合約市值 ÷ 保證金\n合約市值 = 指數點位 × 每點價值',
warn:'槓桿是雙刃劍，一次逆向行情可以吃掉大部分保證金。永遠設好停損。'},

{term:'每日結算',en:'Daily Mark-to-Market Settlement',cat:'margin',
short:'期貨每天收盤後，依當日收盤價計算損益並立即轉入/從保證金帳戶扣除。',
detail:'和股票不同：股票要賣出才實現損益，期貨每天直接結算到帳。<b>影響</b>：今天虧損10,000元，明天開盤前帳戶就少了10,000元的可用資金。這讓帳戶現金必須保持充裕緩衝。'},

// ── 交易術語 ──────────────────────────────────────────────────────────────
{term:'做多',en:'Long / Buy to Open',cat:'trading',
short:'預期價格上漲，先買入期貨合約（買進開倉），漲了再平倉賣出獲利。',
detail:'期貨做多和買股票類似，但是槓桿交易。<b>開多倉</b>：買進期貨合約。<b>平多倉</b>：賣出期貨合約（反手）。做多的最大損失理論上是合約歸零（但指數不會到零）。',
formula:'多單獲利 = (賣出價格 − 買入價格) × 點值 × 口數'},

{term:'做空',en:'Short / Sell to Open',cat:'trading',
short:'預期價格下跌，先賣出期貨合約（賣出開倉），跌了再平倉買回獲利。',
detail:'期貨做空不需要借券，直接在交易軟體選「賣出」即可開空單，這是期貨比股票靈活的重要優勢。<b>開空倉</b>：賣出期貨合約。<b>平空倉</b>：買回期貨合約。',
formula:'空單獲利 = (賣出價格 − 買入價格) × 點值 × 口數',
eg:'台指期20,500點空1口大台，跌至20,400點平倉 → 獲利100×200=20,000元'},

{term:'平倉',en:'Close Position / Square Off',cat:'trading',
short:'結束手中持有的期貨部位，做多就賣出、做空就買入，損益在此確定。',
detail:'<b>自行平倉</b>：主動在想要的價格平倉。<b>停損平倉</b>：觸及停損價格自動平倉。<b>被動平倉（斷頭）</b>：保證金不足被期貨公司強制平倉。<b>到期自動結算</b>：到期日不平倉則自動以結算價結算。'},

{term:'留倉',en:'Overnight Position / Carry',cat:'trading',
short:'收盤時沒有平倉，將部位持留到下個交易日，承擔隔夜風險（跳空）。',
detail:'台指期夜盤（15:00~05:00）可以交易，留倉到夜盤或隔日開盤都可能面臨跳空風險。<b>建議</b>：初學者不宜頻繁留倉，隔夜發生重大消息（美股大跌、地緣政治）會讓你措手不及。',
warn:'留倉時如果設停損，確認停損單是「觸及成交」而非「限價停損」，跳空時限價單可能完全無法成交。'},

{term:'換月',en:'Contract Rollover',cat:'trading',
short:'近月合約即將到期時，將持倉轉移至下月合約，以繼續持有相同方向的部位。',
detail:'換月通常在到期日前2~3天進行（此時近月合約量縮、下月合約量增）。<b>換月成本</b>：近月和下月合約之間的價差（基差），換月時可能付出幾十到上百點的成本或獲益。'},

{term:'翻倉',en:'Position Reversal',cat:'trading',
short:'從多倉直接轉為空倉（或反之），等於同時平倉和開新倉，通常在判斷趨勢反轉時使用。',
detail:'例：持有1口多單，判斷轉空後「賣出2口」——第一口平多、第二口開空。這比分兩次操作（先平倉再開倉）更節省手續費，也更快速執行。'},

{term:'未平倉量增減',en:'Open Interest Change',cat:'trading',
short:'未平倉量（OI）增加代表有新資金進場，OI減少代表有人平倉離場，是行情動能的佐證。',
detail:'<b>價漲+OI增</b>：多頭資金積極進場，行情偏多且強勁。<b>價漲+OI減</b>：空單回補推升股價，漲勢可能不持久。<b>價跌+OI增</b>：空頭資金進場，行情偏空。<b>價跌+OI減</b>：多單認賠出場，跌勢可能接近尾聲。'},

{term:'跳空',en:'Price Gap',cat:'trading',
short:'開盤價相對前一日收盤價出現大幅差距，期貨在夜盤後或重大消息後常見。',

// JS ENGINE ──────────────────────────────────────────────────────────────
let currentCat = 'all';
const catNames = {
  contract:'📄 合約基礎',
  margin:'💰 保證金制度',
  trading:'⚡ 交易術語',
  risk:'🛡 風險管理',
  us:'🇺🇸 美股期貨'
};
const badgeClass = {
  contract:'badge-contract',
  margin:'badge-margin',
  trading:'badge-trading',
  risk:'badge-risk',
  us:'badge-us'
};
function render(terms){
  const g = document.getElementById('glossary');
  if(!terms.length){g.innerHTML='<div class="empty">找不到符合的術語</div>';document.getElementById('showing').textContent=0;return;}
  let html='',lastCat='';
  terms.forEach(t=>{
    if(currentCat==='all'&&t.cat!==lastCat){lastCat=t.cat;html+=`<div class="sec-label">${catNames[t.cat]}</div>`;}
    const badge=`<span class="tc-badge ${badgeClass[t.cat]}">${catNames[t.cat].replace(/^../,'')}</span>`;
    let extra='';
    if(t.formula)extra+=`<div class="tc-formula">${t.formula.replace(/\n/g,'<br>')}</div>`;
    if(t.eg)extra+=`<div class="tc-eg">📌 ${t.eg}</div>`;
    if(t.warn)extra+=`<div class="tc-warn">⚠️ ${t.warn}</div>`;
    html+=`<div class="term-card">
      <div class="tc-top"><div><div class="tc-name">${t.term}</div><div class="tc-en">${t.en}</div></div>${badge}</div>
      <div class="tc-short">${t.short}</div>
      <div class="tc-detail">${t.detail}${extra}</div>
    </div>`;
  });
  g.innerHTML=html;
  document.getElementById('showing').textContent=terms.length;
}
function filter(){
  const q=document.getElementById('q').value.toLowerCase();
  let terms=TERMS.filter(t=>currentCat==='all'||t.cat===currentCat);
  if(q)terms=terms.filter(t=>t.term.toLowerCase().includes(q)||t.en.toLowerCase().includes(q)||t.short.toLowerCase().includes(q)||t.detail.toLowerCase().includes(q));
  render(terms);
}
function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filter();
}
document.getElementById('total').textContent=TERMS.length;
filter();
</script>
