<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股學筆記 — 台股知識精華庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #1A56DB;
  --color-primary-light: #3B82F6;
  --color-accent: #6366F1;
  --bg-page: #F8FAFC;
  --bg-card: #FFFFFF;
  --bg-dark: #0F172A;
  --bg-dark-card: #1E293B;
  --text-primary: #0F172A;
  --text-secondary: #334155;
  --text-muted: #475569;
  --text-faint: #94A3B8;
  --border: #E2E8F0;
  --shadow-card: 0 1px 3px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.04);
  --shadow-hover: 0 8px 32px rgba(26,86,219,.12),0 2px 8px rgba(15,23,42,.08);
  --font: 'Noto Sans TC',system-ui,sans-serif;
  --font-en: 'Inter','Noto Sans TC',sans-serif;
  --font-mono: 'JetBrains Mono','Courier New',monospace;
  --radius: 16px;
  --nav-h: 64px;
  --tab-h: 52px;

  --technical-main: #3B82F6;
  --technical-bg: #EFF6FF;
  --technical-border: #BFDBFE;
  --technical-text: #1E40AF;
  --technical-grad: linear-gradient(135deg,#1D4ED8,#3B82F6);

  --fundamental-main: #10B981;
  --fundamental-bg: #ECFDF5;
  --fundamental-border: #A7F3D0;
  --fundamental-text: #065F46;
  --fundamental-grad: linear-gradient(135deg,#059669,#10B981);

  --chip-main: #F59E0B;
  --chip-bg: #FFFBEB;
  --chip-border: #FDE68A;
  --chip-text: #92400E;
  --chip-grad: linear-gradient(135deg,#D97706,#F59E0B);

  --news-main: #8B5CF6;
  --news-bg: #F5F3FF;
  --news-border: #DDD6FE;
  --news-text: #4C1D95;
  --news-grad: linear-gradient(135deg,#7C3AED,#8B5CF6);

  --beginner-bg: #D1FAE5;
  --beginner-text: #065F46;
  --intermediate-bg: #FEF3C7;
  --intermediate-text: #92400E;
  --advanced-bg: #FEE2E2;
  --advanced-text: #7F1D1D;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-primary);line-height:1.6;overflow-x:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none}

/* NAV */
.nav{position:sticky;top:0;z-index:300;height:var(--nav-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;transition:box-shadow .2s}
.nav.scrolled{box-shadow:0 1px 12px rgba(15,23,42,.08)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text-primary);font-weight:800;font-family:var(--font-en);font-size:1.1rem;flex-shrink:0}
.nav-logo svg{flex-shrink:0}
.nav-logo span{color:var(--color-primary)}
.nav-spacer{flex:1}
.nav-search{position:relative;display:flex;align-items:center}
.nav-search input{border:1px solid var(--border);border-radius:20px;padding:8px 16px 8px 38px;font-size:.875rem;font-family:var(--font);background:#F1F5F9;width:220px;transition:all .3s;outline:none;color:var(--text-primary)}
.nav-search input:focus{width:300px;background:#fff;border-color:var(--color-primary-light)}
.nav-search .search-icon{position:absolute;left:12px;color:var(--text-faint);pointer-events:none;width:16px;height:16px}
#search-count{font-size:.8rem;color:var(--text-muted);flex-shrink:0;white-space:nowrap}

/* HERO */
.hero{background:var(--bg-dark);padding:64px 24px;overflow:hidden;position:relative}
.hero-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.hero-title{font-family:var(--font-en);font-weight:800;font-size:clamp(2rem,4vw,3rem);line-height:1.15;color:#fff;margin-bottom:16px}
.hero-title .grad{background:linear-gradient(90deg,#60A5FA,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-subtitle{color:#94A3B8;font-size:1rem;line-height:1.8;margin-bottom:28px}
.hero-badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:32px}
.hero-badge{padding:6px 16px;border-radius:100px;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent}
.hero-badge:nth-child(1){background:rgba(59,130,246,.15);color:#60A5FA;border-color:rgba(59,130,246,.3)}
.hero-badge:nth-child(2){background:rgba(16,185,129,.15);color:#34D399;border-color:rgba(16,185,129,.3)}
.hero-badge:nth-child(3){background:rgba(245,158,11,.15);color:#FCD34D;border-color:rgba(245,158,11,.3)}
.hero-badge:nth-child(4){background:rgba(139,92,246,.15);color:#A78BFA;border-color:rgba(139,92,246,.3)}
.hero-badge:hover{transform:translateY(-2px);filter:brightness(1.2)}
.hero-stats{display:flex;gap:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.08)}
.hero-stat{text-align:center}
.hero-stat-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:600;color:#60A5FA}
.hero-stat-label{font-size:.75rem;color:#64748B;margin-top:2px}
.hero-visual{display:flex;align-items:center;justify-content:center;opacity:.9}
.hero-visual svg{width:100%;max-width:380px;filter:drop-shadow(0 0 40px rgba(96,165,250,.2))}

/* TABS */
.tab-nav{position:sticky;top:var(--nav-h);z-index:200;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-list{display:flex;max-width:1200px;margin:0 auto;padding:0 24px;gap:0;position:relative;min-width:max-content}
.tab-btn{padding:0 28px;height:var(--tab-h);font-size:.9rem;font-weight:500;color:var(--text-muted);display:flex;align-items:center;gap:8px;transition:color .2s;white-space:nowrap;position:relative;font-family:var(--font)}
.tab-btn .tab-icon{font-size:1.1rem}
.tab-btn.active{color:var(--section-color,var(--color-primary));font-weight:700}
.tab-btn:hover:not(.active){color:var(--text-secondary)}
.tab-indicator{position:absolute;bottom:-2px;height:3px;border-radius:3px 3px 0 0;background:var(--color-primary);transition:left .25s cubic-bezier(.4,0,.2,1),width .25s cubic-bezier(.4,0,.2,1)}

/* FILTER BAR */
.filter-bar{max-width:1200px;margin:0 auto;padding:16px 24px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-label{font-size:.8rem;color:var(--text-muted);font-weight:500}
.filter-btn{padding:4px 14px;border-radius:100px;font-size:.8rem;font-family:var(--font);border:1px solid var(--border);color:var(--text-muted);transition:all .15s;background:#fff}
.filter-btn.active,.filter-btn:hover{background:var(--section-bg,#EFF6FF);color:var(--section-color,var(--color-primary));border-color:var(--section-border,#BFDBFE)}
.filter-spacer{flex:1}

/* CARDS GRID */
.cards-section{max-width:1200px;margin:0 auto;padding:24px 24px 64px}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:1024px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){
  .cards-grid{grid-template-columns:1fr}
  .hero-inner{grid-template-columns:1fr}
  .hero-visual{display:none}
  .tab-btn{padding:0 18px}
}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-card);overflow:hidden;transition:transform .28s cubic-bezier(.4,0,.2,1),box-shadow .28s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateY(20px)}
.card.visible{opacity:1;transform:translateY(0);transition:opacity .4s ease,transform .4s ease,box-shadow .28s cubic-bezier(.4,0,.2,1)}
.card.hidden-filter{display:none}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:var(--card-border,#BFDBFE)}
.card-top-bar{height:4px;background:var(--card-grad)}
.card-header{padding:16px 18px 0;display:flex;align-items:flex-start;gap:10px}
.card-icon-wrap{width:34px;height:34px;border-radius:8px;background:var(--card-grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;transition:transform .2s}
.card:hover .card-icon-wrap{transform:scale(1.08) rotate(5deg)}
.card-meta{flex:1;min-width:0}
.card-category{font-size:.7rem;font-weight:600;color:var(--card-color);letter-spacing:.08em;text-transform:uppercase;font-family:var(--font-en)}
.card-difficulty{float:right;padding:2px 10px;border-radius:100px;font-size:.7rem;font-weight:600;line-height:1.6}
.difficulty-入門{background:var(--beginner-bg);color:var(--beginner-text)}
.difficulty-進階{background:var(--intermediate-bg);color:var(--intermediate-text)}
.difficulty-高階{background:var(--advanced-bg);color:var(--advanced-text)}
.card-body{padding:10px 18px 14px}
.card-title{font-size:1rem;font-weight:700;line-height:1.4;margin-bottom:2px;color:var(--text-primary)}
.card-en{font-size:.72rem;color:var(--text-faint);font-family:var(--font-en);margin-bottom:8px}
.card-summary{font-size:.85rem;color:var(--text-muted);line-height:1.65;margin-bottom:10px}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.card-tag{padding:2px 9px;background:#F1F5F9;color:var(--text-muted);border-radius:6px;font-size:.72rem;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.card-tag:hover,.card-tag.active-tag{background:var(--card-bg,#EFF6FF);color:var(--card-color,var(--color-primary));border-color:var(--card-border,#BFDBFE)}
.card-expand-btn{width:100%;padding:8px 0;font-size:.8rem;color:var(--card-color);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;border-top:1px dashed var(--border);transition:background .15s,color .15s;border-radius:0 0 var(--radius) var(--radius);font-family:var(--font)}
.card-expand-btn:hover{background:var(--card-bg)}
.card-expand-btn .arrow{transition:transform .3s cubic-bezier(.4,0,.2,1);display:inline-block;font-style:normal}
.card.expanded .card-expand-btn .arrow{transform:rotate(180deg)}

/* CARD DETAIL */
.card-detail{max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1)}
.card-detail-inner{padding:0 18px 16px;display:flex;flex-direction:column;gap:12px;border-top:1px solid var(--border)}
.detail-block{border-radius:10px;overflow:hidden}
.detail-block-title{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px 4px;display:flex;align-items:center;gap:6px}
.detail-block-content{padding:4px 14px 12px;font-size:.84rem;line-height:1.75}
.block-keypoints{background:var(--card-bg,#EFF6FF);border:1px solid var(--card-border,#BFDBFE)}
.block-keypoints .detail-block-title{color:var(--card-text,#1E40AF)}
.block-keypoints .detail-block-content{color:var(--text-secondary)}
.block-keypoints ul{padding-left:18px}
.block-keypoints li{margin-bottom:6px}
.block-keypoints li::marker{color:var(--card-color)}
.block-formula{background:#1E293B;border:1px solid #334155}
.block-formula .detail-block-title{color:#94A3B8;display:flex;justify-content:space-between;align-items:center}
.block-formula .detail-block-content{font-family:var(--font-mono);font-size:.8rem;color:#E2E8F0;white-space:pre-wrap;line-height:1.9}
.copy-btn{padding:2px 10px;border-radius:6px;background:#334155;color:#94A3B8;font-size:.7rem;font-family:var(--font);transition:all .15s;cursor:pointer;border:none}
.copy-btn:hover{background:#475569;color:#e2e8f0}
.copy-btn.copied{background:#059669;color:#fff}
.block-example{background:#fff;border:1px solid var(--border);border-left:3px solid var(--card-color,#3B82F6)}
.block-example .detail-block-title{color:var(--card-color,#3B82F6)}
.block-example .detail-block-content{color:var(--text-secondary)}
.block-tip{background:#FFFBEB;border:1px solid #FDE68A}
.block-tip .detail-block-title{color:#92400E}
.block-tip .detail-block-content{color:#78350F}

/* FOOTER */
.footer{background:var(--bg-dark);padding:40px 24px;text-align:center;color:#475569}
.footer-logo{font-family:var(--font-en);font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:8px}
.footer-logo span{color:#3B82F6}
.footer-text{font-size:.8rem;line-height:1.8}
.footer-disclaimer{margin-top:16px;font-size:.72rem;color:#334155;padding-top:16px;border-top:1px solid #1E293B}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:64px 24px;color:var(--text-muted)}
.empty-state svg{width:48px;height:48px;margin:0 auto 16px;opacity:.4}
.empty-state p{font-size:1rem;margin-bottom:4px}
.empty-state small{font-size:.85rem;color:var(--text-faint)}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>

</section>

<!-- TABS -->
<div class="tab-nav" id="tab-nav">

const DATA = [
  {
    id:"technical",title:"技術面",icon:"📈",
    grad:"var(--technical-grad)",main:"var(--technical-main)",bg:"var(--technical-bg)",
    border:"var(--technical-border)",text:"var(--technical-text)",
    cards:[
      {id:"candlestick",title:"K線基礎判讀",en:"Candlestick Analysis",diff:"入門",

let currentSection = 'technical';
let currentDiff = 'all';
let searchTerm = '';
let expandedCard = null;

function getSection(id) { return DATA.find(s => s.id === id); }

function renderCard(card, section) {
  const cssVars = `--card-grad:${section.grad};--card-main:${section.main};--card-bg:${section.bg};--card-border:${section.border};--card-color:${section.main};--card-text:${section.text}`;
  const diffClass = `difficulty-${card.diff}`;
  return `
<div class="card" id="card-${card.id}" style="${cssVars}" data-id="${card.id}" data-diff="${card.diff}" data-section="${section.id}" data-tags="${card.tags.join(',')}">
  <div class="card-top-bar"></div>
  <div class="card-header">
    <div class="card-icon-wrap">${section.icon}</div>
    <div class="card-meta">
      <span class="card-category">${section.title}</span>
      <span class="card-difficulty ${diffClass}">${card.diff}</span>
    </div>
  </div>
  <div class="card-body">
    <div class="card-title">${card.title}</div>
    <div class="card-en">${card.en}</div>
    <div class="card-summary">${card.summary}</div>
    <div class="card-tags">${card.tags.map(t=>`<span class="card-tag" onclick="filterTag('${t}',event)">#${t}</span>`).join('')}</div>
  </div>
  <div class="card-detail" id="detail-${card.id}">
    <div class="card-detail-inner">
      <div class="detail-block block-keypoints">
        <div class="detail-block-title">📌 核心重點</div>
        <div class="detail-block-content"><ul>${card.points.map(p=>`<li>${p}</li>`).join('')}</ul></div>
      </div>
      <div class="detail-block block-formula">
        <div class="detail-block-title">🔢 公式 / 定義 <button class="copy-btn" onclick="copyFormula('${card.id}',this)">複製</button></div>
        <div class="detail-block-content" id="formula-${card.id}">${card.formula}</div>
      </div>
      <div class="detail-block block-example">
        <div class="detail-block-title">📖 實際案例</div>
        <div class="detail-block-content">${card.example}</div>
      </div>
      <div class="detail-block block-tip">
        <div class="detail-block-title">💡 操作技巧</div>
        <div class="detail-block-content">${card.tip}</div>
      </div>
    </div>
  </div>
  <button class="card-expand-btn" onclick="toggleCard('${card.id}')">
    <i class="arrow">▼</i> <span class="expand-label">展開詳情</span>
  </button>
</div>`;
}

function renderSection(sectionId) {
  const section = getSection(sectionId);
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = section.cards.map(c => renderCard(c, section)).join('');
  applyFilters();
  observeCards();
}

function switchTab(id) {
  if (currentSection === id) {
    document.getElementById('tab-nav').scrollIntoView({behavior:'smooth'});
    return;
  }
  if (expandedCard) { collapseCard(expandedCard); expandedCard = null; }
  currentSection = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  updateTabIndicator();
  renderSection(id);
  updateFilterBarColors();
  document.getElementById('tab-nav').scrollIntoView({behavior:'smooth'});
}

function updateTabIndicator() {
  const active = document.querySelector('.tab-btn.active');
  const indicator = document.getElementById('tab-indicator');
  const section = getSection(currentSection);
  if (active) {
    indicator.style.left = active.offsetLeft + 'px';
    indicator.style.width = active.offsetWidth + 'px';
    indicator.style.background = section.main.replace('var(--','').replace(')','');
    indicator.style.background = `var(--${currentSection}-main)`;
  }
}

function updateFilterBarColors() {
  const section = getSection(currentSection);
  const fb = document.getElementById('filter-bar');
  fb.style.setProperty('--section-bg', section.bg);
  fb.style.setProperty('--section-color', section.main);
  fb.style.setProperty('--section-border', section.border);
}

function filterDifficulty(diff, btn) {
  currentDiff = diff;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === diff));
  applyFilters();
}

function filterTag(tag, e) {
  e.stopPropagation();
  searchTerm = tag;
  document.getElementById('search-input').value = tag;
  applyFilters();
}

function applyFilters() {
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const matchDiff = currentDiff === 'all' || card.dataset.diff === currentDiff;
    const searchLower = searchTerm.toLowerCase();
    const cardText = (card.querySelector('.card-title').textContent + ' ' +
                      card.querySelector('.card-summary').textContent + ' ' +
                      card.dataset.tags + ' ' +
                      card.querySelector('.card-en').textContent).toLowerCase();
    const matchSearch = !searchTerm || cardText.includes(searchLower);
    const hide = !matchDiff || !matchSearch;
    card.classList.toggle('hidden-filter', hide);
    if (!hide) visible++;
  });
  const total = cards.length;
  document.getElementById('search-count').textContent = searchTerm || currentDiff !== 'all' ? `${visible} / ${total} 張` : '';
  // Show empty state
  let empty = document.querySelector('.empty-state');
  if (visible === 0) {
    if (!empty) {
      const grid = document.getElementById('cards-grid');
      grid.insertAdjacentHTML('beforeend', `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>找不到符合條件的知識卡片</p><small>試試其他關鍵字或調整篩選條件</small></div>`);
    }
  } else {
    if (empty) empty.remove();
  }
}

function toggleCard(id) {
  if (expandedCard && expandedCard !== id) {
    collapseCard(expandedCard);
  }
  const card = document.getElementById('card-' + id);
  const detail = document.getElementById('detail-' + id);
  if (card.classList.contains('expanded')) {
    collapseCard(id);
  } else {
    detail.style.maxHeight = detail.scrollHeight + 'px';
    card.classList.add('expanded');
    card.querySelector('.expand-label').textContent = '收合詳情';
    expandedCard = id;
  }
}

function collapseCard(id) {
  const card = document.getElementById('card-' + id);
  const detail = document.getElementById('detail-' + id);
  if (!card) return;
  detail.style.maxHeight = '0';
  card.classList.remove('expanded');
  card.querySelector('.expand-label').textContent = '展開詳情';
  if (expandedCard === id) expandedCard = null;
}

function copyFormula(id, btn) {
  const text = document.getElementById('formula-' + id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已複製 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
  });
}

function observeCards() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => {
          entry.target.classList.add('visible');
        }, Math.min(i * 80, 400));
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.card:not(.visible)').forEach(c => observer.observe(c));
}

// Nav scroll shadow
window.addEventListener('scroll', () => {
  document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 10);
});

// Search
document.getElementById('search-input').addEventListener('input', function() {
  searchTerm = this.value.trim();
  applyFilters();
});

// Init
document.addEventListener('DOMContentLoaded', () => {
  renderSection('technical');
  updateFilterBarColors();
  requestAnimationFrame(updateTabIndicator);
});

// Update indicator on resize
window.addEventListener('resize', updateTabIndicator);
</script>
</body>
</html>
