<script>
const CAT={cfb:'期貨基礎',ctw:'台指期實務',cus:'美股期實務',cck:'K棒量價',cth:'策略理論'};
const S='<svg viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">';
const E='</svg>';

const Q=[
// 期貨基礎 1-20
{c:'cfb',q:'期貨合約的最大特點是？',
o:['只能做多','可以做多也可以做空（雙向交易）','不需要保證金','到期自動變成股票'],a:1,
e:'<strong>期貨雙向交易</strong>：看漲可做多（買入合約），看跌可做空（賣出合約），這是期貨與股票最大的不同，使期貨在多空市場都能獲利。'},

{c:'cfb',q:'圖中期貨保證金制度：原始保證金10萬，維持保證金7萬，虧損後帳戶剩6萬，需補多少錢？',
s:S+`<rect x="20" y="20" width="60" height="80" fill="rgba(34,197,94,.15)" stroke="#22c55e" stroke-width="1" rx="3"/>`+
`<text x="50" y="42" fill="#22c55e" font-size="8" text-anchor="middle">原始</text>`+
`<text x="50" y="56" fill="#22c55e" font-size="8" text-anchor="middle">保證金</text>`+
`<text x="50" y="70" fill="#22c55e" font-size="9" text-anchor="middle" font-weight="700">10萬</text>`+
`<rect x="100" y="42" width="60" height="58" fill="rgba(245,158,11,.15)" stroke="#f59e0b" stroke-width="1" rx="3"/>`+
`<text x="130" y="62" fill="#f59e0b" font-size="8" text-anchor="middle">維持</text>`+
`<text x="130" y="76" fill="#f59e0b" font-size="9" text-anchor="middle" font-weight="700">7萬</text>`+
`<rect x="175" y="58" width="55" height="42" fill="rgba(239,68,68,.15)" stroke="#ef4444" stroke-width="1" rx="3"/>`+
`<text x="202" y="74" fill="#ef4444" font-size="8" text-anchor="middle">帳戶剩</text>`+
`<text x="202" y="88" fill="#ef4444" font-size="9" text-anchor="middle" font-weight="700">6萬</text>`+E,
o:['補1萬（到維持保證金）','補4萬（到原始保證金10萬）','不需要補','補3萬'],a:1,
e:'收到追繳通知（Margin Call）時，必須補回至<strong>原始保證金</strong>水準（10萬），而非只補到維持保證金（7萬）。需補：10萬 - 6萬 = <strong>4萬元</strong>。'},

{c:'cfb',q:'台指期貨（大台）每點價值多少元新台幣？',
o:['50元','100元','200元','500元'],a:2,
e:'台指期（大台）<strong>每點200元新台幣</strong>。台指漲100點獲利20,000元；小台（MXF）每點50元，為大台的1/4。'},

{c:'cfb',q:'圖示：期貨合約「正向市場（Contango）」的期限結構是？',
s:S+`<line x1="25" y1="10" x2="25" y2="110" stroke="#30363d" stroke-width="1"/>`+
`<line x1="25" y1="110" x2="220" y2="110" stroke="#30363d" stroke-width="1"/>`+
`<polyline points="30,80 80,70 130,58 180,45 220,35" fill="none" stroke="#22c55e" stroke-width="2"/>`+
`<text x="168" y="28" fill="#22c55e" font-size="8">近低遠高</text>`+
`<text x="30" y="100" fill="#8b949e" font-size="8">近月</text>`+
`<text x="185" y="100" fill="#8b949e" font-size="8">遠月</text>`+E,
o:['近月價格高於遠月（逆向市場）','遠月價格高於近月（正向期限結構）','各月份價格相同','無法判斷'],a:1,
e:'<strong>正向市場（Contango）</strong>：遠月合約價格高於近月，是多數商品和指數期貨的正常狀態，反映持倉成本（利率、倉儲費）。VIX期貨處於Contango時，做空VIX策略較有利。'},

{c:'cfb',q:'期貨「逐日盯市（Mark to Market）」制度的意義是？',
o:['只在到期日結算損益','每個交易日結束時結算損益，直接從帳戶中扣除或增加','每週結算一次','每月結算一次'],a:1,
e:'<strong>逐日盯市</strong>：每天收盤後依結算價結算當日損益，直接從帳戶餘額中扣除或增加，這是期貨與股票最重要的差異之一，也是保證金制度能運作的基礎。'},

{c:'cfb',q:'圖示：做多期貨，買入價17,000，若現在17,500，獲利為多少？（大台）',
s:S+`<line x1="30" y1="70" x2="210" y2="70" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>`+
`<text x="215" y="74" fill="#f59e0b" font-size="8">17,000</text>`+
`<line x1="30" y1="30" x2="210" y2="30" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>`+
`<text x="215" y="34" fill="#22c55e" font-size="8">17,500</text>`+
`<line x1="120" y1="30" x2="120" y2="70" stroke="#22c55e" stroke-width="2"/>`+
`<text x="100" y="52" fill="#22c55e" font-size="9">+500點</text>`+E,
o:['獲利5,000元','獲利50,000元（500點×100元）','獲利100,000元（500點×200元）','獲利10,000元'],a:2,
e:'大台每點200元，漲500點獲利 = 500 × 200 = <strong>100,000元（10萬元）</strong>。這也展示了期貨槓桿的威力（保證金約8萬，獲利10萬，報酬率逾100%）。'},

{c:'cfb',q:'「空單」（賣出期貨合約）的獲利條件是？',
o:['期貨指數上漲','期貨指數下跌','指數不動','成交量增加'],a:1,
e:'空單（賣出期貨）= 做空：預期期貨指數<strong>下跌</strong>才獲利。賣出價格 > 買回價格 = 賺取差價。期貨的做空比股票融券更方便，無需借券成本。'},

{c:'cfb',q:'台指期的結算方式是？',
o:['實物交割（交割股票）','現金結算（依結算價差計算損益）','選擇實物或現金','到期自動平倉'],a:1,
e:'台指期採<strong>現金結算</strong>：到期日（每月第三個週三）依結算價計算損益，以現金轉帳，不需要實際交割股票。結算價為當日現貨加權指數開盤後30分鐘均價。'},

{c:'cfb',q:'期貨的「槓桿倍數」如何計算？',
s:S+`<text x="20" y="30" fill="#f59e0b" font-size="10" font-weight="700">槓桿 = 合約價值 ÷ 保證金</text>`+
`<text x="20" y="55" fill="#8b949e" font-size="9">台指期合約價值：</text>`+
`<text x="20" y="72" fill="#22c55e" font-size="9">17,000點 × 200元 = 340萬</text>`+
`<text x="20" y="90" fill="#8b949e" font-size="9">原始保證金約 84,000元</text>`+
`<text x="20" y="108" fill="#ef4444" font-size="9">槓桿 ≈ 340萬 ÷ 8.4萬 ≈ 40倍</text>`+E,
o:['固定10倍','槓桿 = 合約總價值 ÷ 保證金，台指期約30-50倍','固定5倍','不計算槓桿'],a:1,
e:'期貨槓桿 = 合約總價值 ÷ 保證金。台指期大台合約價值約340萬，保證金約8.4萬，<strong>槓桿約40倍</strong>。槓桿越大，風險越高，指數每動1%帳戶就波動40%。'},

{c:'cfb',q:'期貨「換月（Rollover）」的操作是？',
o:['賣出遠月合約、買入近月合約','平掉即將到期的近月合約、買入下一個月份的遠月合約','同時做多和做空','選擇更高流動性的合約'],a:1,
e:'<strong>換月</strong>：將即將到期的合約平倉，同時在遠月（下個月份）重新建立相同方向的部位，讓持倉延續。換月時需注意近遠月價差（正價差/逆價差）對成本的影響。'},

{c:'cfb',q:'「正價差」（期貨價格 > 現貨價格）的含義通常是？',
s:S+`<rect x="20" y="30" width="80" height="50" fill="rgba(34,197,94,.1)" stroke="#22c55e" stroke-width="1" rx="4"/>`+
`<text x="60" y="52" fill="#22c55e" font-size="9" text-anchor="middle">現貨</text>`+
`<text x="60" y="67" fill="#22c55e" font-size="9" text-anchor="middle" font-weight="700">18,000</text>`+
`<rect x="140" y="15" width="80" height="65" fill="rgba(245,158,11,.1)" stroke="#f59e0b" stroke-width="1" rx="4"/>`+
`<text x="180" y="40" fill="#f59e0b" font-size="9" text-anchor="middle">期貨</text>`+
`<text x="180" y="55" fill="#f59e0b" font-size="9" text-anchor="middle" font-weight="700">18,120</text>`+
`<text x="60" y="105" fill="#f59e0b" font-size="8" text-anchor="middle">期貨 > 現貨 = 正價差</text>`+E,
o:['市場看空','正價差 — 市場偏多，資金願意為未來支付溢價','空頭訊號','利率為零'],a:1,
e:'期貨正價差（期貨 > 現貨）代表市場<strong>偏多</strong>：投資人願意為未來的現貨支付溢價。正價差的幅度反映持倉成本（資金成本 + 股息）。正價差越大，代表市場越樂觀。'},

{c:'cfb',q:'期貨「逆價差」（期貨 < 現貨）通常代表什麼市場訊號？',
o:['市場非常樂觀','逆價差（Backwardation）— 市場悲觀或商品供給短缺','利率上升','外資做多'],a:1,
e:'<strong>逆價差</strong>：期貨 < 現貨，代表市場對未來預期悲觀（股指）或當前商品供給短缺（大宗商品）。在股指期貨中，逆價差通常出現在市場恐慌或空頭格局時。'},

{c:'cfb',q:'「小台指（MXF）」相對於「大台（TX）」的主要差異是？',
o:['追蹤不同指數','小台每點50元，大台每點200元，小台適合資金較少者','小台只能做多','小台無法選擇交割月份'],a:1,
e:'小台（MXF）與大台（TX）追蹤相同的加權指數，但<strong>小台每點50元</strong>（大台的1/4），保證金也相應降低，適合初學者或資金較少的投資人，風控更靈活。'},

{c:'cfb',q:'台灣期交所的期貨交易時間（日盤）是？',
o:['8:00–16:00','8:45–13:45','9:00–15:00','8:30–14:30'],a:1,
e:'台指期日盤交易時間：<strong>8:45–13:45</strong>（現貨開盤前15分鐘至現貨收盤後15分鐘）。夜盤時間：15:00–05:00（隔日凌晨）。'},

{c:'cfb',q:'「停損單（Stop Loss Order）」在期貨中的作用是？',
o:['鎖定最大獲利','當虧損達到設定點位時自動平倉，限制損失','增加保證金','取消持倉'],a:1,
e:'停損單：預先設定虧損上限，<strong>當期貨價格觸及設定價位時自動平倉</strong>，防止虧損擴大。期貨槓桿高，沒有停損可能在短時間內造成重大損失。'},

{c:'cfb',q:'做多1口大台，若指數下跌100點，虧損多少？',
o:['虧損5,000元','虧損10,000元','虧損20,000元（100×200）','虧損50,000元'],a:2,
e:'大台每點200元，跌100點虧損 = 100 × 200 = <strong>20,000元（2萬元）</strong>。這就是設定停損的重要性：若不停損，跌500點即虧損10萬元。'},

{c:'cfb',q:'期貨合約中的「未平倉量（Open Interest）」代表什麼？',
o:['當日成交量','市場上所有未平倉合約的總口數，反映市場資金投入程度','本週最大成交量','外資持倉口數'],a:1,
e:'<strong>未平倉量（OI）</strong>：目前仍未平倉的合約總數（一多一空算一口）。OI增加代表新資金進場，趨勢延續可能性高；OI減少代表資金撤出，趨勢可能轉弱。'},

{c:'cfb',q:'台指期貨的到期結算日是每月第幾個週幾？',
o:['第一個週一','第二個週五','第三個週三','第四個週四'],a:2,
e:'台指期結算日為<strong>每月第三個週三</strong>。結算價為當日現貨開盤後30分鐘（9:00–9:30）的加權指數均價。結算前後通常波動較大。'},

{c:'cfb',q:'「期貨多空比」如何計算？代表什麼？',
s:S+`<rect x="20" y="30" width="90" height="60" fill="rgba(34,197,94,.15)" stroke="#22c55e" stroke-width="1" rx="4"/>`+
`<text x="65" y="55" fill="#22c55e" font-size="9" text-anchor="middle">多方未平倉</text>`+
`<text x="65" y="72" fill="#22c55e" font-size="10" text-anchor="middle" font-weight="700">60%</text>`+

{c:'cfb',q:'在期貨交易中，「平倉」是指什麼操作？',

e:'<strong>平倉</strong>：建立與原持倉方向相反的交易，將合約歸零：①做多口→賣出平倉 ②做空口→買入回補平倉。平倉後損益確定，帳戶回到無倉位狀態。'},

{c:'ctw',q:'台指期夜盤時間段，若美股道瓊下跌500點，台指期夜盤通常如何反應？',

{c:'ctw',q:'台指期早盤（8:45–9:15）若開盤即爆量走高，且持續不回頭，操作方向？',

{c:'ctw',q:'外資現貨買超50億元，同時期貨淨空單增加2000口，這代表？',

{c:'ctw',q:'台指期操作中，「抱波段」最適合的進場條件是？',
o:['短線過熱時進場','均線多頭排列+量能配合+技術指標未超買時，第一波起漲後的回測','任何時候都可進場','只看日線K棒'],a:1,
e:'最佳波段進場：均線多頭排列、量能健康、技術指標未超買，且在<strong>第一波上漲後的正常回測（縮量）</strong>進場，此時風險最低、持倉最舒適，停損清晰。'},

{c:'ctw',q:'台指期連續三根跳空缺口後急漲，稱為什麼現象？如何操作？',

{c:'cus',q:'美股期貨的COT報告由哪個機構發布？多久更新一次？',

{c:'cus',q:'美股三大期貨指數中，哪個追蹤科技股最多且波動最大？',

e:'<strong>NQ（納斯達克100期貨）</strong>成分股高度集中於科技大型股（蘋果、微軟、輝達等），波動性最大，Alpha程度高。科技股強勢時NQ表現優於ES，弱勢時跌幅也更大。'},

{c:'cus',q:'美股期貨「Triple Witching（三巫日）」每年發生幾次？在哪一天？',

{c:'cus',q:'FOMC會議聲明發布時，美股期貨的操作建議是？',
o:['聲明前大倉位押注方向','聲明前縮小或平掉部位，等聲明後方向確立再進場','聲明後不要操作','做多美元期貨'],a:1,
e:'FOMC聲明含不確定性極高，聲明前任何方向都可能損失慘重（雙向閃崩常見）。最佳策略：<strong>聲明前縮倉或平倉</strong>，等聲明後市場方向確立（通常5-15分鐘後）再進場。'},

{c:'cus',q:'美國非農就業報告（NFP）每月幾號公布？通常在美東時間幾點？',

e:'美國非農就業報告（Non-Farm Payrolls）於<strong>每月第一個週五美東08:30（台灣夏令20:30，冬令21:30）</strong>公布，是最重要的月度經濟數據，對ES/NQ影響極大。'},

e:'ES突破200MA（年線）且放量收長紅，是最重要的長期多頭訊號：<strong>年線成為關鍵支撐</strong>。歷史上ES在年線以上時，長期持多的勝率極高。'},

{c:'cus',q:'美股期貨的「Gamma Squeeze」效應通常如何發生？',
o:['美聯儲降息時自動觸發','大量Call選擇權的Delta對沖引發正向回饋循環，短時間大漲','成交量突然縮小','外資集中買進'],a:1,
e:'Gamma Squeeze：大量Call選擇權購買 → 造市商賣出Call被迫買入股票對沖Delta → 股票上漲 → Delta增加 → 造市商買更多股票 → <strong>正向回饋造成短時間急漲</strong>，常見於GME等軋空行情。'},

e:'空頭排列中，50MA是主要壓力線，反彈至此被賣壓打回代表<strong>空頭趨勢確認</strong>。這是加碼空單的最佳機會，停損設50MA之上，目標前低或更低。'},

{c:'cus',q:'VIX期貨當前處於Backwardation（逆向期限結構，近月>遠月），代表？',
o:['市場平靜，做空VIX獲利','市場極度恐慌，近期風險高，不宜做空VIX','趨勢延續','利率上升訊號'],a:1,
e:'VIX Backwardation：近月VIX期貨>遠月，代表市場對<strong>近期風險的擔憂遠超長期</strong>，市場處於恐慌狀態。此時做空VIX（如SVXY）風險極高，應持現金等待恐慌消退。'},

{c:'cus',q:'美股期貨「大型投機商」在COT報告中創下歷史最高淨多頭，通常代表？',
o:['100%的做多訊號','大型投機商已過度傾向多頭，可能是頂部警訊（反向指標）','持續多頭可加倉','無法判斷'],a:1,
e:'COT大型投機商（趨勢追隨者）淨多倉達歷史極值時，反而可能是<strong>頂部警訊</strong>：市場已過度樂觀，軋空風險下降，獲利了結的空間更大。COT極端值是經典的反向指標。'},

{c:'cus',q:'ES期貨做多1口，入場5,000點，止損4,950點，目標5,100點，風險報酬比是？',
o:['1:1','1:2','2:1','1:0.5'],a:1,
e:'風險 = 5,000 - 4,950 = 50點；回報 = 5,100 - 5,000 = 100點。<strong>風險報酬比 = 1:2</strong>（每冒1單位風險，預期賺2單位回報）。一般要求至少1:2才是良好的交易設置。'},

{c:'cus',q:'「季節性效應」中，美股通常哪個季節表現最強？',
o:['夏季（7-8月）','秋季（9-10月），稱為Halloween效應','11月到4月（秋冬春）整體表現優於5-10月','1月效應最強，1月最強'],a:2,
e:'統計上美股「<strong>11月到4月</strong>」整體表現優於5月到10月（「5月賣股離場」的由來）。但此規律非絕對，近年隨AI浪潮季節性效應有所弱化。'},

e:'美股高開低走（開盤強勢但隨後回落）是<strong>多頭陷阱</strong>訊號：開盤吸引散戶追多後主力出貨。若在重要阻力位附近出現，做空訊號更強，停損設開盤高點以上。'},

{c:'cus',q:'「ES/NQ背離」：若ES持平但NQ大漲，代表什麼市場訊號？',
o:['整體市場強勁，做多所有期貨','科技股獨強，其他板塊落後，行情廣度不佳，注意風險','空頭格局','市場均衡'],a:1,
e:'ES代表整體市場（500檔股），NQ代表科技股（100檔），若<strong>NQ獨漲而ES不跟</strong>，代表行情集中在科技股、其他板塊落後，行情廣度不佳，這種「窄幅上漲」往往不可持續。'},

{c:'cus',q:'美股期貨在美東15:45-16:00最後15分鐘，成交量激增代表？',
o:['長線投資者買入','機構基金進行收盤前調倉，波動劇烈，散戶應謹慎','趨勢最強時段','換月效應'],a:1,
e:'美股收盤前15分鐘是<strong>機構基金收盤調倉</strong>的高峰，大量指數型ETF和基金按收盤價調整持倉，成交量激增且方向難以預測。散戶應避免在此時段進出，以免被波動掃出。'},

{c:'cus',q:'美國CPI通膨數據超預期偏高，對ES期貨的短期影響通常是？',
o:['ES上漲，通膨代表經濟好','ES下跌（市場預期Fed維持高利率甚至加息）','ES不受影響','隔日才有影響'],a:1,
e:'CPI超預期偏高 → 市場預期Fed<strong>不降息甚至加息</strong> → 資金成本上升 → 高估值股票受壓 → ES（特別是NQ）<strong>通常下跌</strong>。反之，CPI低於預期 → 降息預期升溫 → ES上漲。'},

e:'下跌趨勢中量縮說明<strong>賣壓在減輕</strong>，空頭動能不足，後續可能進入整理或反彈。空單持有者可適度減倉鎖利，等量能再度放大後再決定下一步方向。'},

{c:'cck',q:'台指期5分鐘K棒，開盤爆量後縮量整理，午盤再度放量突破盤整區上緣，代表？',
o:['換月現象','午盤放量突破 — 行情再啟動，可追多操作','量縮整理危機','指數即將反轉'],a:1,
e:'早盤爆量後縮量整理是正常「換手」過程；午盤再度放量突破整理區高點代表<strong>多頭再度主導</strong>，行情重新啟動，是追多的好機會，停損設整理區間低點。'},

// 策略理論 81-100
{c:'cth',q:'期貨「對沖（Hedge）」策略的目的是？',
o:['追求最大獲利','降低已有部位的風險，以相反方向的期貨對沖','套利期現差','增加槓桿'],a:1,
e:'<strong>對沖策略</strong>：持有股票多頭的投資者，同時賣出等值期貨空單，鎖定下跌風險，保護持股價值。雖然犧牲部分上漲獲利，但大幅降低市場下跌時的損失。'},

{c:'cth',q:'「期貨套利」的基本原理是？',
o:['預測市場方向','利用市場定價失效（如期現差、月間價差），在兩個市場同時做相反方向操作獲利','利用槓桿放大獲利','只做多不做空'],a:1,
e:'期貨套利：當<strong>期貨定價出現偏差</strong>（相對於現貨或其他月份合約），同時在兩個市場建立相反部位，等價差回歸時獲利，理論上是「無風險套利」（但實際有執行風險）。'},

{c:'cth',q:'「日內交易（Day Trading）」與「波段交易（Swing Trading）」的主要差異是？',
o:['盈虧計算方式不同','日內交易當天平倉（無隔夜倉），波段交易持倉數天至數週','使用不同的期貨合約','保證金要求不同'],a:1,
e:'<strong>日內交易</strong>：當天建倉、當天平倉，不持有隔夜倉位，規避隔夜風險但成本高、精力消耗大。<strong>波段交易</strong>：持倉數天到數週，捕捉中期趨勢，但承擔隔夜風險。'},

{c:'cth',q:'「風險報酬比（Risk/Reward Ratio）」1:3的含義是？',
o:['每賺3元需要3元風險','每冒1元風險，目標獲利3元','固定每筆獲利3%','停損3%停利1%'],a:1,
e:'風險報酬比1:3：<strong>每冒1單位風險，期望獲得3單位回報</strong>。即使勝率只有40%，只要報酬比維持1:3，長期下來仍能獲利（40%×3 - 60%×1 = 0.6，期望值正值）。'},

{c:'cth',q:'「倉位管理（Position Sizing）」中，凱利公式的用途是？',
o:['計算最佳停損點','根據勝率和賠率計算最優倉位比例，最大化長期資金成長','計算期貨保證金','確定交易時機'],a:1,
e:'凱利公式（Kelly Criterion）：<strong>最佳倉位% = 勝率 - (1-勝率)/賠率</strong>。在已知勝率和賠率的情況下，給出使長期資金成長最大化的最優倉位比例，但實際建議使用半凱利（更保守）。'},

{c:'cth',q:'「趨勢跟蹤策略（Trend Following）」的核心原則是？',
o:['在頂部做空、底部做多','跟隨已確立的趨勢方向操作，不預測趨勢頂底','根據基本面操作','使用高頻算法'],a:1,
e:'趨勢跟蹤：<strong>「趨勢是你的朋友」</strong>，確立上升趨勢後只做多、下降趨勢後只做空。不預測頂底，而是等趨勢確立後進場，趨勢反轉時出場，適合中長線操作。'},

{c:'cth',q:'「均值回歸策略（Mean Reversion）」在期貨中的應用是？',
o:['跟隨趨勢做多或做空','當期貨偏離均線或合理定價過大時，押注回歸均值','只操作結算日','根據COT操作'],a:1,
e:'均值回歸：<strong>期貨偏離合理價值過大時反向布局</strong>，如乖離率過大時做反向、PCR極端時逆向等。此策略在震盪市中效果好，但在強趨勢市場容易被消滅。'},

{c:'cth',q:'期貨交易的「交易日誌」最重要的是記錄什麼？',
o:['每日獲利金額','進出場時機、理由、事後評估（對錯在哪）和情緒狀態，用以改進交易系統','只記錄獲利的交易','記錄新聞事件'],a:1,
e:'<strong>交易日誌</strong>不只是記錄損益，最重要的是記錄<strong>進出場理由</strong>（是否符合系統）、事後評估和情緒狀態，從中找出決策偏誤，持續優化交易系統。'},

{c:'cth',q:'台指期貨「自動化交易（程式交易）」的主要優點是？',
o:['絕對不會虧損','排除情緒影響，嚴格執行交易規則，可同時監控多個訊號','可以預測市場','槓桿更高'],a:1,
e:'程式交易優點：①<strong>排除情緒（恐懼/貪婪）</strong> ②嚴格執行停損 ③可同時監控多個策略或品種 ④可24小時運行（夜盤）。缺點是過度擬合歷史、參數失效等風險。'},

{c:'cth',q:'「回測（Backtesting）」策略時，「過度擬合（Overfitting）」的問題是？',
o:['回測速度太慢','策略過度優化歷史數據，看起來完美但實際交易表現差','缺乏歷史數據','技術指標不足'],a:1,
e:'過度擬合：策略參數被過度優化到符合歷史數據，<strong>但未來實際表現通常遠差於回測</strong>。解決方法：使用樣本外數據驗證（Walk Forward Testing）、保持策略簡單、使用統計顯著的規則。'},

{c:'cth',q:'「最大回撤（Maximum Drawdown, MDD）」衡量什麼？',
o:['最大單筆獲利','從最高點到最低點的最大虧損幅度，衡量策略最壞情況','平均獲利','夏普比率'],a:1,
e:'MDD（最大回撤）= 從資金最高峰到最低谷的最大跌幅比例。若MDD=30%，代表策略曾出現資金縮水30%。<strong>MDD是衡量策略風險最重要的指標</strong>，應保持在可承受範圍內。'},

{c:'cth',q:'台指期的「選擇權（Options）」中，買入Call（買權）的獲利條件是？',
o:['指數下跌','指數上漲（超過行使價+權利金）','指數不動','成交量增加'],a:1,
e:'<strong>買Call（做多方向）</strong>：當台指期上漲超過（行使價 + 付出的權利金），開始獲利。最大損失 = 付出的權利金；最大獲利 = 理論上無上限。適合看多但不確定幅度時使用。'},

{c:'cth',q:'「夏普比率（Sharpe Ratio）」在評估交易策略時代表什麼？',
o:['只看總報酬率','報酬率÷標準差，衡量每單位風險的回報，越高越好','最大回撤','勝率'],a:1,
e:'<strong>夏普比率 = (策略報酬 - 無風險利率) ÷ 報酬標準差</strong>。衡量每承擔一單位波動風險能獲得多少超額報酬，>1良好，>2優秀。同等報酬下夏普比率越高越穩定。'},

{c:'cth',q:'期貨操作中「不要和趨勢作對（Don\'t fight the trend）」的實際含義是？',
o:['永遠不做空','當大趨勢向上時以做多為主，大趨勢向下時以做空為主，不逆勢操作','只做短線','永遠持倉'],a:1,
e:'最重要的操作原則：在多頭趨勢中<strong>做多勝率更高</strong>，在空頭趨勢中<strong>做空勝率更高</strong>。逆勢操作不是不可為，但需要更嚴格的進場標準和更緊的停損。'},

{c:'cth',q:'「情緒交易（Emotional Trading）」最常見的危害是？',
o:['操作時間太長','恐懼導致不執行停損、貪婪導致不獲利了結，最終虧損加劇','過度分散投資','交易頻率太低'],a:1,
e:'情緒交易是大多數交易者失敗的根本原因：<strong>虧損時希望反彈不停損（越套越深），獲利時急於了結（獲利過少）</strong>，形成「截利留損」的惡性循環，持續侵蝕帳戶。'},

{c:'cth',q:'台指期貨操作中，「換月差（Calendar Spread）」策略是指？',
o:['在同一合約月份做多空','同時做多近月、做空遠月（或相反），押注兩個月份價差的變化','只操作到期合約','不換月持倉到結算'],a:1,
e:'<strong>月間價差交易（Calendar Spread）</strong>：同時買近月賣遠月（或反之），賺取兩合約間的價差變化。優點是絕對價格風險低（方向中性），只需判斷近遠月相對強弱，比純方向性操作風險更低。'},

{c:'cth',q:'「帳戶最大風險」的業界通用標準是？',
o:['單筆交易最多虧損50%','單筆交易虧損不超過帳戶的1-2%，月度最大虧損不超過6-10%','每筆交易固定金額','不設限制'],a:1,
e:'業界通用風控標準：<strong>單筆虧損 ≤ 帳戶2%</strong>（即使連虧10筆也只損20%）；月度最大回撤≤10%，超過則停止交易本月。這是職業交易員的基本守則，業餘者更應嚴格遵守。'},

{c:'cth',q:'進入交易前，「交易計畫（Trading Plan）」應包含哪些要素？',
o:['只記錄目標價位','進場條件、停損價、目標獲利、倉位大小、預期風險報酬比','只設停損','隨機決定進出'],a:1,
e:'完整的<strong>交易計畫</strong>應包含：①進場條件（哪些訊號觸發）②停損點（最大可接受虧損）③目標獲利（至少1:2報酬比）④倉位大小（根據風控計算）⑤市場條件（趨勢判斷）。進場前計劃好，執行時才不受情緒影響。'},

{c:'cth',q:'「回調進場法（Pullback Entry）」的最大優點是？',
o:['在最高點買入','在趨勢確立後的正常回測低點進場，停損清晰、風險報酬比好','不需要分析','只適合長線投資'],a:1,
e:'回調進場法優點：①<strong>在趨勢確立後進場</strong>（不需預測頂底）②在回調低點買入<strong>停損清晰</strong>（設在回調低點以下）③風險報酬比更好（買低而非買高）。是最穩健的進場策略之一。'},

{c:'cth',q:'台指期貨操作，若當日行情完全不在你的預期內，最佳選擇是？',
o:['加大倉位對抗市場','立即出場等待，「不確定時不操作」是最高原則','加碼攤平','換方向操作'],a:1,
e:'<strong>「不確定時，不操作」</strong>是期貨最重要的守則之一。當行情不在預期方向、市場邏輯不清楚時，<strong>空倉等待是正確選擇</strong>。保住資金、等待清晰機會，比強迫交易更重要。'}
];

let correct=0,wrong=0,answered=new Set();
function upScore(){
  document.getElementById('nc').textContent=correct;
  document.getElementById('nw').textContent=wrong;
  document.getElementById('nt').textContent=answered.size;
}
function resetAll(){
  correct=0;wrong=0;answered.clear();upScore();
  document.querySelectorAll('.opt').forEach(b=>{b.className='opt';b.disabled=false});
  document.querySelectorAll('.explain').forEach(e=>e.classList.remove('show'));
}
function answer(btn,qid,isCorrect){
  if(answered.has(qid))return;
  answered.add(qid);
  const card=btn.closest('.qcard');
  card.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===Q[qid].a) b.classList.add(isCorrect?'correct':'show-correct');
  });
  if(!isCorrect) btn.classList.add('wrong');
  if(isCorrect)correct++;else wrong++;
  upScore();
  card.querySelector('.explain').classList.add('show');
}
function filt(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.qcard').forEach(c=>{
    c.style.display=(cat==='all'||c.classList.contains(cat))?'':'none';
  });
}
function render(){
  const g=document.getElementById('grid');
  Q.forEach((q,i)=>{
    const d=document.createElement('div');
    d.className='qcard '+q.c;
    const opts=q.o.map((o,j)=>`<button class="opt" onclick="answer(this,${i},${j===q.a})">${String.fromCharCode(65+j)}. ${o}</button>`).join('');
    d.innerHTML=`<div class="qhead"><div class="qnum">${i+1}</div><div class="qmeta"><span class="qtag">${CAT[q.c]}</span><div class="qtext">${q.q}</div></div></div>`+
      (q.s?`<div class="qsvg">${q.s}</div>`:'')+
      `<div class="opts">${opts}</div><div class="explain">${q.e}</div>`;
    g.appendChild(d);
  });
}
render();
</script>
