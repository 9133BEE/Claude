body:`<h3>ES — 全球最重要的期貨合約</h3>
<p>ES追蹤S&amp;P 500指數，每點價值$50美元，最小跳動0.25點=$12.5。若S&amp;P 500在5,000點，一口ES合約市值 = 5,000 × $50 = $250,000美元。日均成交量超過100萬口，是全球流動性最好的期貨。</p>
<div class="formula">ES損益計算範例：
買入ES @ 5,000點，賣出 @ 5,020點
獲利 = (5,020 - 5,000) × $50 = $1,000 USD（約3萬台幣）

跌10點（-0.2%）虧損 = 10 × $50 = $500 USD（約1.5萬台幣）
（保證金$11,000，跌10點 = -4.5%的保證金）</div>
<h3>NQ — 科技股高槓桿代表</h3>
<p>NQ追蹤NASDAQ 100指數，成分股包含蘋果、微軟、Nvidia、Google等科技巨頭。每點$20，但NASDAQ波動幅度通常比S&amp;P 500大50–80%，每日波動50–150點（ES只有30–80點）。</p>
<div class="formula">NQ損益計算：
NQ @ 20,000點時，1口合約市值 = 20,000 × $20 = $400,000
漲50點獲利 = 50 × $20 = $1,000
跌100點虧損 = 100 × $20 = $2,000（大約-11.8%保證金）</div>
<h3>MES / MNQ — 新手的最佳起點</h3>
<div class="hl"><b>為什麼從Micro合約開始？</b><br>
MES是ES的1/10，MNQ是NQ的1/10。保證金約$1,200–$1,600，每次盈虧也是ES/NQ的1/10。<br>
重要的是：MES和ES走勢完全一樣，只是每點金額不同。用MES練習，學到的技術完全可以轉移到ES。</div>
<table class="cmp-table">
<tr><th>合約</th><th>標的</th><th>每點</th><th>最小跳動</th><th>保證金（約）</th><th>適合</th></tr>
<tr><td>ES</td><td>S&amp;P 500</td><td>$50</td><td>$12.5</td><td>$11,000</td><td>熟練交易者</td></tr>
<tr><td>NQ</td><td>NASDAQ 100</td><td>$20</td><td>$5</td><td>$17,000</td><td>波段/高波動偏好</td></tr>
<tr><td>MES</td><td>S&amp;P 500</td><td>$5</td><td>$1.25</td><td>$1,200</td><td>新手/初學</td></tr>
<tr><td>MNQ</td><td>NASDAQ 100</td><td>$2</td><td>$0.5</td><td>$1,600</td><td>新手/NASDAQ偏好</td></tr>
<tr><td>YM</td><td>道瓊工業（30檔）</td><td>$5/點</td><td>$5</td><td>$9,000</td><td>進階</td></tr>
</table>
<h3>合約到期與展倉</h3>
<div class="kp-box">
ES/NQ採季度到期（3月/6月/9月/12月第三個週五）。<br>
到期前一週，成交量會移至下一季合約（換倉）。<br>
近月合約（最活躍）代碼：ES H4（H=3月, M=6月, U=9月, Z=12月）<br>
換倉成本：正逆價差，通常1–3點，遠小於台指期。
</div>`,

body:`<h3>S&P 500 — 最代表性的美股指數</h3>
<p>S&amp;P 500涵蓋美國500家最大上市公司，採市值加權法。當市場說「美股漲跌多少」，通常指的就是S&amp;P 500。前5大成分股（蘋果、微軟、Nvidia、Google、Amazon）合計佔比約26%。</p>
<div class="kp-box">
<b>S&amp;P 500 重要特性：</b><br>
• 最穩定、波動相對最小的大型指數<br>
• ES（期貨）是全球日均成交量最大的期貨合約<br>
• 聯準會貨幣政策、利率變化對S&amp;P影響最直接<br>
• TOPSTEP評估帳戶最主流的交易標的
</div>
<h3>NASDAQ 100 — 科技股主宰</h3>
<p>NASDAQ 100只包含在納斯達克上市的100大非金融企業，科技股佔比高達60%。AI概念股（Nvidia）、雲端（微軟/Google）、消費科技（蘋果/Amazon）是主要驅動力。NQ波動幅度通常比ES大50–80%。</p>
<div class="eg"><b>NASDAQ vs S&P 波動差異範例</b><br>
同一天市場大跌：S&amp;P 500跌2% vs NASDAQ 100跌3.5%<br>
同一天財報利多：S&amp;P 500漲1.5% vs NASDAQ 100漲2.8%<br>
台積電（TSMC ADR）在NASDAQ，對NQ有一定影響力。</div>
<h3>該選ES還是NQ？</h3>
<table class="cmp-table">
<tr><th>你的情況</th><th>推薦選擇</th><th>理由</th></tr>
<tr><td>剛開始學美股期貨</td><td>MES（微型ES）</td><td>最穩定、流動性最好、門檻最低</td></tr>
<tr><td>關注AI/科技板塊</td><td>MNQ（微型NQ）</td><td>Nvidia/蘋果財報對NQ影響最直接</td></tr>
<tr><td>TOPSTEP評估帳戶</td><td>ES或NQ（標準合約）</td><td>Micro合約保證金過低，不符合Combine帳戶要求</td></tr>
<tr><td>波段操作（持倉數天）</td><td>ES</td><td>波動相對可控，隔夜風險較小</td></tr>
<tr><td>日內短線（當沖）</td><td>NQ</td><td>日內波動大，獲利機會更多</td></tr>
</table>
<h3>相關性與市場連動</h3>
<div class="formula">指數相關性（長期）：
ES 與 NQ：相關係數 ≈ 0.92（高度相關，但NQ放大）
ES 與 DJIA：相關係數 ≈ 0.88（較高但有差異）

台指期 與 ES：相關係數 ≈ 0.7–0.8（美股漲，台指通常跟）
台積電比重大，NQ財報季對台指有直接影響

黃金 與 ES：負相關（恐慌時黃金↑，ES↓）
美元指數（DXY）：與ES負相關（美元強→ES承壓）</div>`,

body:`<h3>最重要：非農就業報告（NFP）</h3>
<div class="hl"><b>每月第一個週五，台灣時間20:30（冬令時21:30）發布</b><br>
非農就業（Non-Farm Payrolls）是美國最重要的就業數據。Fed的雙重任務：「物價穩定」和「充分就業」——就業數據直接影響Fed的利率決策。</div>
<div class="formula">非農解讀框架：
預期就業新增18萬人
實際數據 &gt; 預期（如25萬）：
  就業強勁 → Fed可能維持高利率更久 → 股市短期承壓
  但若通膨同步下降，市場可能反應正面

實際數據 &lt; 預期（如8萬）：
  就業疲弱 → Fed可能更快降息 → 股市短期受惠
  但若擔憂經濟衰退，市場可能恐慌式下跌

讀取關鍵：一次數據不算趨勢，連續3個月看趨勢方向</div>
<h3>CPI通貨膨脹數據</h3>
<div class="kp-box">
<b>發布時間：</b>每月中旬，台灣時間20:30（美東8:30 AM）<br>
<b>核心CPI</b>（排除食品能源）才是Fed最重視的數字。<br>
CPI年增率&gt;目標（2%）→ 偏鷹派 → 升息/維持高利率<br>
CPI年增率&lt;目標 → 偏鴿派 → 降息預期升溫<br><br>
<b>交易策略</b>：數據公布前不持大倉，公布後等5分鐘K線確認方向再進場。
</div>
<h3>FOMC利率決策（最大風險事件）</h3>
<div class="formula">FOMC 2024年日程（台灣時間凌晨02:00）：
1月31日、3月20日、5月1日、6月12日
7月31日、9月18日、11月7日、12月18日

決策當天操作建議：
1. 凌晨01:45前：縮倉至1/4正常倉位
2. 02:00：聯準會聲明發布，ES可能跳動50–150點
3. 02:30左右：鮑爾記者會開始，更大的波動來源
4. 03:00後：方向確認後才考慮建立部位</div>
<h3>財報季（每季一次）</h3>
<div class="eg"><b>財報季對NQ的影響最大</b><br>
NASDAQ 100的前10大成分股（蘋果/微軟/Nvidia等）財報發布時，NQ可能在1小時內波動150–300點。<br>
Nvidia財報（通常5月/8月）近年對台積電ADR、半導體ETF影響巨大，也連帶影響台指期開盤。<br><br>
<b>策略</b>：財報前日減半倉位，財報後視反應方向再加倉。</div>
<div class="warn"><b>⚠️ 重大數據前的TOPSTEP規則</b>在使用TOPSTEP帳戶時，高波動數據（非農、CPI、FOMC）前後1小時的倉位必須特別謹慎。一次不良的數據反應就可能觸發每日虧損上限，導致當天被停止交易。</div>`,

body:`<h3>什麼是VIX？</h3>
<p>VIX（CBOE波動率指數）代表市場對未來30天S&amp;P 500波動率的「預期」。它由S&amp;P 500選擇權的隱含波動率計算得出，俗稱「恐慌指數」。VIX和ES/NQ通常呈<strong>負相關</strong>：市場跌，VIX漲；市場漲，VIX跌。</p>
<div class="formula">VIX 解讀規則：
VIX = 20 → 市場預期未來30天S&amp;P 500年化波動率為20%
  換算為日波動：20% / 16（sqrt 252） ≈ 1.25%/天
  ES在5,000點：預期每天波動 5,000 × 1.25% = 62.5點

VIX = 40 時（恐慌）：
  預期日波動 = 40% / 16 = 2.5%/天 = 125點（ES在5,000點）
  停損必須設得更寬，否則會被震出去</div>
<h3>VIX的交易應用</h3>
<table class="cmp-table">
<tr><th>VIX水位</th><th>市場狀態</th><th>期貨策略調整</th></tr>
<tr><td>&lt;15</td><td>極度平靜/貪婪</td><td>可積極做多趨勢；停損可略緊</td></tr>
<tr><td>15–20</td><td>正常</td><td>標準操作，風險報酬比2:1即可</td></tr>
<tr><td>20–30</td><td>緊張/不確定</td><td>縮倉50%；停損放寬1.5倍</td></tr>
<tr><td>30–50</td><td>恐慌</td><td>縮倉至25%；以短線小目標為主</td></tr>
<tr><td>&gt;50</td><td>崩盤</td><td>停止交易或只做反彈；優先保本</td></tr>
</table>
<h3>VIX期貨（/VX）與TOPSTEP的關係</h3>
<div class="eg"><b>VIX急升時TOPSTEP的風險</b><br>
VIX從15突然升至30+（常發生在黑天鵝事件），ES可能在15分鐘內跌80–150點。<br>
TOPSTEP 100K帳戶每日虧損上限$2,000，一旦觸發即停止當天交易。<br>
高VIX環境下，ES每10點=$500，只需20點反向就觸發日虧損上限。<br>
→ 高VIX時必須縮小合約口數或不交易。</div>
<h3>如何查看VIX？</h3>
<div class="kp-box">
• TradingView：搜尋「VIX」或「CBOE:VIX」<br>
• Yahoo Finance：搜尋「^VIX」<br>
• CNBC / Bloomberg：首頁常態顯示<br>
• 交易平台（thinkorswim / NinjaTrader）：內建VIX顯示<br><br>
建議：每天開盤前先看一眼VIX水位，決定當天的倉位大小。
</div>`,

body:`<h3>Proprietary Trading（自營交易）是什麼？</h3>
<p>Prop Trading（自營交易）是指交易人使用<strong>公司資金</strong>進行交易，並依約定比例分享獲利。傳統上，Prop Firm是大型金融機構的自營部門（如高盛、摩根）。但近年來出現了「線上Prop Firm」，讓散戶通過線上評估即可取得資金進行交易。</p>
<div class="hl"><b>為什麼Prop Trading對散戶有吸引力？</b><br>
1. <strong>有限資本放大效益</strong>：只需繳付月費（約$49–$165），就能操作$50,000–$150,000的帳戶<br>
2. <strong>公司承擔虧損</strong>：超過規定的最大虧損由公司承擔，個人最多損失已付的月費<br>
3. <strong>學習激勵</strong>：有明確的評估標準，強迫交易人建立紀律</div>
<h3>TOPSTEP是什麼？</h3>
<p>TOPSTEP成立於2012年，是美股期貨Prop Trading市場的先驅。提供<strong>Trading Combine</strong>（評估帳戶），讓交易人在模擬環境下按真實市場數據交易，通過後取得真實資金帳戶。</p>
<table class="cmp-table">
<tr><th>指標</th><th>TOPSTEP</th><th>其他主流Prop Firm</th></tr>
<tr><td>成立年份</td><td>2012年（最老牌）</td><td>Apex 2021、Earn2Trade 2016</td></tr>
<tr><td>主要商品</td><td>CME期貨（ES/NQ/YM等）</td><td>各家不同</td></tr>
<tr><td>評估方式</td><td>一步驟（Trading Combine）</td><td>多家採兩步驟</td></tr>
<tr><td>獲利分成</td><td>90%（前$10K可達100%）</td><td>80%–90%不等</td></tr>
<tr><td>出金頻率</td><td>每週可申請</td><td>各家不同</td></tr>
</table>
<h3>主流Prop Firm比較</h3>
<table class="cmp-table">
<tr><th>Prop Firm</th><th>特色</th><th>適合對象</th></tr>
<tr><td>TOPSTEP</td><td>最老牌、最知名、規則清晰</td><td>初入Prop Trading者</td></tr>
<tr><td>Apex Trader Funding</td><td>費率低、評估規則較寬鬆</td><td>預算有限者</td></tr>
<tr><td>Earn2Trade</td><td>提供教育資源，雙步驟評估</td><td>想系統學習者</td></tr>
<tr><td>TradeDay</td><td>費率極低、一步驟評估</td><td>有交易經驗者</td></tr>
</table>
<div class="warn"><b>⚠️ Prop Firm的風險</b>
月費持續繳付是沉沒成本。如果一直無法通過評估，月費累積的成本可能超過自行小額交易的損失。
建議：先在模擬帳號練習至穩定獲利（連續30天正報酬）後，再考慮付費參加Prop Firm評估。</div>`,

body:`<h3>核心規則一：獲利目標（Profit Target）</h3>
<div class="kp-box">
帳戶必須累積到<strong>獲利目標</strong>才算通過評估。<br>
50K→$3,000 / 100K→$6,000 / 150K→$9,000<br><br>
沒有時間限制——你可以花1週或3個月達成，沒關係。<br>
唯一要求：在達成獲利目標之前，不能違反其他任何規則。
</div>
<h3>核心規則二：每日最大虧損限制（Daily Loss Limit）</h3>
<div class="formula">每日虧損上限（以100K帳戶為例）：$2,000

計算方式：
今日開盤帳戶餘額：$100,000
每日最大允許虧損：$2,000
今日帳戶不得低於：$100,000 - $2,000 = $98,000

實際範例：
早上交易虧損$1,800後，帳戶剩$98,200
再虧$200就觸發日限，當天被強制停止交易
→ 即使後來行情反轉，今天也不能再交易了！</div>
<div class="warn"><b>⚠️ 最常見的失敗原因</b>
觸發每日虧損上限！很多人在連虧幾筆後試圖「加倍攤平」，結果超過日限被強制停止。
<strong>原則：每天若虧損超過50%日限，立即停止交易，明天再來。</strong></div>
<h3>核心規則三：追蹤最大虧損（Trailing Drawdown）</h3>
<div class="formula">追蹤回撤（Trailing Drawdown）是最重要也最特殊的規則：

初始帳戶：$100,000（100K帳戶）
初始追蹤回撤下限：$100,000 - $3,000 = $97,000

情景一：帳戶獲利上升到$103,000
→ 追蹤回撤下限上移至：$103,000 - $3,000 = $100,000
→ 帳戶不得低於$100,000，否則評估失敗

情景二：帳戶進一步漲到$106,000
→ 追蹤下限：$106,000 - $3,000 = $103,000
→ 之前已獲利$3,000，但帳戶不能回落到$103,000以下

注意：追蹤下限只往上走，不往下走！
一旦帳戶歷史最高點上移，下限就永久鎖定在新的高點-$3,000</div>
<div class="eg"><b>追蹤回撤的陷阱</b><br>
帳戶漲到$110,000後（追蹤下限=$107,000），接著連虧$4,000→帳戶剩$106,000&lt;$107,000→評估失敗！<br>
即使帳戶還比初始多$6,000，也算失敗。<br>
→ 必須先達到獲利目標（$6,000），並且不讓帳戶回撤超過$3,000。</div>
<h3>合約數量限制</h3>
<table class="cmp-table">
<tr><th>帳戶規模</th><th>最大持倉（ES/NQ等）</th><th>換算MES/MNQ</th></tr>
<tr><td>50K</td><td>5口</td><td>50口MES</td></tr>
<tr><td>100K</td><td>10口</td><td>100口MES</td></tr>
<tr><td>150K</td><td>15口</td><td>150口MES</td></tr>
</table>
<h3>通過後的Funded帳戶規則</h3>
<div class="kp-box">
通過評估後：<br>
• 獲利分成：<strong>90%歸自己</strong>（初始$10,000可達100%，視方案）<br>
• 每日虧損上限：仍然存在，同樣嚴格<br>
• 靜態回撤：Funded帳戶改為靜態（固定下限，不再追蹤）<br>
• 出金：每週可申請，最快5個工作天到帳<br>
• 縮放：持續盈利可申請更大帳號
</div>
<div class="warn"><b>⚠️ 規則可能變更</b>
TOPSTEP的規則和費率每年都可能調整。以上數字為參考值，操作前務必查閱<strong>TOPSTEP官網最新條款</strong>（topstep.com）。</div>`,

body:`<h3>通關策略的核心思想</h3>
<div class="hl"><b>通過TOPSTEP不是靠運氣，是靠紀律</b><br>
目標不是「盡快賺$6,000」，而是「每天穩定小賺，讓時間累積到目標」。<br>
100K帳戶：目標$6,000÷20天 = 每天只需賺$300 = ES漲6點 × 1口</div>
<h3>建議的通關計畫（100K帳戶）</h3>
<div class="formula">每日作戰計畫：
每日獲利目標：$300（ES漲6點，1口 × $50/點）
每日虧損停止：$600（日限$2,000的30%，提前離場保留空間）
風險報酬比：最少2:1（停損6點，目標12點以上）
每天最多交易次數：5次
連續虧損3次：立即停止當天交易

帳戶成長計畫（20天版本）：
Week 1（Day 1–5）：保守為主，每天$200–300，不求快
Week 2（Day 6–10）：找到節奏，每天$300–400
Week 3（Day 11–15）：維持節奏，不要貪心加倉
Week 4（Day 16–20）：接近目標時更謹慎，最後幾天縮倉</div>
<h3>9成人失敗的5大原因</h3>
<table class="cmp-table">
<tr><th>失敗原因</th><th>具體表現</th><th>如何避免</th></tr>
<tr><td>觸發日虧損上限</td><td>虧損後不停損，加碼攤平</td><td>每日設自我停損在50%日限，達到即停手</td></tr>
<tr><td>追求快速通過</td><td>用超大口數想1週衝完</td><td>按計畫每天$300，20天穩穩通過</td></tr>
<tr><td>FOMO情緒交易</td><td>看到行情跑了才追進去</td><td>錯過機會不追，等下一個設定好的機會</td></tr>
<tr><td>不執行停損</td><td>「再等一下」讓虧損越來越大</td><td>進場前設好停損單，觸發就接受</td></tr>
<tr><td>結算日前爆倉</td><td>離目標差$500時加大賭注</td><td>越接近目標越縮倉，保住成果優先</td></tr>
</table>
<h3>Funded帳戶通過後怎麼做？</h3>
<div class="eg"><b>首次提款流程</b><br>
1. 完成至少1個交易日（某些方案需達到最低獲利門檻）<br>

4. 首次$10,000獲利100%歸己；之後每筆90%<br><br>
<b>提款後帳戶重置嗎？</b><br>
不會！帳戶繼續使用，但追蹤回撤下限根據已實現損益重新計算。</div>
<div class="warn"><b>⚠️ 台灣人使用TOPSTEP的實務注意</b>
1. 需要一個國際銀行帳號（如台灣銀行美金帳號）或PayPal接收出金<br>
2. 費用以美金計算，需考慮匯率和手續費<br>
3. TOPSTEP平台需連接第三方下單平台（NinjaTrader / Rithmic）<br>
4. 台灣網路連至CME伺服器延遲約150–200ms，建議用VPN優化（選美西節點）</div>`,

body:`<h3>美股日內交易的時段邏輯</h3>
<p>美股期貨交易幾乎24小時，但<strong>不是所有時段都適合交易</strong>。機構投資者（大型對沖基金、做市商）主要在RTH（正式盤21:30–04:00台灣時間）活躍，這段時間的走勢最有方向性、最少噪音。</p>
<h3>黃金時段：開盤後2小時（21:30–23:30）</h3>
<div class="hl"><b>為什麼開盤後2小時是最佳交易時段？</b><br>
1. <strong>方向性強</strong>：隔夜期貨走勢 + 盤前預期在此時快速修正，真實方向在30分鐘內確立<br>
2. <strong>流動性最佳</strong>：每分鐘成交量是午盤的5–10倍，滑價極小<br>
3. <strong>趨勢延伸</strong>：開盤後確立的方向，通常能延伸1–2小時<br>
4. <strong>機構主導</strong>：大型機構的大單在此時集中執行，形成有方向的推動力</div>
<h3>開盤後第一個30分鐘的策略</h3>
<div class="formula">開盤區間（Opening Range）策略：
1. 記錄21:30後的第一根30分鐘K線（開盤區間）
   開盤高點（OR High）= 21:30–22:00的最高點
   開盤低點（OR Low）= 21:30–22:00的最低點

2. 突破信號：
   價格突破OR High + 成交量放大 → 做多
   價格跌破OR Low + 成交量放大 → 做空

3. 停損設置：
   多單停損設在OR Low下方
   空單停損設在OR High上方

4. 獲利目標：OR High – OR Low 的1.5–2倍距離</div>
<h3>日內交易的工具組合</h3>
<table class="cmp-table">
<tr><th>工具</th><th>用途</th><th>設定</th></tr>
<tr><td>K線時框</td><td>判斷趨勢方向</td><td>5分鐘K（主力）+ 1分鐘K（精確進場）</td></tr>
<tr><td>VWAP</td><td>動態支撐壓力</td><td>預設（每日重置）</td></tr>
<tr><td>移動均線</td><td>趨勢方向確認</td><td>9 EMA（快）+ 21 EMA（慢）</td></tr>
<tr><td>成交量</td><td>確認突破真假</td><td>20根K的平均量為基準</td></tr>
<tr><td>前日高低點</td><td>靜態支撐壓力</td><td>自動標記PDH/PDL</td></tr>
</table>
<h3>TOPSTEP帳戶下的時段選擇</h3>
<div class="eg"><b>推薦策略：只交易開盤2小時</b><br>
台灣時間21:30–23:30，剛好是晚餐後的時段。<br>
每天只操作這2小時，達到日獲利目標（如$300）後立即停止，不在午盤和尾盤繼續暴露風險。<br>
好處：避免午盤噪音導致的虧損，保護每日風險預算，讓TOPSTEP評估更穩定通過。</div>`,

body:`<h3>VWAP（成交量加權平均價格）</h3>
<div class="hl"><b>VWAP = 機構最重要的參考基準線</b><br>
VWAP = 所有成交的「價格×成交量」加總 ÷ 總成交量<br>
它代表當天所有買家的平均持有成本。機構在執行大單時，通常以VWAP為基準來評估執行品質。<br>
VWAP上方 = 多方佔優；VWAP下方 = 空方佔優</div>
<h3>VWAP的交易應用</h3>
<div class="formula">VWAP 四種交易情境：

情境一：多頭結構（VWAP上方）
  價格碰觸VWAP → 做多
  停損：VWAP下方10點
  目標：前日高點或開盤高點

情境二：空頭結構（VWAP下方）
  價格反彈至VWAP → 做空
  停損：VWAP上方10點
  目標：前日低點

情境三：突破VWAP
  價格穿越VWAP + 成交量放大 → 方向確認，順勢追進
  （VWAP攻守易位）

情境四：VWAP失守
  多頭時，ES跌破VWAP且收盤在下方 → 偏空，轉換策略</div>
<h3>開盤缺口（Gap）策略</h3>
<div class="kp-box">
<b>什麼是缺口？</b><br>
今日開盤價 ≠ 昨日收盤價，中間形成一段「缺口」。<br>
上跳缺口（Gap Up）：今日開盤高於昨日收盤<br>
下跳缺口（Gap Down）：今日開盤低於昨日收盤<br><br>
<b>缺口填補機率（歷史統計）：</b><br>
缺口小於0.5%：填補機率 ~75%（當天）<br>
缺口0.5%–1%：填補機率 ~55%（當天）<br>
缺口超過1%：填補機率 ~35%（可能需要幾天）
</div>
<div class="formula">缺口填補交易規則（以ES為例）：
今日Gap Up：ES昨日收4,980，今日開5,010（+30點缺口）
缺口填補目標：4,980點

做空條件：
1. 開盤後前15分鐘觀察，不要馬上進場
2. 開盤後ES上衝5,030（加速），但RSI>75（超買）
3. 第一根15分鐘K出現下影線或陰線 → 做空
4. 目標：4,980–4,995（缺口區間）
5. 停損：今日開盤高點5,010上方10點（5,020）</div>
<h3>VWAP + Gap的組合使用</h3>
<div class="eg"><b>最強組合：缺口在VWAP附近</b><br>
ES昨日收4,980（VWAP也在附近），今日開5,015（+35點缺口）。<br>
VWAP和昨日收盤都在4,980，形成雙重支撐/目標。<br>
做空策略：開盤上衝後放空，雙目標都指向4,980，成功率更高。<br>
停損：5,020。目標：4,980。風險報酬比 = 40/35 ≈ 1:1.5（可接受）</div>`,
pts:['VWAP是機構最重要的日內參考基準，多頭在上方碰VWAP做多，空頭在下方反彈做空','開盤缺口填補機率：小缺口（<0.5%）約75%，中缺口（0.5-1%）約55%','VWAP+Gap組合：缺口在VWAP附近時，兩個目標重疊，成功率更高','開盤後前15分鐘觀察不進場，等方向確認後再執行']},

body:`<h3>TOPSTEP框架下的倉位計算</h3>
<div class="formula">100K帳戶倉位計算（ES為例）：
每日獲利目標：$300
每筆虧損上限：$150（目標的50%，確保風報比2:1）

ES每點$50，停損10點 = $500（太大！）
ES每點$50，停損3點 = $150 ✓

因此：
ES停損設3點 → 目標設6點
結果：+$300（達到日標）

或者：
停損8點（ES常見波動），但口數減半
ES × 0.5口 = MES × 5口（等效）
MES 5口 × 8點 × $5 = $200（虧損） → 可接受</div>
<h3>不同停損距離對應的口數</h3>
<table class="cmp-table">
<tr><th>停損點數</th><th>合約</th><th>每筆最大虧損</th><th>口數建議</th><th>達標需漲點數</th></tr>
<tr><td>5點</td><td>ES（$50/點）</td><td>$250</td><td>1口</td><td>漲6點達$300</td></tr>
<tr><td>10點</td><td>ES</td><td>$500</td><td>減為MES×3口</td><td>漲10點達$300</td></tr>
<tr><td>15點</td><td>MES（$5/點）</td><td>$75</td><td>MES×5口</td><td>漲12點達$300</td></tr>
<tr><td>20點</td><td>MES</td><td>$100</td><td>MES×4口</td><td>漲15點達$300</td></tr>
</table>
<h3>TOPSTEP追蹤回撤的倉位影響</h3>
<div class="eg"><b>追蹤回撤如何影響你的倉位選擇</b><br>
假設100K帳戶，追蹤回撤下限已上移至$102,000（已賺$2,000）。<br>
帳戶目前$104,000，距離下限$2,000。<br>
如果今天大跌，損失超過$2,000 → 評估失敗！<br><br>
這意味著：你的「有效日限」已從$2,000縮小到$2,000（湊巧相同），但若帳戶已漲到$110,000，你距離下限$107,000還有$3,000的空間。<br>
→ 帳戶越大，才能動用越多的單日風險預算。</div>
<h3>每週檢討的指標</h3>
<div class="formula">每週應該追蹤的4個指標：
1. 每日平均獲利：目標 &gt; $300
2. 最大單筆虧損：不超過日限的25%（$500）
3. 勝率：目標 &gt; 50%（45%也可以，只要風報比夠）
4. 最大連虧天數：超過3天 → 暫停1天，重新評估策略

如果勝率35%、風報比3:1：
期望值 = 0.35×3 - 0.65×1 = 1.05 - 0.65 = +0.4 → 長期仍是正期望值！</div>`,
pts:['每日獲利目標$300，自我停損上限$600（官方日限30%），不要用完所有日限','每筆虧損上限是日目標的50%（$150），確保至少2:1風報比','停損越大→口數越少；TOPSTEP不要求固定口數，靈活調整','勝率35%+風報比3:1也能長期獲利，不要迷信高勝率']},

body:`<h3>案例一：觸發每日虧損上限（最常見）</h3>
<div class="warn"><b>場景</b>：早上連虧3筆，虧了$900。心想「還剩$1,100的日限空間」，繼續開大倉想追回來，結果一筆虧$1,200，觸發日限被強制停止。<br><br>
<b>根本原因</b>：「虧損後加碼」是最危險的行為。每筆虧損後情緒受影響，判斷力下降，繼續交易只會錯上加錯。<br><br>
<b>解決方案</b>：設定<strong>自我日限 = 官方日限的50%</strong>（100K帳戶 = $1,000）。達到自我日限後，立即關閉平台，做其他事情。</div>
<h3>案例二：越接近目標越失敗（最可惜）</h3>
<div class="warn"><b>場景</b>：帳戶已累積$5,600獲利，還差$400就完成100K目標。心急之下，用3口ES（平時用1口）做一筆交易，結果逆勢，一筆虧$1,500，帳戶回到$4,100，需要重新累積。<br><br>
<b>根本原因</b>：接近目標時的<strong>「貪婪/焦慮」</strong>讓人改變了一直有效的策略。<br><br>
<b>解決方案</b>：帳戶累積超過目標80%後，口數減半。最後$500，只用最小口數（1口ES或MES），用時間耗出來，不要賭。</div>
<h3>案例三：不了解追蹤回撤的移動機制</h3>
<div class="warn"><b>場景</b>：帳戶從$100K漲到$108K（追蹤下限上移至$105K），然後週末後跌回$104K。心想「我還有獲利$4K，很安全」，但帳戶$104K &lt; 追蹤下限$105K，評估失敗！<br><br>
<b>根本原因</b>：誤解追蹤回撤是從當前帳戶向下計算，實際上是從<strong>歷史最高點</strong>向下計算。<br><br>
<b>解決方案</b>：每天開市前查看當前追蹤回撤下限數字，把它貼在螢幕上。把「距離下限多遠」當作當天的風險預算。</div>
<h3>案例四：重大數據前持倉</h3>
<div class="warn"><b>場景</b>：做了ES多單$100K帳戶2口，沒想到當天是非農發布日（台灣時間20:30）。非農數據遠差於預期，ES暴跌70點，2口虧損 = 70 × $50 × 2 = $7,000，但100K帳戶日限才$2,000，一瞬間觸發強制平倉，評估失敗。<br><br>
<b>解決方案</b>：每天交易前查看<strong>Investing.com 經濟日曆</strong>，確認當天有無重大數據。有數據的日子，數據發布前15分鐘出清所有部位。</div>
<h3>一張表：通過 vs 失敗的行為差異</h3>
<table class="cmp-table">
<tr><th>行為</th><th>通過者</th><th>失敗者</th></tr>
<tr><td>達到日目標後</td><td>立即停止交易</td><td>繼續交易「多賺一點」</td></tr>
<tr><td>連虧3筆後</td><td>停止當天交易</td><td>加大口數想追回來</td></tr>
<tr><td>接近獲利目標</td><td>縮小口數，穩穩推進</td><td>加倉想快速衝過去</td></tr>
<tr><td>重大數據日</td><td>數據前全部平倉</td><td>「感覺方向對的」繼續持倉</td></tr>
<tr><td>對追蹤回撤的態度</td><td>每天查看下限數字</td><td>不了解這個規則</td></tr>
</table>`,

// ──────────────── JS ENGINE ────────────────
const DONE = JSON.parse(localStorage.getItem('ufc-done') || '[]');

function buildSidebar(){
  const el = document.getElementById('chList');
  let html = '';
  CHAPTERS.forEach(ch => {
    html += `<div class="ch-label">${ch.label}</div>`;
    ch.ids.forEach(i => {
      const L = LESSONS[i];
      const isDone = DONE.includes(i);
      html += `<div class="ls-item${isDone?' done':''}" id="li${i}" onclick="go(${i})">
        <div class="ls-num">${isDone?'✓':L.num}</div>
        <span>${L.title}</span>
        ${isDone?'<span class="ls-check">✓</span>':''}
      </div>`;
    });
  });
  el.innerHTML = html;
}

function updateProgress(){
  const total = LESSONS.length;
  const done = DONE.length;
  const pct = Math.round(done/total*100);
  document.getElementById('pct').textContent = pct+'%';
  document.getElementById('pfill').style.width = pct+'%';
}

function go(i){
  document.querySelectorAll('.ls-item').forEach(e=>e.classList.remove('active'));
  const liEl = document.getElementById('li'+i);
  if(liEl){ liEl.classList.add('active'); liEl.scrollIntoView({block:'nearest'}); }
  const L = LESSONS[i];
  const isDone = DONE.includes(i);
  const isLast = i === LESSONS.length - 1;
  let prev = -1, next = -1;
  CHAPTERS.forEach(ch => {
    ch.ids.forEach((id,idx) => {
      if(id===i){
        if(idx>0) prev = ch.ids[idx-1];
        else { const ci = CHAPTERS.indexOf(ch); if(ci>0) prev = CHAPTERS[ci-1].ids.at(-1); }
        if(idx<ch.ids.length-1) next = ch.ids[idx+1];
        else { const ci = CHAPTERS.indexOf(ch); if(ci<CHAPTERS.length-1) next = CHAPTERS[ci+1].ids[0]; }
      }
    });
  });
  document.getElementById('lw').innerHTML = `
  <div class="lc">
    <div class="lc-cap">${L.svg}</div>
    <div class="lc-body">
      <div class="lc-meta">
        <span class="lc-ch">${L.ch}</span>
        <span class="lc-rt">⏱ ${L.rt}</span>
      </div>
      <div class="lc-title">${L.num}｜${L.title}</div>
      <div class="lc-sub">${L.sub}</div>
      <div class="lc-content">${L.body}</div>
      <div class="kp-wrap">
        <h4>本課重點</h4>
        <div class="kp-list">${L.pts.map(p=>`<div class="kp-item"><div class="kp-dot"></div><span>${p}</span></div>`).join('')}</div>
      </div>
    </div>
    <div class="lc-nav">
      <button class="nav-btn" onclick="go(${prev})" ${prev<0?'disabled style="opacity:.3"':''}>← 上一課</button>
      <button class="done-btn${isDone?' marked':''}" onclick="toggleDone(${i})">${isDone?'✓ 已完成':'標記完成'}</button>
      <button class="nav-btn primary" onclick="go(${next})" ${next<0?'disabled style="opacity:.3"':''}>下一課 →</button>
    </div>
  </div>`;
}

function toggleDone(i){
  const idx = DONE.indexOf(i);
  if(idx>=0) DONE.splice(idx,1); else DONE.push(i);
  localStorage.setItem('ufc-done', JSON.stringify(DONE));
  updateProgress();
  buildSidebar();
  go(i);
}

function openSB(){ document.getElementById('sb').classList.add('open'); document.getElementById('ov').classList.add('show'); }
function closeSB(){ document.getElementById('sb').classList.remove('open'); document.getElementById('ov').classList.remove('show'); }

buildSidebar();
updateProgress();
go(0);
</script>
<button class="fab-toc" onclick="openSB()">☰ 目錄</button>
</body>
</html>
