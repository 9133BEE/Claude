<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K線型態圖鑑 — 股學筆記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Surface */
  --bg-page:#f8fafc;--bg-card:#ffffff;--bg-raised:#f1f5f9;--bg-inset:#f1f5f9;
  /* Border */
  --border:rgba(15,23,42,.10);--border-subtle:rgba(15,23,42,.06);--border-strong:rgba(15,23,42,.16);
  /* Text */
  --text-primary:#0f172a;--text-secondary:#334155;--text-muted:#64748b;--text-faint:#94a3b8;
  /* Accent */
  --color-primary:#1d4ed8;--color-primary-light:#3b82f6;
  --accent-dim:rgba(29,78,216,.08);--accent-border:rgba(29,78,216,.20);
  /* Semantic candlestick colours (light-mode friendly) */
  --bull:#059669;--bear:#dc2626;--neutral:#64748b;
  --bull-bg:rgba(5,150,105,.08);--bull-border:rgba(5,150,105,.22);--bull-text:#059669;
  --bear-bg:rgba(220,38,38,.08);--bear-border:rgba(220,38,38,.22);--bear-text:#dc2626;
  --neutral-bg:#f1f5f9;--neutral-border:#cbd5e1;--neutral-text:#475569;
  /* Difficulty badges */
  --beginner-bg:rgba(5,150,105,.10);--beginner-text:#059669;
  --intermediate-bg:rgba(217,119,6,.10);--intermediate-text:#d97706;
  --advanced-bg:rgba(220,38,38,.10);--advanced-text:#dc2626;
  /* Typography */
  --font:'Noto Sans TC',system-ui,sans-serif;
  --font-en:'Inter','Noto Sans TC',sans-serif;
  --font-mono:'JetBrains Mono','Courier New',monospace;
  /* Geometry & shadows */
  --radius:16px;--nav-h:64px;--tab-h:48px;
  --shadow-card:0 1px 3px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.04);
  --shadow-hover:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-primary);line-height:1.6;overflow-x:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none}

/* NAV */
.nav{position:sticky;top:0;z-index:300;height:var(--nav-h);background:rgba(255,255,255,.95);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;padding:0 24px;gap:16px;transition:border-color .3s,box-shadow .3s}
.nav.scrolled{border-bottom-color:var(--border);box-shadow:0 1px 8px rgba(15,23,42,.06)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text-primary);font-weight:800;font-family:var(--font-en);font-size:1.1rem;flex-shrink:0}
.nav-logo svg{flex-shrink:0}
.nav-logo span{color:var(--color-primary)}
.nav-back{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-muted);font-size:.85rem;font-weight:500;padding:6px 12px;border:1px solid var(--border);border-radius:20px;transition:all .2s}
.nav-back:hover{color:var(--color-primary);border-color:var(--accent-border);background:var(--accent-dim)}
.nav-spacer{flex:1}
.nav-search{position:relative;display:flex;align-items:center}
.nav-search input{border:1px solid var(--border);border-radius:20px;padding:8px 16px 8px 38px;font-size:.875rem;font-family:var(--font);background:var(--bg-raised);width:200px;transition:all .3s;outline:none;color:var(--text-primary)}
.nav-search input:focus{width:280px;background:#fff;border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-dim)}
.nav-search .search-icon{position:absolute;left:12px;color:var(--text-faint);pointer-events:none;width:16px;height:16px}
#search-count{font-size:.8rem;color:var(--text-muted);flex-shrink:0;white-space:nowrap}

/* HERO */
.hero{background:var(--bg-raised);border-bottom:1px solid var(--border);padding:44px 24px 36px;overflow:hidden;position:relative}
.hero-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center}
.hero-label{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--color-primary);margin-bottom:8px;font-family:var(--font-en)}
.hero-title{font-family:var(--font-en);font-weight:800;font-size:clamp(1.6rem,3vw,2.4rem);line-height:1.2;color:var(--text-primary);margin-bottom:10px}
.hero-title .grad{color:var(--color-primary);-webkit-text-fill-color:unset;background:none}
.hero-subtitle{color:var(--text-muted);font-size:.9rem;line-height:1.8;margin-bottom:20px}
.hero-stats{display:flex;gap:28px}
.hero-stat-num{font-family:var(--font-mono);font-size:1.3rem;font-weight:700;color:var(--color-primary)}
.hero-stat-label{font-size:.72rem;color:var(--text-faint);margin-top:2px}
.hero-preview{display:flex;gap:8px;align-items:flex-end;opacity:.88;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px}

/* TABS */
.tab-nav{position:sticky;top:var(--nav-h);z-index:200;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-list{display:flex;max-width:1200px;margin:0 auto;padding:0 24px;position:relative;min-width:max-content}
.tab-btn{padding:0 22px;height:var(--tab-h);font-size:.875rem;font-weight:500;color:var(--text-muted);display:flex;align-items:center;gap:7px;transition:color .2s;white-space:nowrap;position:relative}
.tab-btn .tab-count{font-size:.7rem;background:#F1F5F9;color:var(--text-muted);padding:1px 7px;border-radius:100px;font-family:var(--font-mono)}
.tab-btn.active{color:var(--color-primary);font-weight:600}
.tab-btn.active .tab-count{background:var(--accent-dim);color:var(--color-primary)}
.tab-indicator{position:absolute;bottom:0;height:2px;border-radius:2px;background:var(--color-primary);transition:left .25s cubic-bezier(.4,0,.2,1),width .25s cubic-bezier(.4,0,.2,1)}

/* FILTER BAR */
.filter-bar{max-width:1200px;margin:0 auto;padding:14px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-label{font-size:.78rem;color:var(--text-muted);font-weight:600;white-space:nowrap}
.filter-btn{padding:4px 13px;border-radius:100px;font-size:.78rem;font-family:var(--font);border:1px solid var(--border);color:var(--text-muted);transition:all .15s;background:var(--bg-raised);white-space:nowrap}
.filter-btn:hover,.filter-btn.active-bull,.filter-btn.active-bear,.filter-btn.active-neutral,.filter-btn.active-diff{background:var(--accent-dim);color:var(--color-primary);border-color:var(--accent-border)}
.filter-divider{width:1px;height:20px;background:var(--border)}
.filter-spacer{flex:1}

/* CARDS GRID */
.cards-section{max-width:1200px;margin:0 auto;padding:20px 24px 64px}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:1024px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){
  .cards-grid{grid-template-columns:1fr}
  .hero-inner{grid-template-columns:1fr}
  .hero-preview{display:none}
  .tab-btn{padding:0 16px}
}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-card);overflow:hidden;transition:transform .28s cubic-bezier(.4,0,.2,1),box-shadow .28s;opacity:0;transform:translateY(20px)}
.card.visible{opacity:1;transform:translateY(0);transition:opacity .4s ease,transform .4s ease,box-shadow .28s}
.card.hidden-filter{display:none}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}

/* CANDLE PREVIEW */
.candle-preview{background:var(--bg-raised);border-bottom:1px solid var(--border-subtle);padding:16px 0 12px;display:flex;align-items:flex-end;justify-content:center;min-height:88px;position:relative}
.candle-preview svg{display:block}
.candle-preview .pattern-label{position:absolute;bottom:6px;right:10px;font-size:.62rem;font-family:var(--font-en);color:var(--text-faint);letter-spacing:.06em;text-transform:uppercase}

/* DIRECTION BADGE */
.dir-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;font-size:.7rem;font-weight:700}
.dir-bull{background:rgba(5,150,105,.08);color:#059669;border:1px solid rgba(5,150,105,.22)}
.dir-bear{background:rgba(220,38,38,.08);color:#dc2626;border:1px solid rgba(220,38,38,.22)}
.dir-neutral{background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1}

.card-header{padding:12px 16px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-badges{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-difficulty{padding:2px 9px;border-radius:100px;font-size:.68rem;font-weight:600;line-height:1.6}
.difficulty-入門{background:var(--beginner-bg);color:var(--beginner-text);border:1px solid rgba(5,150,105,.22)}
.difficulty-進階{background:var(--intermediate-bg);color:var(--intermediate-text);border:1px solid rgba(217,119,6,.22)}
.difficulty-高階{background:var(--advanced-bg);color:var(--advanced-text);border:1px solid rgba(220,38,38,.22)}
.card-cat-badge{font-size:.65rem;font-weight:700;color:var(--text-faint);letter-spacing:.08em;text-transform:uppercase;font-family:var(--font-en)}

.card-body{padding:8px 16px 12px}
.card-title{font-size:.98rem;font-weight:700;line-height:1.4;margin-bottom:1px;color:var(--text-primary)}
.card-en{font-size:.7rem;color:var(--text-faint);font-family:var(--font-en);margin-bottom:7px}
.card-summary{font-size:.83rem;color:var(--text-muted);line-height:1.65;margin-bottom:9px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.card-tag{padding:2px 8px;background:var(--bg-raised);color:var(--text-muted);border-radius:4px;font-size:.68rem;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.card-tag:hover{background:var(--accent-dim);color:var(--color-primary);border-color:var(--accent-border)}

/* EXPAND */
.card-expand-btn{width:100%;padding:9px 0;font-size:.75rem;color:var(--text-muted);font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px;border-top:1px solid var(--border-subtle);transition:background .15s,color .15s;border-radius:0 0 var(--radius) var(--radius)}
.card-expand-btn:hover{background:var(--bg-raised);color:var(--text-secondary)}
.card.expanded .card-expand-btn{color:var(--color-primary)}
.card-expand-btn .arrow{transition:transform .3s cubic-bezier(.4,0,.2,1);display:inline-block}
.card.expanded .card-expand-btn .arrow{transform:rotate(180deg)}
.card-detail{max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1)}
.card-detail-inner{padding:0 16px 14px;display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--border)}
.detail-block{border-radius:10px;overflow:hidden}
.detail-block-title{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px 3px;display:flex;align-items:center;gap:6px}
.detail-block-content{padding:3px 12px 10px;font-size:.83rem;line-height:1.75}
.block-keypoints{background:var(--accent-dim);border:1px solid var(--accent-border)}
.block-keypoints .detail-block-title{color:var(--color-primary)}
.block-keypoints .detail-block-content{color:var(--text-secondary)}
.block-keypoints ul{padding-left:16px}
.block-keypoints li{margin-bottom:5px}
.block-keypoints li::marker{color:var(--color-primary)}
.block-example{background:#fff;border:1px solid var(--border);border-left:3px solid var(--color-primary)}
.block-example .detail-block-title{color:var(--color-primary)}
.block-example .detail-block-content{color:var(--text-secondary)}
.block-tip{background:#FFFBEB;border:1px solid #FDE68A}
.block-tip .detail-block-title{color:#92400E}
.block-tip .detail-block-content{color:#78350F}
.block-indicator{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.18)}
.block-indicator .detail-block-title{color:#6d28d9}
.block-indicator .detail-block-content{color:var(--text-secondary)}
.block-indicator .detail-block-content span{display:inline-flex;align-items:center;gap:4px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.22);border-radius:6px;padding:1px 8px;font-size:.75rem;margin:2px 3px 2px 0}

/* FOOTER */
.footer{background:var(--bg-inset);border-top:1px solid var(--border);padding:40px 24px;text-align:center;color:var(--text-muted)}
.footer-logo{font-family:var(--font-en);font-size:1rem;font-weight:700;color:var(--text-secondary);margin-bottom:6px}
.footer-logo span{color:var(--color-primary)}
.footer-text{font-size:.78rem;line-height:1.8;color:var(--text-muted)}
.footer-disclaimer{margin-top:16px;font-size:.7rem;color:var(--text-faint);padding-top:16px;border-top:1px solid var(--border)}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:56px 24px;color:var(--text-muted)}
.empty-state svg{width:44px;height:44px;margin:0 auto 14px;opacity:.4}
</style>

<script>
// ─── SVG DRAWING ENGINE ────────────────────────────────────────────────
// Light-mode palette: bull=green, bear=red, neutral=slate
const BULL_C = '#059669', BEAR_C = '#dc2626', NEU_C = '#94a3b8';
const BULL_F = 'rgba(5,150,105,.85)', BEAR_F = 'rgba(220,38,38,.85)';

function drawC(cx, c) {
  const col = c.bull === true ? BULL_C : c.bull === false ? BEAR_C : NEU_C;
  const fill = c.bull === true ? BULL_F : c.bull === false ? BEAR_F : NEU_C;
  const bw = 14, hw = bw / 2;
  let s = '';
  if (c.h < c.bt - 0.5)
    s += `<line x1="${cx}" y1="${c.h}" x2="${cx}" y2="${c.bt}" stroke="${col}" stroke-width="1.5" stroke-linecap="round"/>`;
  if (c.bb > c.bt + 1.5) {
    s += `<rect x="${cx-hw}" y="${c.bt}" width="${bw}" height="${c.bb-c.bt}" fill="${fill}" rx="1.5"/>`;
  } else {
    s += `<line x1="${cx-hw}" y1="${(c.bt+c.bb)/2}" x2="${cx+hw}" y2="${(c.bt+c.bb)/2}" stroke="${col}" stroke-width="2.5"/>`;
  }
  if (c.l > c.bb + 0.5)
    s += `<line x1="${cx}" y1="${c.bb}" x2="${cx}" y2="${c.l}" stroke="${col}" stroke-width="1.5" stroke-linecap="round"/>`;
  return s;
}

function psvg(id, cs, W, extras) {
  const H = 84;
  const N = cs.length;
  const step = W / N;
  let inner = '';
  cs.forEach((c, i) => { inner += drawC(step * i + step / 2, c); });
  if (extras) inner += extras;
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

// Gap indicator helper
function gapRect(x1, x2, y1, y2, up) {
  const col = up ? 'rgba(5,150,105,.12)' : 'rgba(220,38,38,.12)';
  const stroke = up ? 'rgba(5,150,105,.40)' : 'rgba(220,38,38,.40)';
  return `<rect x="${x1}" y="${y1}" width="${x2-x1}" height="${y2-y1}" fill="${col}" stroke="${stroke}" stroke-width="0.5" stroke-dasharray="3,2"/>`;
}

// Combo pattern SVG: ctx candles faded, pat candles highlighted
function comboSvg(ctx, pat, W, extras) {
  const H = 84;
  const total = ctx.length + pat.length;
  const step = W / total;
  const nc = ctx.length;
  const hx = Math.max(0, step * nc - 2);
  const hw = step * pat.length + 4;
  let inner = `<rect x="${hx}" y="1" width="${hw}" height="${H-2}" fill="rgba(29,78,216,.05)" rx="3"/>`;
  inner += '<g opacity="0.26">';
  ctx.forEach((c, i) => { inner += drawC(step * i + step / 2, c); });
  inner += '</g>';
  pat.forEach((c, i) => { inner += drawC(step * (nc + i) + step / 2, c); });
  if (extras) inner += extras;
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

// ─── PATTERN DATA ───────────────────────────────────────────────────────
const PATTERNS = [
  // ── SINGLE K ──────────────────────────────────────────────────────────
  {id:'hammer',cat:'single',title:'錘子線',en:'Hammer',bullish:true,diff:'入門',

   tip:'第二根陽線收盤確認後，次日開盤入場做多，停損設第二根陽線的最低點（跳空低點），目標設前波高點。',
   indicators:['成交量第二日明顯放大（主力承接）','RSI 30~40超賣反彈確認','外資籌碼出現轉向買超'],
   svg: () => comboSvg(
     [{h:14,bt:18,bb:34,l:36,bull:false},{h:22,bt:26,bb:44,l:46,bull:false},{h:32,bt:36,bb:56,l:58,bull:false}],
     [{h:36,bt:40,bb:64,l:68,bull:false},{h:30,bt:32,bb:72,l:74,bull:true},{h:20,bt:22,bb:40,l:42,bull:true}],
     144)},

  {id:'bullish_kicker_combo',cat:'combo',title:'旭日東升',en:'Bullish Kicker',bullish:true,diff:'高階',
   tags:['強力反轉','雙K組合','跳空缺口','主力訊號'],
   summary:'大陰線後隔日直接跳空開高至第一日開盤價以上，形成罕見的向上缺口，代表多空力道在一夜之間完全逆轉。',
   points:[
     '關鍵在缺口位置：第二根陽線的開盤必須等於或高於第一根陰線的「開盤」（非收盤），形成大幅向上缺口',
     '此型態極為罕見，通常由重大政策利多或業績爆發等催化劑驅動，往往成為不回補的突破型缺口',
     '成交量必須大幅放大（建議3倍以上）配合正面消息面，才能確認為真正的旭日東升'
   ],
   example:'台股2023年AI熱潮帶動科技族群，廣達、緯創等AI伺服器股多次出現旭日東升型態，啟動數十%的波段大漲行情。',
   tip:'見旭日東升跳空訊號，若量大幅放大，立即追買不等回測。停損設缺口下方（第二根陽線低點），為強度最高的看漲組合型態之一。',
   indicators:['成交量暴增（至少3倍以上）','消息面有重大正面催化劑（法說會、財報、政策）','外資投信同步大買確認'],
   svg: () => comboSvg(
     [{h:20,bt:24,bb:42,l:44,bull:false},{h:28,bt:32,bb:52,l:54,bull:false},{h:36,bt:40,bb:62,l:64,bull:false}],
     [{h:36,bt:40,bb:66,l:70,bull:false},{h:10,bt:12,bb:32,l:34,bull:true},{h:6,bt:8,bb:22,l:24,bull:true}],
     144)}
];
PATTERNS.push(...COMBOS);

// ─── STATE ─────────────────────────────────────────────────────────────
let currentCat = 'all', currentDir = 'all', currentDiff = 'all', searchTerm = '';
let expandedCard = null;

// ─── CATEGORY LABELS ───────────────────────────────────────────────────
const CAT_LABEL = {single:'單K',double:'雙K',triple:'三K',special:'特殊',combo:'組合'};

// ─── DIRECTION BADGE ───────────────────────────────────────────────────
function dirBadge(bullish) {
  if (bullish === true)  return '<span class="dir-badge dir-bull">🟢 看漲</span>';
  if (bullish === false) return '<span class="dir-badge dir-bear">🔴 看跌</span>';
  return '<span class="dir-badge dir-neutral">⚪ 中性</span>';
}

// ─── RENDER CARD ──────────────────────────────────────────────────────
function renderCard(p) {
  const catLabel = CAT_LABEL[p.cat] || p.cat;
  const diffClass = `difficulty-${p.diff}`;
  const indHtml = p.indicators.map(i=>`<span>${i}</span>`).join('');
  return `
<div class="card" id="card-${p.id}"
  data-id="${p.id}" data-cat="${p.cat}"
  data-bullish="${p.bullish}" data-diff="${p.diff}"
  data-tags="${p.tags.join(',')}" data-title="${p.title}" data-en="${p.en}" data-summary="${p.summary}">
  <div class="candle-preview">${p.svg()}<span class="pattern-label">${catLabel}</span></div>
  <div class="card-header">
    <div class="card-badges">
      ${dirBadge(p.bullish)}
      <span class="card-difficulty ${diffClass}">${p.diff}</span>
    </div>
    <span class="card-cat-badge">${catLabel}</span>
  </div>
  <div class="card-body">
    <div class="card-title">${p.title}</div>
    <div class="card-en">${p.en}</div>
    <div class="card-summary">${p.summary}</div>
    <div class="card-tags">${p.tags.map(t=>`<span class="card-tag" onclick="filterTag('${t}',event)">#${t}</span>`).join('')}</div>
  </div>
  <div class="card-detail" id="detail-${p.id}">
    <div class="card-detail-inner">
      <div class="detail-block block-keypoints">
        <div class="detail-block-title">📌 判讀重點</div>
        <div class="detail-block-content"><ul>${p.points.map(pt=>`<li>${pt}</li>`).join('')}</ul></div>
      </div>
      <div class="detail-block block-example">
        <div class="detail-block-title">📖 台股實例</div>
        <div class="detail-block-content">${p.example}</div>
      </div>
      <div class="detail-block block-tip">
        <div class="detail-block-title">💡 操作技巧</div>
        <div class="detail-block-content">${p.tip}</div>
      </div>
      <div class="detail-block block-indicator">
        <div class="detail-block-title">🔧 建議搭配指標</div>
        <div class="detail-block-content">${indHtml}</div>
      </div>
    </div>
  </div>
  <button class="card-expand-btn" onclick="toggleCard('${p.id}')">
    <i class="arrow">▼</i> <span class="expand-label">展開詳情</span>
  </button>
</div>`;
}

// ─── RENDER ALL ────────────────────────────────────────────────────────
function renderAll() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = PATTERNS.map(p => renderCard(p)).join('');
  applyFilters();
  observeCards();
}

// ─── FILTER FUNCTIONS ─────────────────────────────────────────────────
function applyFilters() {
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  const sl = searchTerm.toLowerCase();
  cards.forEach(card => {
    const matchCat  = currentCat === 'all' || card.dataset.cat === currentCat;
    const matchDir  = currentDir === 'all' || String(card.dataset.bullish) === currentDir;
    const matchDiff = currentDiff === 'all' || card.dataset.diff === currentDiff;
    const txt = (card.dataset.title + ' ' + card.dataset.en + ' ' + card.dataset.summary + ' ' + card.dataset.tags).toLowerCase();
    const matchSearch = !sl || txt.includes(sl);
    const hide = !matchCat || !matchDir || !matchDiff || !matchSearch;
    card.classList.toggle('hidden-filter', hide);
    if (!hide) visible++;
  });
  const total = PATTERNS.length;
  document.getElementById('search-count').textContent = (sl || currentCat !== 'all' || currentDir !== 'all' || currentDiff !== 'all') ? `${visible} / ${total} 種` : '';
  const existing = document.querySelector('.empty-state');
  if (visible === 0 && !existing) {
    document.getElementById('cards-grid').insertAdjacentHTML('beforeend',
      `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>找不到符合條件的型態</p><small>試試其他關鍵字或調整篩選條件</small></div>`);
  } else if (visible > 0 && existing) existing.remove();
}

function switchCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  updateTabIndicator();
  if (expandedCard) { collapseCard(expandedCard); }
  applyFilters();
  observeCards();
}

function filterDir(dir, btn) {
  currentDir = dir;
  document.querySelectorAll('[data-dir]').forEach(b => {
    b.classList.remove('active-bull','active-bear','active-neutral','active-diff');
  });
  if (dir === 'all') btn.classList.add('active-bull');
  else if (dir === 'true') btn.classList.add('active-bull');
  else if (dir === 'false') btn.classList.add('active-bear');
  else btn.classList.add('active-neutral');
  applyFilters();
}

function filterDiff(diff, btn) {
  currentDiff = diff;
  document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('active-diff'));
  btn.classList.add('active-diff');
  applyFilters();
}

function filterTag(tag, e) {
  e.stopPropagation();
  searchTerm = tag;
  document.getElementById('search-input').value = tag;
  applyFilters();
}

// ─── CARD TOGGLE ──────────────────────────────────────────────────────
function toggleCard(id) {
  if (expandedCard && expandedCard !== id) collapseCard(expandedCard);
  const card = document.getElementById('card-' + id);
  const detail = document.getElementById('detail-' + id);
  if (card.classList.contains('expanded')) {
    collapseCard(id);
  } else {
    detail.style.maxHeight = detail.scrollHeight + 'px';
    card.classList.add('expanded');
    card.querySelector('.expand-label').textContent = '收合詳情';
    expandedCard = id;
  }
}
function collapseCard(id) {
  const card = document.getElementById('card-' + id);
  const detail = document.getElementById('detail-' + id);
  if (!card) return;
  detail.style.maxHeight = '0';
  card.classList.remove('expanded');
  card.querySelector('.expand-label').textContent = '展開詳情';
  if (expandedCard === id) expandedCard = null;
}

// ─── TAB INDICATOR ────────────────────────────────────────────────────
function updateTabIndicator() {
  const active = document.querySelector('.tab-btn.active');
  const ind = document.getElementById('tab-indicator');
  if (active) {
    ind.style.left = active.offsetLeft + 'px';
    ind.style.width = active.offsetWidth + 'px';
  }
}

// ─── INTERSECTION OBSERVER ────────────────────────────────────────────
function observeCards() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), Math.min(i * 60, 360));
        observer.unobserve(entry.target);
      }
    });
  }, {threshold: 0.06});
  document.querySelectorAll('.card:not(.visible)').forEach(c => observer.observe(c));
}

// ─── HERO PREVIEW ─────────────────────────────────────────────────────
function buildHeroPreview() {
  const samples = [
    {h:14,bt:14,bb:26,l:76,bull:true},
    {h:10,bt:10,bb:76,l:76,bull:true},
    {h:10,bt:42,bb:42,l:76,bull:null},
    {h:10,bt:10,bb:76,l:76,bull:false},
    {h:10,bt:60,bb:72,l:74,bull:false},
  ];
  const H = 84, slotW = 44;
  const W = samples.length * slotW;
  let inner = '';
  samples.forEach((c,i) => { inner += drawC(i * slotW + slotW/2, c); });
  document.getElementById('hero-preview').innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

// ─── NAV SCROLL ───────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 10);
});
document.getElementById('search-input').addEventListener('input', function() {
  searchTerm = this.value.trim();
  applyFilters();
});
window.addEventListener('resize', updateTabIndicator);

// ─── INIT ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildHeroPreview();
  renderAll();
  requestAnimationFrame(updateTabIndicator);
});
</script>
</body>
</html>
