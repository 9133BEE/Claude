</svg>`,
body:`<h3>花店老闆的煩惱</h3>
<p>情人節前一天，玫瑰花價格可能暴漲3倍。花店老闆不想冒這個風險，於是在1月就找花農談好：「2月14日我要買1,000束玫瑰，每束固定50元。」花農也答應了——這就是<strong>期貨合約的雛形</strong>。</p>
<div class="hl"><b>📌 期貨的核心定義</b>期貨（Futures）是一種<strong>標準化合約</strong>，買賣雙方同意在未來特定日期，以<strong>現在約定的價格</strong>買入或賣出特定數量的標的物。</div>
<h3>期貨為什麼存在？</h3>
<p>期貨最初的目的是<strong>對沖（Hedge）價格風險</strong>。農夫擔心豐收時糧價下跌，食品公司擔心缺糧時價格飆漲，雙方透過期貨合約事先鎖定價格，各自規避不確定性。</p>
<p>後來，投機者（Speculator）加入市場，他們不需要實際商品，只是預測價格方向來賺取價差——這讓期貨市場的流動性大幅提升，也讓更多人能以較低成本參與。</p>
<h3>台灣的期貨主要是什麼？</h3>
<p>台灣期貨市場以<strong>金融期貨</strong>為主，不是農產品。最主流的是<strong>台指期（台股加權指數期貨）</strong>，追蹤台灣加權股價指數的漲跌，是台灣交易量最大的衍生性商品。</p>
<div class="eg"><b>✅ 生活比喻總結</b>期貨就像「預購」：你現在預訂，鎖定價格，未來到期才取貨（或結算差價）。和一般預購不同的是，期貨合約本身可以在到期前隨時<strong>轉讓買賣</strong>。</div>
<h3>期貨合約的三個要素</h3>
<ul>
<li><strong>標的物</strong>：合約追蹤的對象（台灣加權指數、台積電股票、原油等）</li>
<li><strong>到期日</strong>：合約履行的日期，台指期為每月第三個週三</li>
<li><strong>約定價格</strong>：簽約時雙方同意的交割價格（即今日的期貨報價）</li>
</ul>`,

{num:'1-2',title:'期貨 vs 現貨：5大關鍵差異',sub:'搞懂這些差異，才算真正入門期貨',ch:'第一章：認識期貨',rt:'10 分鐘',

svg:`<svg viewBox="0 0 580 190" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif">

body:`<h3>差異①：資金使用方式</h3>
<p>買股票要付全額——買一張台積電（1,000股）1,000元，要花100萬元。<br>買一口台指期只需繳交<strong>保證金</strong>（約5–15%的合約價值），其餘資金可留在帳戶或做其他投資。</p>
<div class="hl"><b>📌 槓桿效果</b>期貨保證金約為合約價值的5–15%，相當於<strong>15–20倍的槓桿</strong>。同樣的資金，期貨能控制更大規模的部位——獲利放大，虧損同樣放大。</div>
<h3>差異②：交易方向</h3>
<table class="cmp-table">
<tr><th>操作</th><th>現貨（股票）</th><th>期貨</th></tr>
<tr><td>看漲</td><td>✅ 買股票</td><td>✅ 買多單（做多）</td></tr>
<tr><td>看跌</td><td>⚠️ 融券放空（限制多）</td><td>✅ 賣空單（做空）無限制</td></tr>
<tr><td>平盤以下放空</td><td>❌ 不得放空</td><td>✅ 可以</td></tr>
</table>
<h3>差異③：有沒有到期日</h3>
<p>股票沒有到期日，可以持有10年、20年。期貨合約<strong>有到期日</strong>（台指期每月第三個週三），到期前必須平倉或換倉，無法無限期持有。</p>
<h3>差異④：損益結算方式</h3>
<p>持有股票時，帳面損益不影響你的現金——漲了看帳面開心，跌了還是有原始現金。<br>期貨則是<strong>每日結算（逐日盯市）</strong>：當日收盤後，獲利直接入帳、虧損直接從保證金扣除，這是最大的心理衝擊。</p>
<h3>差異⑤：稅務</h3>
<div class="formula">現貨（股票）：
  交易稅 0.3%（賣出時）
  股利需計入所得稅
  資本利得目前免稅

期貨：
  交易稅 0.004%（來回，極低）
  期貨交易所得目前課徵期交稅（較低）
  無配息，不涉及股利稅</div>
<h3>🔍 最關鍵的差異：槓桿倍數</h3>
<p>股票和期貨都可以用「借來的錢」操作，但借的比例差很多：</p>
<div class="formula">【股票融資】可以控制 2.5 倍的資產
  你有 40萬元 → 券商最多借你 60萬元（融資成數60%）
  可買到股票總值：40萬 + 60萬 = 100萬元
  槓桿倍數 = 100萬 ÷ 40萬 = 2.5 倍

  ↓ 股票跌40%：虧損100萬×40% = 40萬 → 你的本金歸零

【期貨保證金】可以控制 20 倍的資產
  你有 18.4萬元（保證金，約合約的5%）
  期貨商借出95%的錢 → 控制370萬元台指期合約
  槓桿倍數 = 370萬 ÷ 18.4萬 ≈ 20 倍

  ↓ 指數跌5%：虧損370萬×5% = 18.5萬 → 保證金幾乎歸零！

結論：同樣是「借錢操作」
  股票融資：最大 2.5倍槓桿（借60%）
  期貨保證金：最大 20倍槓桿（借95%）
  期貨槓桿是股票融資的 8倍！</div>
<div class="warn"><b>⚠️ 槓桿是雙面刃，放大獲利也放大虧損</b>
20倍槓桿：指數漲 1%，保證金報酬 +20%；指數跌 1%，保證金報酬 -20%。
只要 5% 的反向波動，保證金就可能歸零。
這就是為什麼期貨必須設停損——不設停損就是在賭博。</div>
<h3>實際感受：指數動1%，口袋動多少？</h3>
<table class="cmp-table">
<tr><th>操作方式</th><th>資金投入</th><th>控制部位</th><th>指數漲1%</th><th>指數跌1%</th></tr>
<tr><td>直接買股票</td><td>100萬</td><td>100萬</td><td>+10,000元</td><td>-10,000元</td></tr>
<tr><td>股票融資（2.5倍）</td><td>40萬</td><td>100萬</td><td>+10,000元</td><td>-10,000元</td></tr>
<tr><td>大台期貨（20倍）</td><td>18.4萬</td><td>370萬</td><td>+37,000元</td><td>-37,000元</td></tr>
<tr><td>小台期貨（20倍）</td><td>4.6萬</td><td>92萬</td><td>+9,250元</td><td>-9,250元</td></tr>
</table>
<p>看出來了嗎？大台期貨只投入18.4萬，指數每漲1%就賺37,000元——效率是直接買股的3.7倍。但虧損的時候也是一樣的倍數。</p>
<div class="warn"><b>⚠️ 期貨適合誰？</b>期貨不適合「長期存股」的投資人。它適合：有時間盯盤、能承受高波動、執行嚴格停損紀律的<strong>主動交易者</strong>。</div>`,

body:`<h3>什麼是保證金？</h3>
<p>期貨交易不需要付清合約全額，只需繳交一筆<strong>保證金</strong>作為「誠信保證」。這筆錢存在你的期貨帳戶，用來承擔交易過程中的虧損。</p>
<p>台指期大台一口合約價值約370萬元，但只需繳交約18.4萬元的保證金，這就是<strong>槓桿</strong>的由來。</p>
<h3>兩種保證金的差異</h3>
<table class="cmp-table">
<tr><th>種類</th><th>說明</th><th>大台金額</th></tr>
<tr><td><strong>原始保證金</strong>（Initial Margin）</td><td>開倉時需繳交的金額，也是帳戶應維持的正常水位</td><td>184,000元</td></tr>
<tr><td><strong>維持保證金</strong>（Maintenance Margin）</td><td>帳戶資金的下限，低於此線就會收到追繳通知</td><td>142,000元</td></tr>
</table>
<h3>帳戶權益如何計算？</h3>
<div class="formula">帳戶權益 = 原始保證金 + 浮動損益（未實現）

例：大台買入18,000點，現價下跌至17,800點
浮動損失 = 200點 × 200元 = 40,000元
帳戶權益 = 184,000 - 40,000 = 144,000元
→ 仍高於維持保證金(142,000)，安全</div>
<h3>風險指標（Risk Indicator）</h3>
<div class="formula">風險指標 = (帳戶權益 ÷ 維持保證金) × 100%

風險指標 > 100%：正常
風險指標 &lt; 100%：收到追繳通知（需補款至原始保證金）
風險指標 &lt;  25%：強制平倉（交易所自動幫你砍倉）</div>
<div class="warn"><b>⚠️ 重要：補款到原始保證金，不是維持保證金</b>收到追繳通知後，必須補款讓帳戶回到<strong>原始保證金</strong>水位，而非只補到維持保證金。許多新手誤解這一點，補款不足後仍被強制平倉。</div>
<h3>保證金的實務建議</h3>
<ul>
<li>帳戶建議保持<strong>2–3倍保證金</strong>的緩衝，避免小波動就觸發追繳</li>
<li>做大台建議帳戶至少有40–50萬元，才有足夠緩衝空間</li>
<li>做微台帳戶至少2–3萬元起步</li>
</ul>`,

body:`<h3>什麼是逐日盯市？</h3>
<p>「逐日盯市」（Mark-to-Market）是期貨最與眾不同的機制：每個交易日收盤後，交易所依<strong>當日結算價</strong>重新計算你的部位損益，並立即從帳戶入帳或扣款。</p>
<div class="hl"><b>📌 和股票最大的不同</b>持有股票：虧損20萬，帳戶現金<strong>不減少</strong>，只是帳面浮虧。<br>持有期貨：虧損20萬，帳戶現金<strong>立即減少</strong>20萬，這是真實的現金流動。</div>
<h3>每日損益怎麼算？</h3>
<div class="formula">當日損益（多單）= (今日結算價 - 昨日結算價) × 每點價值 × 口數

例：持有大台多單1口
昨日結算價：18,000點
今日結算價：18,200點
今日損益 = (18,200 - 18,000) × 200元 × 1口 = +40,000元
→ 今晚自動入帳40,000元

若今日結算價：17,850點
今日損益 = (17,850 - 18,000) × 200元 × 1口 = -30,000元
→ 今晚自動扣款30,000元</div>
<h3>為什麼要逐日盯市？</h3>
<p>逐日盯市確保<strong>交易所的風險最小化</strong>——如果期貨像股票一樣等到最後才結算，帳戶虧損可能遠超保證金，造成違約風險。每日結算把風險限制在「一天的波動範圍內」。</p>
<h3>實務上的心理衝擊</h3>
<p>新手最大的心理衝擊是：晚上看到帳戶扣了好幾萬，即使隔天反彈回來，那幾萬也已經「真實消失再真實回來」，心理壓力遠大於股票的帳面浮虧。</p>
<div class="eg"><b>✅ 調適方法</b>做期貨要看「累積損益」，不要每天看帳戶餘額起伏。每個交易日的扣款或入帳，在你還未平倉前都只是「階段性結算」，平倉後才是最終損益。</div>`,

body:`<h3>什麼情況下會被追繳？</h3>
<p>當你的帳戶因虧損導致<strong>帳戶權益低於維持保證金</strong>時，期貨商會自動發出追繳通知（Margin Call）。這通常透過簡訊或APP推播通知你。</p>
<div class="formula">大台（TX）追繳觸發條件：
帳戶權益 &lt; 142,000元（維持保證金）

例：帳戶原有184,000元，期間虧損50,000元
帳戶剩餘：184,000 - 50,000 = 134,000元
134,000 &lt; 142,000 → 觸發追繳！</div>
<h3>收到追繳通知怎麼辦？</h3>
<p>有兩個選擇：</p>
<div class="eg"><b>選擇①：補款（推薦）</b>
在<strong>隔日中午12:00前</strong>，將帳戶補款到原始保證金水位（不是補到維持保證金，而是原始保證金！）。
補款金額 = 原始保證金 - 目前帳戶權益
例：需補款至184,000元，目前帳戶134,000元 → 補款50,000元</div>
<div class="warn"><b>選擇②：接受強制平倉</b>
若不補款，期貨商有權在<strong>任何時間</strong>強制幫你平倉（砍倉）。強制平倉通常在市價成交，可能在不利價格執行，損失可能比你預期更大。</div>
<h3>最嚴重的情況：強制平倉</h3>
<p>當<strong>風險指標低於25%</strong>時，不需要等你決定，交易所會<strong>立即強制平倉</strong>，不給你任何緩衝時間。</p>
<div class="formula">強制平倉觸發：風險指標 &lt; 25%
風險指標 = 帳戶權益 ÷ 維持保證金 × 100%
= 帳戶權益 ÷ 142,000 × 100%

強制平倉觸發時：帳戶 &lt; 142,000 × 25% = 35,500元</div>
<h3>如何避免追繳？</h3>
<ul>
<li><strong>帳戶留足夠緩衝</strong>：至少保留2倍以上保證金（做大台建議帳戶40萬以上）</li>
<li><strong>設定停損</strong>：在特定虧損點主動出場，不要讓虧損無限擴大</li>
<li><strong>輕倉操作</strong>：資金100萬不要做5口，做1-2口即可</li>
</ul>
<div class="warn"><b>⚠️ 新手最常見的錯誤</b>拿10萬元開期貨帳戶，馬上做大台多單。大台保證金就要18.4萬，你帳戶只有10萬根本不夠原始保證金，更遑論緩衝空間。務必量力而為！</div>`,

body:`<h3>基本損益公式</h3>
<div class="formula">損益 = (平倉價 - 買入價) × 每點價值 × 口數

多單（看漲）：
  損益 = (賣出價 - 買入價) × 點值 × 口數
  → 賣出 > 買入 = 獲利；賣出 &lt; 買入 = 虧損

空單（看跌）：
  損益 = (賣出價 - 買入價) × 點值 × 口數
  → 賣出 > 買入 = 虧損；賣出 &lt; 買入 = 獲利</div>
<h3>實戰範例①：大台多單獲利</h3>
<div class="formula">操作：大台（TX）多單1口
買入：18,000點 / 賣出：18,500點
損益 = (18,500 - 18,000) × 200元 × 1口
     = 500點 × 200元
     = +100,000元

報酬率 = 100,000 ÷ 184,000（保證金）× 100% ≈ 54.3%
（指數僅漲2.8%，期貨報酬54.3%！）</div>
<h3>實戰範例②：大台多單虧損</h3>
<div class="formula">操作：大台（TX）多單1口
買入：18,000點 / 賣出：17,700點（停損出場）
損益 = (17,700 - 18,000) × 200元 × 1口
     = -300點 × 200元
     = -60,000元

虧損60,000元 ÷ 保證金184,000元 = -32.6%</div>
<h3>實戰範例③：空單獲利（看跌做空）</h3>
<div class="formula">操作：大台（TX）空單1口
賣出：19,000點 / 買回：18,500點（獲利平倉）
損益 = (19,000 - 18,500) × 200元 × 1口
     = 500點 × 200元
     = +100,000元
（指數跌了2.6%，做空者賺了10萬元）</div>
<h3>加計手續費後的真實損益</h3>
<div class="formula">真實損益 = 理論損益 - 手續費 × 2（來回）
手續費（優惠價）：約100元/口/邊
來回手續費：200元

例：大台多單獲利100,000元
真實損益 = 100,000 - 200 = 99,800元（影響極小）

但若操作頻繁（每天來回5口），
月手續費 = 200元 × 5口 × 20天 = 20,000元/月
→ 手續費侵蝕不可忽視！</div>`,
pts:['損益 = (平倉價-買入價) × 每點價值 × 口數','大台每點200元，指數漲1%≈3,700,000×1%÷200=185點，即37,000元','槓桿讓期貨報酬率遠高於指數漲跌幅','頻繁交易要注意手續費累積侵蝕損益']},

body:`<h3>限價單（Limit Order）</h3>
<p>你指定一個<strong>特定價格</strong>，只在這個價格或更好的價格才成交。買單填的是你願意買入的<strong>最高價</strong>，賣單填的是你願意賣出的<strong>最低價</strong>。</p>
<div class="eg"><b>使用場景</b>想買台指期，目前報價18,200點，你認為18,100點才划算 → 掛限價買單@18,100，等待市場跌到18,100才成交。缺點：如果市場直接漲上去，你永遠沒買到。</div>
<h3>市價單（Market Order）</h3>
<p>不指定價格，<strong>立即以當前最佳可得價格成交</strong>。保證成交，但成交價格可能比你看到的報價差幾點（這叫滑價）。</p>
<div class="warn"><b>⚠️ 夜盤或流動性低時慎用市價單</b>夜盤成交量稀少，一張市價單可能在比預期差10–20點的地方成交，無謂損失成本。優先使用限價單。</div>
<h3>停損單（Stop Order）</h3>
<p>這是<strong>風險管理最重要的工具</strong>。你設定一個觸發價格，當市場價格到達或超過這個觸發點，系統自動送出市價單執行。</p>
<div class="formula">停損單設定範例：
買入大台多單 @ 18,000點
停損設定 @ 17,800點（虧損200點即停損）

當指數跌至17,800點：
→ 系統自動送出市價平倉單
→ 最大虧損鎖定 ≈ 200點 × 200元 = 40,000元

注意：停損單觸發後以市價成交
實際成交可能是17,795點（略有滑價）</div>
<h3>委託有效期：ROD / IOC / FOK</h3>
<table class="cmp-table">
<tr><th>代號</th><th>全名</th><th>說明</th></tr>
<tr><td><strong>ROD</strong></td><td>Rest of Day</td><td>當日有效，未成交當日收盤自動取消</td></tr>
<tr><td><strong>IOC</strong></td><td>Immediate or Cancel</td><td>立即成交部分，未成交部分立即取消</td></tr>
<tr><td><strong>FOK</strong></td><td>Fill or Kill</td><td>立即全部成交，否則全部取消</td></tr>
</table>`,
pts:['限價單：指定價格成交，不滑價但可能未成交','市價單：保證成交，但可能滑價，流動性低時慎用','停損單：觸發後自動平倉，持倉必備的風控工具','ROD=當日有效、IOC=立即成交餘取消、FOK=全成交或全取消']},

body:`<h3>做多（Buy / Long）：看漲操作</h3>
<p>做多就是<strong>先買進、後賣出</strong>，預期價格會上漲後賣出獲利。這和買股票的邏輯一樣，只是期貨只需繳保證金，不需全額付款。</p>
<div class="formula">做多操作步驟：
1. 看好台股後市 → 買進大台多單1口 @ 18,000點
2. 指數漲至18,500點 → 賣出平倉
3. 獲利 = (18,500 - 18,000) × 200 = +100,000元

若指數跌至17,700點→ 停損賣出
虧損 = (17,700 - 18,000) × 200 = -60,000元</div>
<h3>做空（Sell / Short）：看跌操作</h3>
<p>做空是<strong>先賣出（融空）、後買回</strong>，預期價格會下跌後買回獲利。這在期貨市場完全正常，沒有融券限制、沒有平盤以下不得放空的規定。</p>
<div class="formula">做空操作步驟：
1. 預期台股回調 → 賣出大台空單1口 @ 19,000點
2. 指數跌至18,500點 → 買回平倉
3. 獲利 = (19,000 - 18,500) × 200 = +100,000元

若指數漲至19,300點 → 停損買回
虧損 = (19,000 - 19,300) × 200 = -60,000元</div>
<h3>做多 vs 做空 的風險不對稱</h3>
<div class="warn"><b>⚠️ 做空的理論損失無上限！</b>
做多最大虧損：買入價 × 合約價值（指數歸零才全虧）
做空理論最大虧損：無限大（指數可以無限上漲）

實務上，透過停損單限制虧損，兩者都是可控的。但做空心理壓力更大，因為「漲」比「跌」更難預測時間點。</div>
<h3>什麼時候做多？什麼時候做空？</h3>
<table class="cmp-table">
<tr><th>做多（買進）</th><th>做空（賣出）</th></tr>
<tr><td>大盤處於多頭趨勢</td><td>大盤處於空頭趨勢</td></tr>
<tr><td>KD黃金交叉、MACD翻多</td><td>KD死亡交叉、MACD翻空</td></tr>
<tr><td>美股大漲，夜盤台指期上揚</td><td>美股重挫，夜盤台指期下跌</td></tr>
<tr><td>重要支撐位反彈</td><td>重要壓力位反壓</td></tr>
</table>
<div class="eg"><b>✅ 新手建議</b>先只做多單，熟悉操作後再嘗試做空。做空的時機判斷更難，且空頭行情通常急速且短暫，需要更快的反應速度。</div>`,
pts:['做多：先買進後賣出，看漲獲利','做空：先賣出後買回，看跌獲利，期貨無放空限制','做多最大虧損有限；做空理論虧損無上限，需嚴格停損','新手建議先從做多入手，熟悉後再學做空']},

body:`<h3>什麼是換倉（Roll Over）？</h3>
<p>台指期每月到期（每月第三週三），如果你想繼續持有部位，必須在到期前進行「換倉」：<strong>同時平掉近月合約，買入次月合約</strong>，讓部位延續。</p>
<h3>結算日時間表</h3>
<table class="cmp-table">
<tr><th>月份</th><th>結算日</th><th>說明</th></tr>
<tr><td>每個月</td><td>第三個週三</td><td>近月合約到期，依結算價強制結清</td></tr>
<tr><td>結算時間</td><td>08:45 開盤後</td><td>取開盤後15分鐘成交均價為結算價</td></tr>
</table>
<h3>換倉操作步驟</h3>
<div class="formula">持有近月大台多單1口（建倉價18,000點）
換倉前報價：近月18,650 / 次月18,680

換倉操作：
步驟①：賣出近月平倉 → 成交@18,650（實現獲利150點=30,000元）
步驟②：買入次月建倉 → 成交@18,680（新部位成本18,680點）

換倉成本 = 30點 × 200元 = 6,000元
（次月比近月貴30點 = 正價差，這是持有成本）</div>
<h3>換倉成本是怎麼來的？</h3>
<p>台指期通常處於<strong>正價差</strong>狀態（次月 &gt; 近月），代表市場對未來有正面預期，也反映資金的時間成本。</p>
<div class="formula">正價差（Contango）：次月 > 近月（常態）
換倉成本 ≈ 30–80點/月（依市場情況而定）

全年換倉12次成本（大台）：
最小 = 30點 × 200元 × 12 = 72,000元/年
最大 = 80點 × 200元 × 12 = 192,000元/年
→ 長期持有期貨的隱性成本相當可觀</div>
<h3>換倉的最佳時機</h3>
<ul>
<li><strong>結算日前3–5個交易日</strong>執行（通常是第三週一前後）</li>
<li>觀察近月成交量明顯低於次月時 → 換倉信號</li>
<li>不要等到結算日當天才換！流動性差，買賣價差擴大，成本更高</li>
</ul>
<div class="warn"><b>⚠️ 長期持有期貨代價驚人</b>以大台為例，每年換倉成本7.2–19.2萬元。相比之下，持有0050一年的手續費不超過3,000元，且每年領取股息。長期持有者應優先考慮ETF而非期貨。</div>`,

body:`<h3>夜盤是什麼？</h3>
<p>台指期夜盤從<strong>下午15:00開始到隔天05:00</strong>，讓投資人可以在美股交易時段即時對應國際市場動態。台灣是少數提供如此長時間夜盤交易的市場之一。</p>
<h3>夜盤最重要的時間點</h3>
<table class="cmp-table">
<tr><th>台灣時間</th><th>事件</th><th>影響</th></tr>
<tr><td>22:30</td><td>美股開盤</td><td>台指期夜盤立即連動，最活躍時段</td></tr>
<tr><td>22:30（月)</td><td>CPI/PPI發布</td><td>通膨數據，影響Fed立場→大波動</td></tr>
<tr><td>22:30（每月首五）</td><td>非農就業報告</td><td>全球最重要就業數據，必看</td></tr>
<tr><td>03:00–04:00</td><td>Fed利率決策</td><td>全年最重要的幾次，可能造成±2%</td></tr>
</table>
<h3>夜盤的特性與限制</h3>
<div class="warn"><b>⚠️ 夜盤流動性遠低於日盤</b>夜盤成交量約為日盤的5–15%，買賣價差可能擴大至3–5點（日盤通常1點），大量委託容易造成滑價。建議：①使用限價單，②每次操作口數比日盤少一半。</div>
<h3>夜盤對沖現股持倉</h3>
<p>持有台股現股的投資人，可在夜盤<strong>賣出台指期空單</strong>對沖隔日開盤風險。</p>
<div class="formula">對沖範例：
持有台積電現股50張（5萬股），市值約5,000萬元

夜間費半指數重挫5%，預估台積電跌幅4%
潛在損失 ≈ 5,000萬 × 4% = 200萬元

對沖操作：夜盤賣出大台空單10口
若台指期跌1,000點：獲利 = 1,000×200×10 = 200萬
→ 現股損失被期貨獲利對沖</div>
<h3>夜盤操作原則</h3>
<ul>
<li><strong>重大數據前15分鐘出場</strong>：數據方向確認後再進場，不要在數據公布前持有大部位</li>
<li><strong>美股開盤前30分鐘最活躍</strong>：22:00–22:30行情常有方向性突破</li>
<li><strong>凌晨02:00後少操作</strong>：流動性極低，非必要不在此時間持大倉</li>
</ul>`,

body:`<h3>台灣個股期貨基本介紹</h3>
<p>台灣目前有<strong>超過500檔個股期貨</strong>，標的涵蓋台積電、聯發科、鴻海、台達電等主要上市公司。標準合約規模通常為<strong>2,000股/口</strong>。</p>
<h3>個股期貨 vs 直接買股票</h3>
<table class="cmp-table">
<tr><th>比較項目</th><th>直接買股票</th><th>個股期貨</th></tr>
<tr><td>所需資金（台積電2,000股）</td><td>約200萬元</td><td>約27萬元保證金</td></tr>
<tr><td>享有股息</td><td>✅ 除息配股</td><td>❌ 不享股息</td></tr>
<tr><td>做空限制</td><td>平盤以下不得放空</td><td>✅ 無限制，隨時可空</td></tr>
<tr><td>融券問題</td><td>券源不足可能強制回補</td><td>✅ 不會強制回補</td></tr>
<tr><td>到期日</td><td>無</td><td>每月第三週三</td></tr>
</table>
<h3>個股期貨的最大優勢：靈活放空</h3>
<p>台灣股票融券放空有兩大限制：①<strong>平盤以下不得放空</strong>（防守性規定），②<strong>券源不足</strong>（熱門股常常借不到券）。個股期貨完全沒有這些限制，任何時間、任何價位都能做空。</p>
<div class="eg"><b>✅ 實戰：用個股期貨避險</b>持有台積電現股100張（10萬股）的投資人，若擔心短期回調：
賣出台積電期貨50口（50×2,000=10萬股）完全對沖
現股下跌損失 ≈ 空單期貨獲利（delta中性）
回調結束後，買回期貨空單，繼續持有現股</div>
<h3>個股期貨的注意事項</h3>
<div class="warn"><b>⚠️ 除息注意</b>個股除息時，期貨合約價格<strong>同步向下調整</strong>（等於除息金額），持有多單不會因除息而損失，但也不會「領到股息」。</div>
<div class="formula">損益計算範例（台積電期貨）：
台積電股價從900元漲至950元

body:`<h3>為什麼停損是期貨的生命線？</h3>
<p>股票虧損50%，還需要漲100%才能回本；期貨加了15–20倍槓桿，一個大波動就能讓保證金歸零，甚至產生超額虧損。<strong>停損不是示弱，是延長存活時間的唯一方法</strong>。</p>
<div class="hl"><b>📌 期貨交易的核心悖論</b>賺錢的唯一方式，是不讓自己出局。出局的最快方式，是不設停損。</div>
<h3>停損點怎麼設定？</h3>
<p>停損不是隨便設一個數字，而是根據<strong>市場結構</strong>和<strong>資金承受能力</strong>來決定：</p>
<div class="formula">方法①：技術面停損
設在關鍵支撐/壓力位下方（多單）或上方（空單）
例：台指期多單，支撐在18,200點 → 停損設在18,100（支撐下100點）

方法②：固定金額停損（適合新手）
每筆交易最大虧損 ≤ 帳戶的2%
帳戶50萬 → 每筆最大虧損10,000元
大台1口10,000÷200 = 50點停損
（一旦虧損50點就出場）

方法③：固定百分比停損
設定虧損達保證金15–20%就出場
大台保證金18.4萬 → 虧損2.76萬就出場 ≈ 138點</div>
<h3>資金控管：2% 原則</h3>
<p>職業交易員普遍遵守的原則：<strong>任何單筆交易，風險不超過帳戶總資金的2%</strong>。</p>
<div class="formula">帳戶資金100萬元
每筆最大風險 = 100萬 × 2% = 20,000元

若停損設在100點（大台1口=20,000元）→ 可做1口
若停損設在50點（大台1口=10,000元）→ 可做2口
若停損設在200點（大台1口=40,000元）→ 不能做大台
（保護：即使連續輸10次，帳戶僅虧20%，還能繼續交易）</div>
<h3>最重要的一條規則</h3>
<div class="warn"><b>⚠️ 停損絕對不能移動</b>設好停損後，不管你多麼「相信」市場會反轉，都不要把停損點往更不利的方向移動。這是期貨交易中最致命的心理陷阱，已經讓無數交易人傾家蕩產。</div>
<ul>
<li>停損觸發 → 立即出場 → 重新評估行情</li>
<li>不要「攤平」（加碼虧損部位）</li>
<li>不要「凹單」（撐著不認輸）</li>
<li>連續虧損3次後，暫停交易1天，重新評估策略</li>
</ul>`,
pts:['停損是延長市場存活時間的唯一方法，不設停損必然爆倉','停損點設在技術面關鍵位置，不能隨意移動','2%原則：單筆風險不超過帳戶總資金的2%','連虧3次暫停交易，避免情緒化決策']},

body:`<h3>期貨 vs ETF：成本與適用場景</h3>
<table class="cmp-table">
<tr><th>比較項目</th><th>期貨（台指期大台）</th><th>ETF（0050）</th></tr>
<tr><td>持有成本（100萬元部位3個月）</td><td>換倉18,000+手續費≈19,200元</td><td>買賣一次≈1,430元</td></tr>
<tr><td>股息收益</td><td>❌ 無</td><td>✅ 年殖利率約5–7%</td></tr>
<tr><td>槓桿</td><td>15–20倍</td><td>1倍（無槓桿）</td></tr>
<tr><td>放空能力</td><td>✅ 可隨時做空</td><td>❌ 無（除槓反型ETF）</td></tr>
<tr><td>最適合持有期</td><td>數日到數月</td><td>數年到數十年</td></tr>
<tr><td>稅務</td><td>期交稅0.004%，低</td><td>資本利得免稅，股息所得稅</td></tr>
</table>
<h3>核心＋衛星策略</h3>
<p>這是機構和高端私人投資人常用的配置框架：</p>
<div class="formula">核心倉（Core）：60–80% 資金
  → ETF（0050、006208）長期持有、定期定額
  → 目標：捕捉台股長期成長 + 領股息複利
  → 特點：低成本、不需盯盤

衛星倉（Satellite）：10–20% 資金
  → 期貨（微台、小台）戰術性加碼或對沖
  → 目標：趨勢行情放大報酬、下跌行情對沖損失
  → 特點：靈活、高效、需積極管理</div>
<h3>實戰應用：行情好時加碼，行情壞時對沖</h3>
<div class="eg"><b>✅ 多頭行情（加碼）</b>
ETF持有100萬元，台股上漲趨勢明確
→ 再用10萬保證金買小台2口（相當於加碼約50萬市值的台股暴露）
→ 行情續漲：ETF+小台雙重獲利
→ 行情反轉：停損期貨，ETF繼續持有</div>
<div class="eg"><b>✅ 空頭行情（對沖）</b>
ETF持有100萬元，預期台股短期回調
→ 賣出小台2口（相當於對沖50萬元暴露）
→ 市場下跌：ETF跌損 ≈ 期貨空單獲利
→ 回調結束：平掉空單，繼續讓ETF持有</div>
<h3>長期績效比較</h3>
<div class="formula">2009–2023年（15年）台股含息年化報酬約12%

場景A：全部買0050（100萬元）
  15年後：100萬 × (1.12)^15 ≈ 547萬元

場景B：核心+衛星（ETF 80萬 + 期貨保證金20萬）
  ETF部分：80萬 × 1.12^15 ≈ 437萬元
  期貨衛星（假設年化20%）：20萬 × 1.20^15 ≈ 309萬元
  合計：約746萬元（但期貨部分風險高，並非保證）</div>`,

body:`<h3>第一類：保證金相關術語</h3>
<div class="kp-box">
<b>原始保證金（Initial Margin）</b><br>
開倉時必須繳交的最低金額。台指期大台約184,000元，小台46,000元，微台9,200元。這是「入場門票」，不是全部成本。
</div>
<div class="kp-box">
<b>維持保證金（Maintenance Margin）</b><br>
持有倉位時帳戶必須維持的最低金額，約為原始保證金的75–80%。大台約為139,000元。低於此值會收到追繳通知。
</div>
<div class="kp-box">
<b>風險指標（Risk Indicator）</b><br>
公式：帳戶權益 ÷ 所有合約原始保證金總額 × 100%。
低於25%→警示；低於25%持續→強制平倉。建議維持在100%以上。
</div>
<div class="kp-box">
<b>追繳保證金（Margin Call）</b><br>
當帳戶風險指標過低，期貨商發出補錢通知。必須在交易日下午2:00前補足至原始保證金，否則期貨商有權強制平倉。
</div>
<div class="kp-box">
<b>逐日盯市（Mark-to-Market）</b><br>
每日收盤後，期貨商會根據當日結算價重新計算你的損益，直接加減到帳戶餘額。盈利當天入帳，虧損當天扣款。
</div>
<h3>第二類：交易操作術語</h3>
<div class="kp-box">
<b>多單（Long）/ 空單（Short）</b><br>
多單：預期漲，先買後賣。空單：預期跌，先賣後買。期貨特別之處是可以「先賣再買」——即空單建立不需要借券。
</div>
<div class="kp-box">
<b>建倉（Open）/ 平倉（Close）</b><br>
建倉：開啟新的期貨部位（買入或賣出）。平倉：反向操作關閉部位（賣出多單 或 買回空單），實現損益。
</div>
<div class="kp-box">
<b>沖銷 / 當沖（Day Trade）/ 留倉（Overnight）</b><br>
當沖：同一天建倉並平倉，不過夜，無隔夜風險。留倉：持有部位過夜，承擔隔夜缺口風險但可捕捉更大波段。
</div>
<div class="kp-box">
<b>換倉（Roll Over）</b><br>
近月合約接近到期日前，將部位從近月移到次月的操作。通常在結算前一週進行。需注意換倉成本（正逆價差）。
</div>
<div class="kp-box">
<b>近月 / 次月 / 結算</b><br>
近月：最快到期的合約（流動性最好）。次月：下一個月份的合約。結算：每月第三個星期三上午，以開盤集合競價決定「結算價」，所有當月合約強制以此價格平倉。
</div>
<h3>第三類：市場結構術語</h3>
<div class="kp-box">
<b>正價差（Contango）/ 逆價差（Backwardation）</b><br>
正價差：期貨價格 > 現貨價格（正常狀態，代表市場對未來偏樂觀，期貨含持有成本）。
逆價差：期貨價格 &lt; 現貨價格（通常代表市場恐慌或預期未來下跌，短期看空訊號）。
</div>
<div class="kp-box">
<b>基差（Basis）</b><br>
基差 = 現貨價格 − 期貨價格。正基差代表現貨貴（逆價差），負基差代表期貨貴（正價差）。換倉時需注意基差，避免付出不必要的成本。
</div>
<div class="kp-box">
<b>點值（Tick Value）</b><br>
每一個指數點代表的金額。大台：200元/點；小台：50元/點；微台：10元/點。台指期漲10點，大台獲利2,000元。
</div>
<h3>第四類：委託訂單術語</h3>
<table class="cmp-table">
<tr><th>訂單類型</th><th>說明</th><th>適用場景</th></tr>
<tr><td>限價單（Limit）</td><td>指定價格成交，保護成本</td><td>流動性好、波動穩定時</td></tr>
<tr><td>市價單（Market）</td><td>以市場最佳價格立即成交</td><td>緊急進出、重要消息時</td></tr>
<tr><td>停損單（Stop Loss）</td><td>觸達指定價位後觸發市價單</td><td>保護既有部位的核心工具</td></tr>
<tr><td>停利單（Take Profit）</td><td>達到獲利目標後自動平倉</td><td>鎖定利潤、避免回吐</td></tr>
<tr><td>IOC</td><td>立即成交，未成交部分取消</td><td>想快速部分成交</td></tr>
<tr><td>FOK</td><td>全部成交或全部取消</td><td>必須全量成交的策略</td></tr>
<tr><td>ROD</td><td>當日有效，收盤自動取消</td><td>日內委託掛單</td></tr>
</table>
<h3>第五類：損益計算術語</h3>
<div class="kp-box">
<b>浮動損益（Unrealized P&amp;L）</b><br>
尚未平倉的部位，按當前市價計算的帳面損益。每秒都在變動，只有平倉後才變成「已實現損益」。
</div>
<div class="kp-box">
<b>最大回撤（Max Drawdown）</b><br>
從高點到低谷的最大跌幅。評估交易策略風險的重要指標。例如帳戶從50萬跌到35萬，回撤為30%。
</div>
<div class="kp-box">
<b>期交稅</b><br>
台灣期貨每口每次交易課徵千分之0.2（0.02%）的期交稅。以大台一口賣在20,000點：稅 = 20,000 × 200 × 0.0002 = 800元。

body:`<h3>一、損益計算公式</h3>
<div class="formula">【多單（看漲）損益公式】
損益 = (平倉價 - 建倉價) × 點值 × 口數

範例 1：大台（200元/點）做多
  建倉：指數20,000點；平倉：指數20,500點；1口
  損益 = (20,500 - 20,000) × 200 × 1 = +100,000元（獲利）

範例 2：小台（50元/點）做多
  建倉：指數20,000點；平倉：指數19,800點；2口
  損益 = (19,800 - 20,000) × 50 × 2 = -20,000元（虧損）</div>
<div class="formula">【空單（看跌）損益公式】
損益 = (建倉價 - 平倉價) × 點值 × 口數

範例：大台做空
  建倉：指數21,000點；平倉：指數20,600點；1口
  損益 = (21,000 - 20,600) × 200 × 1 = +80,000元（獲利）

注意：空單賺的是「跌幅」，若指數漲回21,500則虧損10萬元</div>
<div class="formula">【微台（10元/點）做多範例 — 新手練習用】
  建倉：20,000點；平倉：20,300點；1口
  損益 = (20,300 - 20,000) × 10 × 1 = +3,000元</div>
<h3>二、保證金相關公式</h3>
<div class="formula">【帳戶風險指標（最重要！）】
風險指標 = 帳戶權益 ÷ 所有未平倉合約原始保證金之和 × 100%

帳戶權益 = 原始存入資金 + 浮動損益（每日更新）

範例：帳戶存200,000元，持有大台1口（保證金184,000元）
  今日浮動虧損 -30,000元
  帳戶權益 = 200,000 - 30,000 = 170,000元
  風險指標 = 170,000 / 184,000 = 92% ← 安全

  若虧損 -155,000元：權益 = 45,000 / 184,000 = 24.4% ← 追繳！</div>
<div class="formula">【補繳保證金計算】
需補金額 = 原始保證金 - 現有帳戶權益

範例：帳戶權益剩40,000元，原始保證金184,000元
  需補繳 = 184,000 - 40,000 = 144,000元（下午2點前）</div>
<div class="formula">【槓桿倍數計算】
槓桿倍數 = 合約總市值 ÷ 所需保證金

台指期大台@20,000點：合約市值 = 20,000 × 200 = 4,000,000元
槓桿倍數 = 4,000,000 / 184,000 ≈ 21.7倍

台指期小台@20,000點：合約市值 = 20,000 × 50 = 1,000,000元
槓桿倍數 = 1,000,000 / 46,000 ≈ 21.7倍（相同槓桿，不同規模）</div>
<h3>三、停損計算公式</h3>
<div class="formula">【停損點數計算】
可承受虧損點數 = 單筆最大虧損金額 ÷ (點值 × 口數)

範例：計畫每筆最多虧損20,000元，做大台1口
  停損點數 = 20,000 / (200 × 1) = 100點
  買在20,000點 → 停損設在19,900點

範例：計畫每筆最多虧損10,000元，做小台2口
  停損點數 = 10,000 / (50 × 2) = 100點
  買在20,000點 → 停損設在19,900點</div>
<div class="formula">【風險報酬比計算】
風險報酬比 = 預期獲利 ÷ 最大虧損

目標：買大台@20,000，停損-100點，目標+300點
  風險報酬比 = 300 ÷ 100 = 3:1（每虧1元，預期賺3元）
  建議：風險報酬比至少維持 2:1 以上才值得進場</div>
<h3>四、稅費成本計算</h3>
<div class="formula">【期交稅計算（每次交易雙邊都課）】
期交稅 = 成交金額 × 0.02%
成交金額 = 成交點數 × 點值

大台@20,000點：
  稅 = 20,000 × 200 × 0.02% = 800元（建倉）+ 800元（平倉）= 1,600元

小台@20,000點：
  稅 = 20,000 × 50 × 0.02% = 200元/次，來回 400元</div>
<div class="formula">【損益平衡點計算（含手續費）】
損益平衡點 = 建倉價 + (手續費 + 期交稅) ÷ (點值 × 口數)

範例：大台1口，手續費150元，期交稅800元
  成本 = (150 + 800) / 200 = 4.75點
  買@20,000 → 損益平衡在20,004.75點（約漲5點才開始賺）</div>
<h3>五、換倉成本計算</h3>
<div class="formula">【換倉成本公式】
換倉成本 = 次月合約價格 - 近月合約價格

若近月@20,000，次月@20,050：
  正價差 = 50點 → 換倉成本 = 50 × 200 = 10,000元（多單換倉需付出）

若近月@20,000，次月@19,960：
  逆價差 = -40點 → 換倉獲利 = 40 × 200 = 8,000元（空頭環境換倉有利）</div>
<div class="warn"><b>⚠️ 公式使用提醒</b>
以上公式未考慮：滑價（市價單成交差異）、隔夜利率成本、選擇權時間價值。
實際交易損益可能與理論計算有出入，建議每筆交易後核對交割單。</div>`,
pts:['多單損益=(平倉-建倉)×點值×口數；空單損益=(建倉-平倉)×點值×口數','風險指標=帳戶權益÷原始保證金，必須維持25%以上','停損點數=單筆最大虧損÷(點值×口數)，先計算再下單','期交稅=成交金額×0.02%，大台來回約1,600元']},

body:`<h3>策略一：趨勢追蹤（Trend Following）</h3>
<div class="hl"><b>核心思想：</b>不預測頂底，只跟隨已確立的趨勢方向。讓獲利奔跑，嚴格截斷虧損。</div>
<h3>操作要點</h3>
<ul>
<li><strong>確認趨勢</strong>：20MA 和 60MA 都向上且多頭排列，才做多；都向下才做空。不在盤整區交易。</li>
<li><strong>進場時機</strong>：突破前高（或前低）+ 成交量放大，是最典型的進場訊號。</li>
<li><strong>停損設置</strong>：設在前一個重要低點下方（多單）或前一個重要高點上方（空單），不受情緒影響。</li>
<li><strong>出場方式</strong>：移動停利（Trailing Stop）——隨著獲利擴大，停損逐步上移，讓利潤最大化。</li>
</ul>
<div class="eg"><b>台指期趨勢交易範例</b><br>
台指從18,000上漲突破19,000關卡，成交量創新高。MA20/MA60均向上排列。<br>
進場：19,050點做多，1口大台。<br>
初始停損：18,700點（-350點，虧損上限70,000元）。<br>
台指繼續漲至20,000點。停損上移至19,600（保護利潤）。<br>
最終在19,600觸停損平倉：獲利 = (19,600-19,050)×200 = 110,000元。</div>
<h3>策略二：區間震盪操作（Mean Reversion）</h3>
<div class="hl"><b>核心思想：</b>在確認的區間內，高賣低買。適合橫盤盤整的市場環境。</div>
<h3>操作要點</h3>
<ul>
<li><strong>確認區間</strong>：至少3次觸碰支撐和壓力才算確認，單次碰壁不算。</li>
<li><strong>進場位置</strong>：多單在支撐區買入（加上K線確認訊號如吞噬、槌子線）；空單在壓力區賣出。</li>
<li><strong>停損設置</strong>：突破支撐/壓力20–30點停損（避免假突破吃掉停損後回來）。</li>
<li><strong>注意破位</strong>：一旦區間被突破且收盤確認，應立即出場，不要繼續等反轉。</li>
</ul>
<div class="formula">區間操作判斷標準：
支撐區 = 近30日最低點 ± 50點緩衝帶
壓力區 = 近30日最高點 ± 50點緩衝帶
勝率目標 > 55%，風險報酬比 1:1.5 以上</div>
<h3>策略三：ETF避險（Hedging）</h3>
<div class="hl"><b>核心思想：</b>持有ETF（0050等）的同時，用期貨空單對沖系統性風險，降低組合波動度。</div>
<h3>操作要點</h3>
<ul>
<li><strong>避險比例計算</strong>：若持有0050市值200萬元（Beta≈1），需要空台指期合約市值約200萬元。<br>
  所需空單口數 = 200萬 ÷ (指數點數 × 點值) = 200萬 ÷ (20,000 × 200) = 0.5口 → 做空小台2口</li>
<li><strong>何時啟動避險</strong>：技術面轉弱（跌破月線）、或有明確利空事件（聯準會決議、地緣衝突）時。</li>
<li><strong>何時解除避險</strong>：恐慌消退、指數回穩上方月線後，買回空單平倉。</li>
</ul>
<div class="eg"><b>避險實戰範例</b><br>
持有0050共200萬元，台指在20,000點，擔心短期回調。<br>
做空小台2口（合約市值 = 2 × 20,000 × 50 = 200萬）。<br>
隔週台指跌500點（-2.5%）：<br>
  ETF損失：200萬 × 2.5% = -50,000元<br>
  空單獲利：500 × 50 × 2 = +50,000元<br>
  淨損益：0元（完美對沖）</div>
<h3>策略四：當沖（Day Trading）基本框架</h3>
<ul>
<li><strong>開盤前</strong>：確認美股夜盤方向、期貨夜盤走勢、重大新聞事件。</li>
<li><strong>開盤策略</strong>：高開（+0.5%以上）通常先漲再跌（賣壓），低開（-0.5%以下）常先跌再漲（買盤）。</li>
<li><strong>核心工具</strong>：5分鐘/15分鐘K線 + VWAP + RSI(14)。</li>
<li><strong>停損紀律</strong>：當沖必須設置每日最大虧損上限，達到即停止交易，不追單。</li>
</ul>
<div class="warn"><b>⚠️ 策略選擇的重要原則</b>
初學者建議從「趨勢追蹤」入門——勝率雖低（約40–45%），但單次獲利遠大於虧損，長期正期望值。
區間操作看似容易，但一次破位可能吞掉數次獲利。當沖需要大量練習和心理素質，不適合剛入門者。
<strong>先練「看方向、設停損、嚴格執行」，再談策略複雜度。</strong></div>`,

body:`<h3>一、移動均線（MA）——最基礎的趨勢工具</h3>
<div class="hl"><b>📌 期貨交易最常用的三條均線</b>
MA5（5日線）：短期趨勢，日內和短線操作的主要參考。
MA20（月線）：中期趨勢，多空分水嶺，突破或跌破最重要。
MA60（季線）：長期趨勢，支撐和壓力的重要位置。</div>
<h3>多頭排列 vs 空頭排列</h3>
<table class="cmp-table">
<tr><th>排列狀態</th><th>均線順序</th><th>操作方向</th><th>意義</th></tr>
<tr><td>多頭排列</td><td>MA5 &gt; MA20 &gt; MA60</td><td>做多（偏多操作）</td><td>短期&gt;中期&gt;長期，上升趨勢確立</td></tr>
<tr><td>空頭排列</td><td>MA5 &lt; MA20 &lt; MA60</td><td>做空（偏空操作）</td><td>短期&lt;中期&lt;長期，下跌趨勢確立</td></tr>
<tr><td>糾結中立</td><td>三線纏繞</td><td>觀望</td><td>方向不明，等待突破再操作</td></tr>
</table>
<div class="eg"><b>實戰應用範例</b><br>
台指期大台，目前：MA5=20,200 / MA20=19,800 / MA60=19,500。<br>
→ 多頭排列！適合做多。<br>
進場策略：MA20附近（19,800±50點）是相對好的買點，停損設MA60下方（19,450）。<br>
目標：前高20,500，風險報酬比約 = 700 ÷ 350 = 2:1。</div>
<h3>二、RSI（相對強弱指標）</h3>
<div class="kp-box">
<b>RSI 公式</b>：RSI = 100 - [100 / (1 + 平均上漲幅度 / 平均下跌幅度)]<br>
<b>常用設定</b>：RSI(14) — 14個周期（日線用14天，分鐘線用14根K）<br>
<b>判讀標準</b>：<br>
• RSI &gt; 70：超買區（可能過熱，注意回調）<br>
• RSI &lt; 30：超賣區（可能跌深，注意反彈）<br>
• RSI 50 是多空分界：站穩50偏多，跌破50偏空
</div>
<div class="formula">RSI 應用於台指期：
場景：台指期RSI(14) = 75，指數在21,000點
→ 超買訊號，但趨勢強勁時RSI可長期維持75–85
→ 不要單純因為「超買」就空，要等RSI從高點回落+K線轉弱

場景：指數下跌，RSI跌至28（超賣）
→ 若同時出現長下影線K（錘子線），是反彈做多的機會
→ 停損設在近期低點下方30點</div>
<h3>三、MACD（移動平均收斂發散）</h3>
<div class="kp-box">
<b>MACD 三要素</b>：<br>
• DIF線（快線）= EMA12 - EMA26<br>
• MACD線（慢線）= DIF的9日EMA<br>
• 柱狀體（OSC）= DIF - MACD（正柱=多頭，負柱=空頭）<br><br>
<b>最重要的訊號</b>：<br>
• 黃金交叉：DIF向上穿越MACD → 做多訊號<br>
• 死亡交叉：DIF向下穿越MACD → 做空訊號<br>
• 柱狀體由負轉正 → 動能由空轉多
</div>
<h3>四、成交量判讀</h3>
<table class="cmp-table">
<tr><th>量價關係</th><th>K線狀況</th><th>意義</th><th>操作傾向</th></tr>
<tr><td>量增價漲</td><td>陽線 + 量創新高</td><td>真突破，資金進場</td><td>積極做多</td></tr>
<tr><td>量縮價漲</td><td>陽線 + 量萎縮</td><td>假突破可能，缺乏動力</td><td>謹慎做多</td></tr>
<tr><td>量增價跌</td><td>陰線 + 量創新高</td><td>賣壓沉重，下跌確認</td><td>考慮做空</td></tr>
<tr><td>量縮價跌</td><td>陰線 + 量萎縮</td><td>下跌動力減弱，可能止跌</td><td>觀望，等反彈</td></tr>
</table>
<h3>五、支撐與壓力的判斷</h3>
<ul>
<li><strong>整數關卡</strong>：20,000 / 21,000 / 22,000點天然是心理支撐壓力</li>
<li><strong>前高前低</strong>：市場記憶最強，上方前高是壓力，下方前低是支撐</li>
<li><strong>均線支撐</strong>：MA20在上升趨勢中常作為動態支撐，碰觸MA20是做多機會</li>
<li><strong>缺口</strong>：開盤跳空缺口通常有回補傾向，是短線操作的參考點</li>
</ul>
<div class="formula">台指期支撐壓力計算範例（20分鐘K線）：
前日高點：20,350點（壓力）
前日低點：20,100點（支撐）
今日開盤：20,200點

操作邏輯：
多單：20,100附近買入，目標20,350，停損20,050
空單：20,350附近賣出，目標20,100，停損20,400
勝率目標：60%以上，風險報酬比2:1</div>
<div class="warn"><b>⚠️ 技術分析的局限性</b>
技術分析是工具，不是預言。它告訴你「過去的路徑」，不保證未來走向。
重大基本面事件（央行決策、企業財報、地緣政治）會讓所有技術形態失效。
建議：先看基本面大方向（多/空環境），再用技術分析找進出點。</div>`,
pts:['多頭排列：MA5>MA20>MA60，做多；空頭排列：MA5<MA20<MA60，做空','RSI>70超買，RSI<30超賣，RSI 50是多空分界','MACD黃金交叉做多，死亡交叉做空，配合柱狀體判讀動能','量增價漲是真突破；量縮價漲要謹慎；整數關卡是最強的支撐壓力']},

body:`<h3>為什麼要看籌碼？</h3>
<p>台灣期貨市場中，散戶的交易量占最大比例，但散戶整體長期是虧錢的。外資和自營商是市場中最有資訊優勢的參與者。<strong>追蹤法人籌碼動向</strong>，能幫助你判斷大趨勢是否被「大錢」支撐。</p>
<h3>三大法人的特性</h3>
<table class="cmp-table">
<tr><th>法人類型</th><th>特性</th><th>操作風格</th><th>參考價值</th></tr>
<tr><td>外資（QFII）</td><td>規模最大，資訊最充分</td><td>趨勢型，持倉時間長</td><td>★★★★★ 最重要</td></tr>
<tr><td>自營商</td><td>對沖選擇權部位為主</td><td>與選擇權連動，偏短線</td><td>★★★ 搭配選擇權看</td></tr>
<tr><td>投信</td><td>持有個股為主，期貨部位小</td><td>對沖現股風險</td><td>★★ 參考為輔</td></tr>
</table>
<div class="hl"><b>📌 籌碼分析最關鍵指標：外資台指期淨未平倉口數</b><br>
外資淨口數 = 外資多單口數 - 外資空單口數<br>
正值（淨多）→ 外資看漲，偏多操作<br>
負值（淨空）→ 外資看跌，偏空操作<br>
<strong>重點是「趨勢方向」，而不是絕對數字！</strong></div>
<h3>如何查詢法人籌碼？</h3>
<ul>
<li><strong>台灣期貨交易所（TAIFEX）官網</strong>：每日15:30後公布三大法人期貨部位</li>
<li><strong>看盤軟體</strong>：券商HTS/APP通常有「三大法人期貨部位」專頁</li>
<li><strong>Goodinfo / CMoney</strong>：提供歷史法人期貨籌碼圖表</li>
</ul>
<h3>籌碼分析的實戰應用</h3>
<div class="eg"><b>場景一：外資大幅增加多單</b><br>
觀察到：外資台指期淨口數從+5,000口 → +20,000口（連續3天增加多單）。<br>
意義：外資正在大幅布局多單，看好後市。<br>
操作參考：技術面若同時多頭排列，可考慮順勢做多。</div>
<div class="eg"><b>場景二：外資快速翻空</b><br>
觀察到：外資淨口數從+15,000口 → +5,000口 → -5,000口（連續3天減多增空）。<br>
意義：外資開始轉向，市場可能進入盤整或反轉。<br>
操作參考：多單宜縮減，等待方向明朗。</div>
<h3>選擇權大戶部位（進階）</h3>
<p>除了期貨籌碼，<strong>選擇權大戶的最大痛點（Max Pain）</strong>也是重要參考：</p>
<div class="kp-box">
<b>選擇權最大痛點（Max Pain）</b><br>
這個價位是讓選擇權賣方（大戶）損失最小的結算點。<br>
市場有向Max Pain靠攏的傾向——尤其是結算週。<br>
查詢方式：各大財經網站的「選擇權PUT/CALL比率」和「最大痛點工具」。
</div>
<div class="formula">PUT/CALL比率（P/C Ratio）判讀：
P/C比 &gt; 1.2：市場偏向買保護（看跌），可能已過度悲觀 → 反彈機會
P/C比 &lt; 0.8：市場樂觀，買Call多 → 可能過熱，注意回調
P/C比在 0.9–1.1：中性，方向不明</div>
<h3>台股大盤與外資期貨部位的歷史關聯</h3>
<ul>
<li>2020年3月疫情崩盤：外資期貨淨口數 -50,000口創新低，指數跌至8,500</li>
<li>2021年牛市：外資淨多單維持在 +20,000–+40,000口，指數衝破18,000</li>
<li>2022年熊市：外資連續翻空，淨口數長期為負，指數跌回12,600</li>
<li>2024年多頭：外資淨多單飆升至+60,000口以上，配合AI概念股帶動</li>
</ul>
<div class="warn"><b>⚠️ 籌碼分析的限制</b>
1. 法人數據是「昨日收盤後公布」，存在一天的時間差。
2. 外資也會「對沖」——期貨空單不代表看跌，可能只是在對沖其持有的台股現貨。
3. 籌碼是輔助工具，不是唯一依據，要與技術面、基本面綜合判斷。</div>`,
pts:['外資台指期淨口數是最重要的籌碼指標——淨多偏多，淨空偏空','關注的是趨勢方向變化，而非單日絕對數字','TAIFEX官網每日15:30公布三大法人期貨部位','選擇權Max Pain和P/C比率是進階的市場情緒參考工具']},

body:`<h3>為什麼資金控管比選股更重要？</h3>
<p>假設你有一個勝率60%、賺/賠比2:1的策略（理論上絕對長期獲利），但如果每次押注帳戶的50%，連續3次虧損就會讓帳戶剩下12.5%，<strong>幾乎無法翻身</strong>。資金控管決定你能否活到趨勢來臨的那一刻。</p>
<h3>核心原則一：單筆虧損不超過帳戶的2%</h3>
<div class="formula">2% 法則：
帳戶100萬元 → 單筆最大虧損 = 20,000元
帳戶50萬元 → 單筆最大虧損 = 10,000元
帳戶20萬元 → 單筆最大虧損 = 4,000元

套用到大台（點值200元）：
最大虧損20,000元 / 200元 = 最多能虧100點
→ 停損點位就在進場點往反方向100點處

如果停損超過100點，那就用小台（50元/點）：
最大虧損20,000元 / 50元 = 最多能虧400點</div>
<h3>核心原則二：最大同時持倉不超過帳戶30%</h3>
<div class="kp-box">
帳戶100萬 → 同時動用保證金上限30萬元<br>
大台保證金18.4萬/口 → 最多同時持1口大台<br>
小台保證金4.6萬/口 → 最多同時持6口小台<br><br>
<b>為什麼要留70%現金？</b><br>
1. 應對追繳：虧損時不至於被強制平倉<br>
2. 加倉機會：趨勢確認後有籌碼可以加倉<br>
3. 心理穩定：持倉輕，心態才能冷靜執行停損
</div>
<h3>凱利公式——最優倉位計算</h3>
<div class="formula">凱利公式（Kelly Criterion）：
最優投注比例 = W - (1-W)/R

W = 勝率（win rate）
R = 盈虧比（平均獲利 / 平均虧損）

範例：勝率55%，平均獲利300點，平均虧損150點
R = 300 / 150 = 2
最優比例 = 0.55 - (0.45/2) = 0.55 - 0.225 = 32.5%

→ 理論上投入帳戶32.5%的資金最佳
→ 實務上建議用「半凱利」= 16.25%，更保守</div>
<div class="eg"><b>半凱利實際應用</b><br>
帳戶100萬 × 16.25% = 162,500元可用保證金<br>
大台保證金18.4萬 → 剛好可持1口大台<br>
若勝率低至50%：凱利 = 0.5 - 0.5/2 = 0.25（25%）半凱利12.5% → 仍可以持1口大台</div>
<h3>交易心理：五大常見錯誤</h3>
<table class="cmp-table">
<tr><th>心理陷阱</th><th>表現</th><th>破解方法</th></tr>
<tr><td>損失規避</td><td>虧損單不停損，等待解套</td><td>事前設好停損，執行時不思考</td></tr>
<tr><td>過度自信</td><td>連勝後加大倉位</td><td>凱利公式規範每次倉位</td></tr>
<tr><td>追漲殺跌</td><td>看到漲才買，看到跌才賣</td><td>設好進場條件，不看情緒下單</td></tr>
<tr><td>報復性交易</td><td>虧損後急著加倉扳回</td><td>達到每日虧損上限立即停止</td></tr>
<tr><td>確認偏誤</td><td>只看支持自己觀點的資訊</td><td>主動找反向論據再做決定</td></tr>
</table>
<h3>建立「交易計畫」的5個要素</h3>
<div class="kp-box">
每次交易前必須回答這五個問題：<br>
1. <b>進場理由</b>：為什麼在這個點位進場？（技術面+籌碼面支撐）<br>
2. <b>停損點</b>：在哪裡停損？最多虧多少錢？<br>
3. <b>目標點</b>：目標在哪裡？風險報酬比是多少？<br>
4. <b>部位大小</b>：根據停損計算要做幾口？<br>
5. <b>出場條件</b>：除了停損/停利，什麼情況下會提前出場？
</div>
<h3>每日交易紀律</h3>
<div class="formula">建議每日規則（防止爆倉的系統性方法）：
每日虧損上限 = 帳戶的 5%（100萬帳戶 = 5萬/天）
每日勝利目標 = 帳戶的 3%（100萬帳戶 = 3萬/天）
連虧3天 → 停止交易2天，重新檢視策略
連勝5天 → 可考慮小幅提升倉位（不超過50%增加）</div>
<div class="warn"><b>⚠️ 交易是機率遊戲</b>
即使有60%勝率，連輸5次的概率 = 0.4^5 = 1.02% — 並不罕見。
如果每次投入50%資金，連輸5次後帳戶剩下3.1%，幾乎爆倉。
如果每次投入2%，連輸5次後帳戶剩下90%，還能繼續交易。
<strong>存活才能等到趨勢。倉位控制的核心目的是讓你撐過不利期。</strong></div>`,
pts:['2%法則：單筆最大虧損不超過帳戶2%，保持長期生存','凱利公式計算最優倉位，實務用半凱利更保守','最常見5個心理陷阱：損失規避、過度自信、追漲殺跌、報復交易、確認偏誤','每次交易前寫下交易計畫（進場理由/停損/目標/倉位/出場條件）']}
];

// ──────────────── JS ENGINE ────────────────
const DONE = JSON.parse(localStorage.getItem('fc-done') || '[]');

function buildSidebar(){
  const el = document.getElementById('chList');
  let html = '';
  CHAPTERS.forEach(ch => {
    html += `<div class="ch-label">${ch.label}</div>`;
    ch.ids.forEach(i => {
      const L = LESSONS[i];
      const isDone = DONE.includes(i);
      html += `<div class="ls-item${isDone?' done':''}" id="li${i}" onclick="go(${i})">
        <div class="ls-num">${isDone?'✓':L.num}</div>
        <span>${L.title}</span>
        ${isDone?'<span class="ls-check">✓</span>':''}
      </div>`;
    });
  });
  el.innerHTML = html;
}

function updateProgress(){
  const total = LESSONS.length;
  const done = DONE.length;
  const pct = Math.round(done/total*100);
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pText').textContent = `${done} / ${total} 堂課完成`;
}

let CUR = 0;

function go(i){
  CUR = i;
  const L = LESSONS[i];
  // highlight sidebar
  document.querySelectorAll('.ls-item').forEach(el => el.classList.remove('active'));
  const liEl = document.getElementById('li'+i);
  if(liEl){ liEl.classList.add('active'); liEl.scrollIntoView({block:'nearest'}); }

  const chLabel = CHAPTERS.find(c=>c.ids.includes(i))?.label || '';
  const isDone = DONE.includes(i);
  const isFirst = i === 0;
  const isLast = i === LESSONS.length - 1;

  // Find prev/next
  let prev = -1, next = -1;
  CHAPTERS.forEach(ch => {
    ch.ids.forEach((id,idx) => {
      if(id===i){
        if(idx>0) prev = ch.ids[idx-1];
        else { const ci = CHAPTERS.indexOf(ch); if(ci>0) prev = CHAPTERS[ci-1].ids.at(-1); }
        if(idx<ch.ids.length-1) next = ch.ids[idx+1];
        else { const ci = CHAPTERS.indexOf(ch); if(ci<CHAPTERS.length-1) next = CHAPTERS[ci+1].ids[0]; }
      }
    });
  });

  document.getElementById('lw').innerHTML = `
    <div class="breadcrumb">
      <span onclick="location.href='index.html'">股學筆記</span>
      <span class="bc-sep">›</span>
      <span>${chLabel}</span>
      <span class="bc-sep">›</span>
      <span class="bc-cur">${L.title}</span>
    </div>
    <div class="lesson-header">
      <div class="ch-badge">${L.ch} · 第 ${L.num} 課</div>
      <div class="ls-title">${L.title}</div>
      <div class="ls-sub">${L.sub}</div>
      <div class="ls-meta-row">
        <span>📖 閱讀時間：${L.rt}</span>
        ${isDone?'<span class="done-tag">✓ 已完成</span>':''}
      </div>
    </div>
    <div class="diag">
      ${L.svg}
      <div class="diag-cap">${L.cap}</div>
    </div>
    <div class="body-card">${L.body}</div>
    <div class="kp-box">
      <h4>📌 本課重點整理</h4>
      <ul>${L.pts.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="ls-footer">
      <button class="btn btn-ghost${prev<0?' btn-dim':''}" onclick="go(${prev})">← 上一課</button>
      <button class="btn ${isDone?'btn-undone':'btn-done'}" onclick="toggleDone(${i})">
        ${isDone?'取消完成':'✓ 標記完成'}
      </button>
      <button class="btn btn-primary${next<0?' btn-dim':''}" onclick="go(${next})">下一課 →</button>
    </div>
  `;
  window.scrollTo(0,0);
  document.getElementById('lw').scrollIntoView({behavior:'smooth'});
  closeSB();
}

function toggleDone(i){
  const idx = DONE.indexOf(i);
  if(idx>=0) DONE.splice(idx,1); else DONE.push(i);
  localStorage.setItem('fc-done', JSON.stringify(DONE));
  buildSidebar();
  updateProgress();
  go(i);
}

function openSB(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeSB(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
function toggleSidebar(){ document.getElementById('sidebar').classList.contains('open')?closeSB():openSB(); }

// Init
buildSidebar();
updateProgress();
// load from URL hash or start at 0
const hash = parseInt(location.hash.replace('#','')||'0');
go(isNaN(hash)?0:Math.min(hash,LESSONS.length-1));
</script>
