<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>進階交易技巧 — 股學筆記</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--card:#21262d;--border:#30363d;--border2:#21262d;--text:#e6edf3;--text2:#c9d1d9;--text3:#8b949e;--text4:#484f58;--gold:#f59e0b;--gold2:#fbbf24;--red:#f85149;--blue:#58a6ff;--purple:#a78bfa;--green:#3fb950}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","PingFang TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.75}
a{color:inherit;text-decoration:none}

.topnav{background:var(--bg2);border-bottom:1px solid var(--border2);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.back-btn{color:var(--text3);font-size:.82rem;display:flex;align-items:center;gap:4px;transition:color .15s}
.back-btn:hover{color:var(--text)}
.nav-title{font-size:.95rem;font-weight:700;color:var(--text)}

.hero{background:linear-gradient(135deg,rgba(248,81,73,.05) 0%,rgba(167,139,250,.04) 50%,transparent 100%);border-bottom:1px solid var(--border2);padding:40px 24px 28px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);color:var(--red);font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:14px}
.hero h1{font-size:1.75rem;font-weight:800;color:var(--text);margin-bottom:8px}
.hero p{color:var(--text3);font-size:.9rem;max-width:580px;margin:0 auto 6px;line-height:1.7}
.hero-warn{color:var(--text4);font-size:.78rem;margin-top:12px}

.filter-bar{display:flex;gap:8px;justify-content:center;padding:20px 24px 0;flex-wrap:wrap}
.flt-btn{background:var(--card);border:1px solid var(--border);color:var(--text3);padding:7px 16px;border-radius:20px;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.flt-btn:hover{border-color:var(--gold);color:var(--gold2)}
.flt-btn.active{background:rgba(248,81,73,.1);border-color:rgba(248,81,73,.35);color:var(--red);font-weight:600}

.container{max-width:900px;margin:0 auto;padding:28px 20px 100px}
.count-label{color:var(--text4);font-size:.78rem;margin-bottom:18px}

.tc{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;overflow:hidden;transition:border-color .2s}
.tc:hover{border-color:rgba(248,81,73,.4)}
.tc.hidden{display:none}
.tc-head{padding:22px 24px 0;display:flex;align-items:flex-start;gap:14px;cursor:pointer;user-select:none}
.tc-num{width:36px;height:36px;border-radius:10px;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:var(--red);flex-shrink:0;margin-top:2px}
.tc-meta{flex:1}
.tc-badges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.badge{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:12px;letter-spacing:.04em;text-transform:uppercase}
.badge-vol{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.25)}
.badge-chip{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.badge-timing{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.25)}
.badge-cross{background:rgba(245,158,11,.12);color:var(--gold2);border:1px solid rgba(245,158,11,.25)}
.badge-psych{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.25)}
.tc-name{font-size:1.05rem;font-weight:800;color:var(--text);margin-bottom:3px}
.tc-en{color:var(--text3);font-size:.78rem}
.tc-toggle{color:var(--text4);font-size:.9rem;flex-shrink:0;transition:transform .2s;margin-top:2px}
.tc.open .tc-toggle{transform:rotate(180deg)}
.tc-short{color:var(--text2);font-size:.88rem;line-height:1.7;padding:10px 24px 16px 74px}

.tc-body{padding:0 24px 24px;border-top:1px solid var(--border2);margin-top:16px;display:none}
.tc.open .tc-body{display:block}

.tc-body h3{font-size:.88rem;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px}
.tc-body h3:first-child{margin-top:0}
.tc-body p{color:var(--text2);font-size:.88rem;line-height:1.75;margin-bottom:8px}
.tc-body ul,.tc-body ol{padding-left:18px;margin-bottom:10px}
.tc-body li{color:var(--text2);font-size:.87rem;line-height:1.7;margin-bottom:5px}
.tc-body li strong,.tc-body p strong{color:var(--text)}

.signal-box{background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.2);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0;font-size:.86rem;line-height:1.7;color:#fca5a5}
.signal-box strong{color:#fff}
.gold-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0;font-size:.86rem;line-height:1.7;color:var(--gold2)}
.blue-box{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0;font-size:.86rem;line-height:1.7;color:#93c5fd}
.purple-box{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);border-left:3px solid var(--purple);border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0;font-size:.86rem;line-height:1.7;color:#c4b5fd}
.formula{background:var(--bg);color:var(--text);padding:12px 16px;border-radius:6px;margin:10px 0;font-size:.83rem;line-height:1.8;white-space:pre-wrap;font-family:"Consolas","Courier New",monospace;border:1px solid var(--border)}

.exp-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.exp-dot{width:6px;height:6px;border-radius:50%;background:var(--red);margin-top:8px;flex-shrink:0}
.exp-text{font-size:.86rem;color:var(--text2);line-height:1.7;flex:1}

table.tip-tbl{width:100%;border-collapse:collapse;margin:12px 0;font-size:.84rem}
table.tip-tbl th{background:var(--bg);color:var(--text3);padding:8px 12px;text-align:left;font-size:.78rem;font-weight:700;border-bottom:2px solid var(--border)}
table.tip-tbl td{padding:8px 12px;border-bottom:1px solid var(--border2);color:var(--text2);vertical-align:top;line-height:1.55}
table.tip-tbl tr:hover td{background:rgba(255,255,255,.02)}

.footer{background:var(--bg2);border-top:1px solid var(--border2);padding:40px 24px;text-align:center}
.footer p{color:var(--text4);font-size:.8rem;line-height:1.8}

@media(max-width:640px){
  .hero{padding:24px 14px 20px}
  .hero h1{font-size:1.3rem}
  .container{padding:20px 12px 80px}
  .tc-head{padding:16px 16px 0}
  .tc-short{padding:10px 16px 14px 16px}
  .tc-body{padding:0 16px 18px}
  .filter-bar{padding:14px 14px 0;overflow-x:auto;flex-wrap:nowrap;justify-content:flex-start;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
}
</style>
</head>

<div class="hero">
  <div class="hero-badge">資深分析師經驗談</div>
  <h1>進階交易技巧與訊號觀察</h1>
  <p>這裡記錄的不是教科書上的理論，而是在市場真實打滾多年才看得懂的訊號與規律——量能的語言、籌碼的暗語、時間的週期。</p>
  <p class="hero-warn">以下內容僅供教育參考，不構成投資建議。</p>
</div>

<div class="filter-bar" id="filterBar">
  <button class="flt-btn active" onclick="filterTips('all',this)">全部</button>
  <button class="flt-btn" onclick="filterTips('vol',this)">量能解讀</button>
  <button class="flt-btn" onclick="filterTips('chip',this)">籌碼暗語</button>
  <button class="flt-btn" onclick="filterTips('timing',this)">時間規律</button>
  <button class="flt-btn" onclick="filterTips('cross',this)">跨市訊號</button>
  <button class="flt-btn" onclick="filterTips('psych',this)">市場心理</button>
</div>

<div class="container">
  <div class="count-label" id="countLabel"></div>
  <div id="tipList"></div>
</div>

<div class="footer">
  <p>股學筆記 — 進階技巧庫｜以下觀點來自市場長期觀察，不代表任何投資建議</p>
</div>

<script>
const TIPS = [
/* ── 量能解讀 ─────────────────────────────────────────────────── */
{
  id:'vol-1', cat:'vol', num:'V01',
  name:'收盤前最後10分鐘的量能',
  en:'Last 10-Min Volume Tells Everything',
  short:'一天的成交量分布裡，最後10分鐘是機構法人的「真實意圖」——散戶不知道怎麼看這段量能，但老手一眼就能判斷隔日走勢',
  body:`
<h3>為什麼最後10分鐘最重要</h3>
<p>台股13:20–13:30是收盤前最後10分鐘，這段時間的成交量佔全日比重通常是最後的「定盤」時刻。機構尾盤的行為洩露了它們真實的部位意圖，而非日內的假動作。</p>
<div class="signal-box"><strong>訊號一：尾盤急拉放量</strong><br>
股價在13:20後突然拉高且成交量明顯放大（超過前一小時均量），若最後收盤價仍接近日高，代表機構「刻意拉尾盤」——目的通常是：①隔日出貨的拉高成本；②讓帳面淨值好看（月底/季底常見）。<br>
<strong>操作判斷：</strong>這種尾盤急拉，隔日開盤高開後往往壓回，是短線獲利了結的良好時機。</div>
<div class="signal-box"><strong>訊號二：尾盤大量賣壓打壓</strong><br>
13:20後大量賣單湧現，股價被壓在低點收盤。這代表機構在出貨且不在乎當日股價，通常隔日繼續下跌。<br>
<strong>判斷技巧：</strong>若前四個半小時成交清淡，偏偏尾盤突然出現全日30%以上的成交量且股價走弱，幾乎是主力出貨的教科書訊號。</div>
<div class="gold-box"><strong>最重要的一條：收盤量 vs 中午量</strong><br>
台股午盤（12:00-13:00）量通常最少。若下午量能明顯大於上午，代表機構在下午有特定行動，方向（量增+上漲=積極進場；量增+下跌=積極出貨）決定隔日走向的可信度超過80%。</div>
<h3>實戰對照</h3>
<table class="tip-tbl">
<tr><th>現象</th><th>隔日機率</th><th>操作方向</th></tr>
<tr><td>尾盤量增+股價收日高</td><td>上漲機率70%+</td><td>當日收盤或次日早盤買</td></tr>
<tr><td>尾盤量增+股價壓低收</td><td>下跌機率65%+</td><td>當日收盤或次日開盤出</td></tr>
<tr><td>尾盤量縮，股價小幅漲</td><td>次日平盤震盪</td><td>觀望</td></tr>
<tr><td>全日量均衡，尾盤無異常</td><td>依趨勢延伸</td><td>順趨勢</td></tr>
</table>
`
},
{
  id:'vol-2', cat:'vol', num:'V02',
  name:'「地量」不代表落底——真正的量能訊號',
  en:'Ultra-Low Volume ≠ Bottom Signal',
  short:'「量縮代表賣壓消失，準備落底」是最常被過度簡化的說法。地量有時是落底前兆，但更多時候是趨勢中繼——如何分辨？',
  body:`
<h3>地量的兩種本質完全不同</h3>
<div class="blue-box"><strong>地量 + 股價不再破新低 = 真底部訊號</strong><br>
當成交量萎縮到極低水平（近60日量的30%以下），同時股價即使在利空消息下也無法破前低，代表「賣方彈盡糧絕」。這是真正的底部特徵：沒人想賣了。</div>
<div class="signal-box"><strong>地量 + 股價仍緩慢下跌 = 趨勢中繼，不是底部</strong><br>
量縮但股價仍在創低，代表只是「賣盤暫時減少」，市場沉默不等於企穩。真正危險的是：地量陰跌，看起來很「穩」，一旦利空引發補跌，跌幅往往更急更深（因流動性差，砸盤衝擊力大）。</div>
<h3>區分方法：看「拒跌強度」</h3>
<p>真底部的地量，通常會伴隨：</p>
<ul>
  <li>利空消息出現，但股價只是小跌或不跌（拒跌）</li>
  <li>下影線開始變長（有買盤在低點承接）</li>
  <li>週K線開始出現縮量但週K實體縮小（跌速減緩）</li>
</ul>
<div class="formula">底部地量辨別公式：
真底部條件（需同時滿足）：
① 日量 < 近60日均量 × 30%（真地量）
② 本週收盤價 > 上週收盤價（止跌）
③ 下影線 / 實體比 > 1.5（低檔有人承接）
④ 利空不跌（最強確認）</div>
`
},
{
  id:'vol-3', cat:'vol', num:'V03',
  name:'開盤前15分鐘的成交量濃縮效應',
  en:'Opening 15-Minute Volume Spike Decoding',
  short:'台股9:00-9:15的成交量往往佔全日10–20%，但大多數散戶只盯股價不看量，錯過了開盤量能裡最重要的方向訊號',
  body:`
<h3>開盤的本質：機構昨夜想好了動作</h3>
<p>美股收盤後到台股開盤前有超過6小時，機構在這段時間已完成分析和決策。台股開盤的第一筆大單，通常就是外資或主力「執行昨夜計劃」的體現。</p>
<div class="gold-box"><strong>開盤跳空 + 首15分鐘放量 = 方向確認</strong><br>
若開盤跳空高開且15分鐘內成交量已達近期均量的50%以上，代表有機構積極追漲進場，不是散戶跟風——這種開盤通常能維持方向到收盤（延續機率超過70%）。</div>
<div class="signal-box"><strong>最危險的型態：跳空高開 + 量縮</strong><br>
開盤跳高但成交量異常清淡，代表「無人追買」，只是上一日收盤後零星委託推高開盤，沒有機構支撐。這種高開通常在10:00前就回補缺口，俗稱「開高走低」陷阱。</div>
<h3>開盤量的實戰判斷</h3>
<table class="tip-tbl">
<tr><th>開盤形態</th><th>15分鐘量能</th><th>後市傾向</th></tr>
<tr><td>跳空高開</td><td>爆量（均量50%+）</td><td>延續上漲，可追</td></tr>
<tr><td>跳空高開</td><td>縮量（均量20%以下）</td><td>回補缺口，勿追</td></tr>
<tr><td>跳空低開</td><td>爆量（恐慌性賣壓）</td><td>底部反轉機會高</td></tr>
<tr><td>跳空低開</td><td>縮量</td><td>繼續陰跌，觀望</td></tr>
<tr><td>平盤開</td><td>量增</td><td>看方向，盤中確認</td></tr>
</table>
`
},

/* ── 籌碼暗語 ─────────────────────────────────────────────────── */
{
  id:'chip-1', cat:'chip', num:'C01',
  name:'外資買超連續日數比金額更重要',
  en:'Consecutive Buy Days > Buy Amount',
  short:'外資單日買超100億不一定有意義，但連續20日小額買超2–5億，幾乎是主動建倉的鐵証——這條規律在台積電身上驗證過無數次',
  body:`
<h3>機構建倉的真實行為模式</h3>
<p>外資不會在一天內砸入上百億建立大部位（會推高自己的成本），而是「蠶食型建倉」——每天低調買進2–5億，持續幾週。這樣的建倉模式，在日報表上看起來不起眼，但累積起來是巨量的部位變化。</p>
<div class="gold-box"><strong>連續買超日數訊號強度：</strong><br>
5日：留意<br>
10日：值得追蹤<br>
15日以上：幾乎確定在主動建倉<br>
20日以上 + 股價橫盤：即將啟動的最佳前兆</div>
<div class="blue-box"><strong>為什麼橫盤期間的連續買超最有價值？</strong><br>
若外資連續買超但股價不漲，代表有另一個賣壓在吸收——這通常是「散戶、散戶型法人在出貨」，外資在「接貨」。一旦賣壓耗盡，股價會像彈簧一樣急彈，因為籌碼已經轉移到外資這種「不輕易賣」的長線持有者手中。</div>
<h3>反向訊號同樣重要</h3>
<div class="signal-box"><strong>連續賣超 + 股價不跌 = 有人在接</strong><br>
外資連續賣超10日以上，但股價不跌甚至小漲，代表有更強的買盤（國安基金？主力？）在吸收賣壓。一旦外資賣超結束，股價反應往往驚人。2023年8月台積電就出現這種型態，之後漲了40%。</div>
`
},
{
  id:'chip-2', cat:'chip', num:'C02',
  name:'融資增加≠看多信號——散戶籌碼的反向指標',
  en:'Rising Margin Debt as Contrarian Signal',
  short:'教科書說「融資代表看多」，但老手知道：融資大幅增加往往是賣出的訊號，而不是買進的確認',
  body:`
<h3>融資的真相</h3>
<p>融資使用者主要是散戶和小型投機客。他們的集體行為有一個規律：在股價剛開始上漲時不敢買，等到漲了一段後才開始「有信心」用融資追買——也就是說，融資通常在相對高點集中增加。</p>
<div class="signal-box"><strong>危險警訊：股價創新高 + 融資也創新高</strong><br>
這代表追高的散戶資金把市場撐在高位。一旦股價開始下跌，融資戶被迫補繳保證金或停損，會形成「融資斷頭→股價下跌→更多融資斷頭」的惡性循環，跌幅往往遠超預期。</div>
<div class="gold-box"><strong>反向操作的黃金規律</strong><br>
股價下跌 + 融資持續增加（散戶在攤平） = 最危險的型態<br>
股價下跌 + 融資持續減少（洗籌碼） = 底部接近的訊號<br>
融資大幅減少（斷頭潮） + 股價不再破低 = 最佳買入時機</div>
<div class="formula">融資使用率警戒水位：
融資使用率 = 融資餘額 / 融資限額

> 80%：市場過熱，非常危險
60–80%：偏高，謹慎
40–60%：正常
< 30%：保守，底部特徵之一</div>
<h3>2022年的教訓</h3>

<p>融券是借股票放空的操作。高融券代表很多人看空，但這批人的股票「最終一定要買回來」（回補）。在特定條件下，這些空頭被迫回補的力量，會成為推動股價上漲的「額外燃料」——這就是所謂的「軋空行情」。</p>

④ 有明確催化劑（財報、法說、題材）<br>

5–15%：正常區間

<h3>五大系統性行為偏誤</h3>
<div class="signal-box"><strong>①損失趨避偏誤（Loss Aversion）</strong><br>
人類感受損失的痛苦是同等獲利的2倍。結果：小賺就跑（怕賺了又跌回去），大虧不停損（不賣就不算虧）。<br>
解方：用報酬率而非金額思考，賺10%和虧10%的「權重」應該對等。</div>
<div class="signal-box"><strong>②確認偏誤（Confirmation Bias）</strong><br>
買了某支股票後，只看支持持股的資訊，忽略反面證據。結果：即使基本面已惡化，也繼續持有等「反轉」。<br>
解方：買進時寫下「賣出條件」，只要條件觸發無論如何執行。</div>
<div class="gold-box"><strong>③近期偏誤（Recency Bias）</strong><br>
過度重視最近的市場走勢。大漲後認為「還會繼續漲」，大跌後認為「還會繼續跌」。<br>
這是散戶「高買低賣」的根本原因——在牛市高點最樂觀、在熊市低點最悲觀。<br>
解方：在大漲後問自己「如果我沒有這支股票，現在的價格我還會買嗎？」</div>
<div class="purple-box"><strong>④過度交易（Overtrading）</strong><br>
研究顯示，交易頻率越高的散戶，長期報酬越差。每一筆交易都有交易成本（手續費、價差）和機會成本。<br>
解方：強迫自己每筆交易前寫下「我的進場理由」和「預期持有時間」，沒有清晰理由不交易。</div>
<div class="purple-box"><strong>⑤集體思維（Herding）</strong><br>
當周遭所有人都在買某支股票時，大腦會告訴你「他們一定知道一些你不知道的」。這驅動追高。<br>
解方：最好的買點通常在別人都不感興趣的時候。「冷清=危險」的感受，往往是相反的。</div>
`

let currentCat = 'all';

function filterTips(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('tipList');
  const filtered = currentCat === 'all' ? TIPS : TIPS.filter(t => t.cat === currentCat);
  document.getElementById('countLabel').textContent = `共 ${filtered.length} 則技巧`;
  list.innerHTML = filtered.map(t => `
<div class="tc" id="tc-${t.id}" data-cat="${t.cat}">
  <div class="tc-head" onclick="toggleTip('${t.id}')">
    <div class="tc-num">${t.num}</div>
    <div class="tc-meta">
      <div class="tc-badges">${badgeHTML(t.cat)}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-en">${t.en}</div>
    </div>
    <div class="tc-toggle">▾</div>
  </div>
  <div class="tc-short">${t.short}</div>
  <div class="tc-body">${t.body}</div>
</div>`).join('');
}

function badgeHTML(cat) {
  const map = {
    vol:  '<span class="badge badge-vol">量能解讀</span>',
    chip: '<span class="badge badge-chip">籌碼暗語</span>',
    timing: '<span class="badge badge-timing">時間規律</span>',
    cross: '<span class="badge badge-cross">跨市訊號</span>',
    psych: '<span class="badge badge-psych">市場心理</span>'
  };
  return map[cat] || '';
}

function toggleTip(id) {
  const el = document.getElementById('tc-' + id);
  el.classList.toggle('open');
}

renderList();
