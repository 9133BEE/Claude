a{color:inherit;text-decoration:none}
/* Sidebar */
.sidebar{width:272px;min-height:100vh;background:#0d1117;color:#e6edf3;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform .25s;border-right:1px solid #21262d}

.sb-sub{font-size:11px;color:#484f58;margin-top:2px}
.sb-close{display:none;background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;margin-left:auto}
.progress-wrap{padding:12px 16px;border-bottom:1px solid #21262d}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#484f58;margin-bottom:6px}
.progress-bar{height:4px;background:#21262d;border-radius:2px}
.progress-fill{height:4px;background:#f59e0b;border-radius:2px;transition:width .4s}
#chList{flex:1;overflow-y:auto;padding:8px 0}
.ch-label{font-size:10px;font-weight:700;color:#30363d;letter-spacing:.08em;text-transform:uppercase;padding:10px 16px 4px}
.ls-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.ls-item:hover{background:rgba(255,255,255,.04)}
.ls-item.active{background:rgba(245,158,11,.1);border-left-color:#d97706}
.ls-item.done{opacity:.65}
.ls-item.done .ls-num{background:#d97706;color:#fff}
.ls-num{width:28px;height:28px;border-radius:6px;background:#21262d;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#484f58;flex-shrink:0}
.ls-item span{font-size:12px;color:#8b949e;flex:1;line-height:1.35}
.ls-item.active span{color:#fbbf24}
.ls-check{color:#fbbf24;font-size:12px}
.sb-footer{padding:14px 16px;border-top:1px solid #21262d;display:flex;flex-direction:column;gap:6px}
.sb-footer a{font-size:11px;color:#484f58;padding:4px 0;transition:color .15s}
.sb-footer a:hover{color:#8b949e}
/* Main */
.main{margin-left:272px;flex:1;display:flex;flex-direction:column;min-height:100vh;background:#161b22}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 24px;background:#0d1117;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:50}
.menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:#8b949e}
.topbar-title{font-size:14px;font-weight:600;color:#e6edf3;flex:1}
.topbar-home{font-size:12px;color:#fbbf24;font-weight:600;padding:5px 12px;border:1px solid #d97706;border-radius:6px;background:rgba(217,119,6,.1);transition:all .15s}
.topbar-home:hover{background:rgba(217,119,6,.2)}
#lw{padding:28px 32px;max-width:860px}
/* Lesson card */
.lc{background:#21262d;border-radius:12px;overflow:hidden;margin-bottom:24px;border:1px solid #30363d}
.lc-cap{background:#f6f8fa;padding:0;overflow:hidden;border-bottom:1px solid #d0d7de}
.lc-cap img,.lc-cap svg{width:100%;display:block}
.lc-body{padding:28px 32px}
.lc-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.lc-ch{font-size:11px;color:#fbbf24;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.lc-rt{font-size:11px;color:#484f58}

.lc-content p{margin-bottom:10px}
.lc-content ul,.lc-content ol{padding-left:20px;margin-bottom:10px}
.lc-content li{margin-bottom:5px}
.lc-content strong{color:#e6edf3}

.kp-wrap h4{font-size:12px;font-weight:700;color:#484f58;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.kp-list{display:flex;flex-direction:column;gap:8px}
.kp-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#c9d1d9;line-height:1.5}
.kp-dot{width:6px;height:6px;border-radius:50%;background:#d97706;margin-top:6px;flex-shrink:0}
/* Nav */
.lc-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;border-top:1px solid #21262d;background:#21262d}
.nav-btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #30363d;background:transparent;color:#c9d1d9;transition:all .15s}
.nav-btn:hover{background:#30363d;border-color:#484f58}
.nav-btn.primary{background:#d97706;color:#fff;border-color:#d97706}
.nav-btn.primary:hover{background:#b45309}
.done-btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #d97706;color:#fbbf24;background:transparent;transition:all .15s}
.done-btn.marked{background:#d97706;color:#fff}
.overlay{display:none;position:fixed;inset:0;background:rgba(1,4,9,.7);z-index:90}
.fab-toc{display:none;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#d97706;color:#fff;border:none;border-radius:50px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;z-index:200;box-shadow:0 4px 20px rgba(217,119,6,.4);align-items:center;gap:8px;white-space:nowrap;letter-spacing:.02em}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sb-close{display:block}
  .overlay.show{display:block}
  .main{margin-left:0}
  .menu-btn{display:block}
  #lw{padding:16px 14px 90px}
  .lc-body{padding:18px 16px}
  .lc-nav{padding:12px 16px}
  .fab-toc{display:flex}

body:`<h3>S&P 500 是什麼？</h3>
<p>標準普爾500指數（S&P 500）收錄美國市值最大的500家企業，是全球最受關注的股票指數。它是美國股市「整體表現」的最佳代表，也是大多數基金經理人用來對標（benchmark）的基準。</p>
<div class="hl"><b>科技股主導 S&P 500</b><br>
前 10 大成分股（蘋果、微軟、英偉達、亞馬遜、谷歌A/C、Meta、波克夏、Tesla、Broadcom）佔整個指數超過 35% 的權重。這意味著買 SPY（S&P 500 ETF）幾乎等同於大量持有美國科技股。</div>
<h3>投資 S&P 500 的最簡單方式</h3>
<table class="cmp-table">
<tr><th>ETF</th><th>追蹤指數</th><th>費用率</th><th>台灣複委託</th></tr>
<tr><td>SPY</td><td>S&amp;P 500</td><td>0.0945%</td><td>可買</td></tr>
<tr><td>VOO</td><td>S&amp;P 500</td><td>0.03%</td><td>可買</td></tr>
<tr><td>IVV</td><td>S&amp;P 500</td><td>0.03%</td><td>可買</td></tr>
<tr><td>QQQ</td><td>NASDAQ 100</td><td>0.20%</td><td>可買</td></tr>
</table>
<div class="eg"><b>長期績效</b>S&P 500 過去30年平均年化報酬約 10.5%（含股息再投資）。以每月定投 $500 計算，30年後總資產可超過 $100 萬美元。這是巴菲特推薦一般人最好的投資方式。</div>`,

body:`<h3>Magnificent 7 為什麼重要？</h3>
<p>這七家公司合計市值超過 14 兆美元，佔 S&P 500 整個指數約 30%。也就是說，買 SPY 的人，有近三成的資金是壓在這七家公司上。</p>
<div class="hl"><b>七巨頭 vs S&P 500 其他493家</b><br>
2023年，Magnificent 7平均漲幅超過100%，而其餘493支股票的平均漲幅只有12%。這說明美股牛市其實是一場「頭部集中的行情」，理解七巨頭的動向，幾乎等於看懂整個美股。</div>
<h3>台積電（TSMC）與七巨頭的關係</h3>
<div class="eg"><b>台積電是七巨頭的晶圓代工廠</b>蘋果（A18芯片）、英偉達（H100/H200 GPU）、AMD、Broadcom 的核心芯片都在台積電生產。七巨頭的資本支出（CapEx）越多，台積電的訂單越飽和。這是台積電與台股的最重要風向球。</div>
<div class="warn"><b>集中度風險</b>七巨頭股票高度相關，AI題材同漲同跌。若科技股估值泡沫化，S&P 500 整體也會大跌。分散投資應考慮加入價值型、能源、醫療等低相關板塊。</div>`,

body:`<h3>財報三大關鍵數字</h3>
<div class="hl"><b>1. EPS（每股盈餘）vs 預期</b><br>
市場提前預估EPS（分析師共識預期）。實際EPS「超預期」叫 Beat，「低於預期」叫 Miss。Beat才能推動股價上漲，但有時即使Beat，若Guidance（下季展望）保守，股價仍可能下跌。</div>
<div class="hl"><b>2. Revenue（營收）</b><br>
EPS可以靠控制成本提升，但Revenue的成長才代表公司真正在擴張。雲端公司（AWS、Azure、GCP）的「營收成長率年增率加速」是最重要的先行指標。</div>
<div class="hl"><b>3. Guidance（前瞻指引）</b><br>
公司對下一季或全年的預期。這是財報中「最決定股價走向」的部分。若EPS超預期但Guidance保守，股價往往大跌（稱為「Buy the rumor, sell the news」）。</div>
<h3>財報解讀實例：NVDA 2024 Q1</h3>
<div class="eg"><b>英偉達 2024 年 Q1 財報（台灣時間 5月23日凌晨）</b><br>
• 實際EPS：$6.12 vs 預期 $5.59（Beat +9.5%）<br>
• 營收：$260億 vs 預期 $246億（Beat +5.7%）<br>
• Guidance 下季：$280億 ± 2%（遠超分析師預期的 $268億）<br>
結果：台灣時間隔日股價跳空高開 9%，因為Guidance大幅超預期。</div>`,
pts:['財報EPS和Revenue都需超預期才能推動股價','Guidance（前瞻指引）往往比當季財報更重要','財報季四次：4/7/10/1月，科技股最受矚目','「Buy rumor, sell news」— 財報前買、財報後賣的陷阱']},

body:`<h3>美股技術分析 vs 台股的差異</h3>
<div class="hl"><b>機構主導，技術線型更「乾淨」</b><br>
美股 80% 以上成交量來自機構投資人（對沖基金、退休金、ETF）。這讓大型股的技術線型比台股更「有效」——支撐壓力更精準，突破後追漲更可靠，假突破比例較低。</div>
<div class="hl"><b>VIX 恐慌指數：台股沒有的利器</b><br>
VIX 衡量期權市場對未來30天波動的預期。歷史上每當VIX衝到40以上，往往是市場底部（2020年3月=82，2008年=89）。台股沒有對應指標，但美股VIX大漲通常也會連帶影響台股。</div>
<h3>200日均線：機構的生命線</h3>
<table class="cmp-table">
<tr><th>均線位置</th><th>含義</th><th>操作建議</th></tr>
<tr><td>股價 > 200日MA</td><td>長線多頭格局</td><td>逢回測支撐可買入</td></tr>
<tr><td>股價跌破200日MA</td><td>多空轉折警訊</td><td>減碼或觀望</td></tr>
<tr><td>200日MA走平</td><td>長期橫盤</td><td>選擇性參與</td></tr>
<tr><td>200日MA向上彎</td><td>長線多頭確認</td><td>積極佈局</td></tr>
</table>`,

body:`<h3>聯準會（Fed）是最重要的板塊輪動引擎</h3>
<p>美股板塊輪動主要由「利率週期」和「景氣週期」兩大因素驅動。每次Fed政策轉向，都會引發大規模的板塊資金移動。</p>
<div class="hl"><b>2022–2023：升息週期的典型輪動</b><br>
2022年Fed連續13次升息，利率從0%升至5.25%。科技股（QQQ）下跌33%，而能源股（XLE）上漲67%。這是升息週期板塊輪動的教科書案例。</div>
<div class="hl"><b>2024：降息預期的板塊輪動</b><br>
2024年市場提前預期Fed降息，科技股大幅反彈（NVDA全年+180%），而銀行股、能源股相對落後。降息周期中，高估值成長股的「折現率下降效應」讓估值回升。</div>
<h3>實用板塊ETF一覽</h3>

body:`<h3>什麼是定期定額（DCA）？</h3>
<p>Dollar Cost Averaging（DCA）是指每隔固定時間（每週/每月）投入固定金額，不管市場漲跌都持續買入。這是「不擇時」的長線投資策略，也是巴菲特推薦給普通投資人的方法。</p>
<div class="hl"><b>DCA 的核心優勢</b><br>
股市下跌時，同樣的錢買到更多股數（攤低成本）；上漲時，持有的股數帶來更多收益。長期下來，DCA的平均成本往往低於任意單筆買入的時機成本。</div>
<div class="hl"><b>真實回測：每月$500投入VOO，20年</b><br>
• 總投入本金：$120,000<br>
• 20年後總資產（含複利）：約 $153,000–$200,000（依實際報酬率而定）<br>
• 年化報酬率約 10.5% 的情況下，報酬約 $33,000–$80,000<br>
• 最大優點：不需要判斷任何市場時機</div>
<h3>如何執行 DCA？</h3>
<table class="cmp-table">
<tr><th>方式</th><th>做法</th><th>適合對象</th></tr>
<tr><td>台灣複委託</td><td>每月固定申購 VOO/QQQ</td><td>小資族，不想開海外帳戶</td></tr>
<tr><td>IBKR 自動化</td><td>設定 Recurring Investment 每週買</td><td>已開IBKR帳戶者</td></tr>
<tr><td>美股ETF 00646</td><td>台股直接買（但費用較高）</td><td>不想處理外匯</td></tr>
</table>
<div class="warn"><b>DCA 也有風險</b>若投資在熊市開始（如2000年、2008年），短期內浮虧可能很深。DCA需要時間讓複利發揮效果，建議至少持有10年以上。</div>`,
pts:['DCA每月固定投入，不擇時，攤低成本','每月$500投VOO，20年後可累積超過$150K','IBKR支援自動定期投資設定','DCA需至少10年時間讓複利充分發揮']},

body:`<h3>台灣人投資美股的稅務重點</h3>
<div class="hl"><b>好消息：資本利得免稅（目前）</b><br>
台灣目前沒有資本利得稅，美股賣出獲利的部分，台灣端不需要繳稅。美國端，非美國居民（Non-Resident Alien）的股票買賣資本利得也免稅。</div>
<div class="hl"><b>注意：股息被預扣30%</b><br>
美國對非居民外國人的股息（Dividend）預扣30%稅。例如配息$100，你只收到$70。由於台灣和美國沒有租稅協定，這30%不能申請退還。若持有高股息股（如REITs、配息ETF），實際稅後報酬需重新計算。</div>
<h3>海外所得申報（台灣端）</h3>
<div class="eg"><b>申報門檻</b>年度海外所得（含美股獲利、股息）超過新台幣100萬元，需在次年5月所得稅申報時一併申報「海外所得」。計入「基本所得額」，超過NT$670萬的部分課徵20%基本稅額。大多數小額投資人（年度美股獲利 < NT$100萬）實際影響很小。</div>
<table class="cmp-table">
<tr><th>稅項</th><th>美國端</th><th>台灣端</th></tr>
<tr><td>股票買賣資本利得</td><td>非美居民免稅</td><td>無資本利得稅</td></tr>
<tr><td>股息收入</td><td>預扣 30%</td><td>計入海外所得申報</td></tr>
<tr><td>ETF（如SPY）股息</td><td>預扣 30%</td><td>同上</td></tr>
<tr><td>遺產繼承</td><td>超過 $60,000課40%遺贈稅</td><td>須事先規劃</td></tr>
</table>`,

body:`<h3>如何挑選值得長持的美股？</h3>
<p>以下用這五個維度評估一家公司，並給出分數（各1–5分）。若總分超過20分，通常是值得研究的標的。</p>
<div class="hl"><b>護城河（Moat）是長線持股的基礎</b><br>
巴菲特說：「投資就是找到一個有寬廣護城河的城堡，然後等待。」護城河越深，公司在競爭中存活的機率越高。蘋果的生態系（iOS/App Store）、微軟的企業客戶黏性（Azure+Office）是最典型的例子。</div>
<div class="hl"><b>估值：美股科技股「貴有貴的道理」</b><br>
英偉達2024年P/E超過60倍，表面看很貴。但若考慮EPS年增率超過100%，PEG（P/E/EPS成長率）= 0.6，其實「便宜」。評估科技股需使用Forward P/E（未來12個月預期P/E）而非歷史P/E。</div>
<h3>快速篩選流程</h3>
<table class="cmp-table">
<tr><th>步驟</th><th>檢查指標</th><th>合格標準</th></tr>
<tr><td>1. 基本篩選</td><td>市值、流動性</td><td>市值 > $100億，日均量 > $1億</td></tr>
<tr><td>2. 成長確認</td><td>過去3年營收CAGR</td><td>> 15% 優選</td></tr>
<tr><td>3. 獲利品質</td><td>自由現金流 / 淨利</td><td>比值 > 80% 代表盈餘有含金量</td></tr>
<tr><td>4. 估值比較</td><td>P/E vs 5年均值</td><td>低於歷史均值20%以下考慮買入</td></tr>
<tr><td>5. 催化劑</td><td>近期新聞/財報展望</td><td>有明確正向觸媒</td></tr>
</table>`,

body:`<h3>AI投資不只是買NVDA</h3>
<p>英偉達是AI算力的核心受益者，但整個AI產業鏈從基礎設施到終端應用，涵蓋了數十家不同公司。分散布局AI整條產業鏈，風險更低，也可以捕捉不同階段的機會。</p>
<div class="hl"><b>AI資本支出的水龍頭</b><br>
Meta、微軟、谷歌、亞馬遜四大科技公司2024年合計資本支出超過$2,000億美元，絕大部分流向數據中心建設和GPU採購。英偉達是最直接受益者，但台積電（先進製程）、博通（訂製AI芯片）、Marvell（網路芯片）也受益巨大。</div>
<div class="hl"><b>台積電在AI產業鏈的位置</b><br>
NVIDIA H100/H200、AMD MI300、Apple Intelligence芯片、谷歌TPU，全部在台積電3nm或5nm製程生產。台積電是整個AI產業鏈無法繞開的「唯一供應商」。這也是為什麼外資在AI行情中大量買進台積電。</div>
<div class="warn"><b>AI概念股的估值風險</b>AI題材帶動股價快速上漲，許多公司的估值已達歷史高位。若AI商業化落地速度低於預期，高估值股面臨修正風險。建議分批買入，不要在題材最熱的時候重倉押注。</div>`,

body:`<h3>美股投資者最重要的一堂課</h3>
<div class="hl"><b>S&P 500 平均每年有一次 10% 以上的回調</b><br>
這不是意外，是常態。美股每3–5年有一次超過20%的熊市。如果你無法承受暫時的30%浮虧，就不應該全倉投入美股。「波動性是長期高報酬的代價」——接受這個事實，是投資美股的第一關。</div>
<div class="hl"><b>「時間在市場中」比「選擇進場時機」更重要</b><br>
研究顯示，若你在S&P 500 過去20年中錯過表現最好的20個交易日，年化報酬率從10.5%下降到2%。大多數最好的上漲日發生在市場最恐慌的時候，這就是為什麼長期持有比試圖擇時更有效。</div>
<h3>美股投資風險管理的基本原則</h3>
<table class="cmp-table">
<tr><th>原則</th><th>具體做法</th></tr>
<tr><td>資產分散</td><td>單一股票不超過總資產15%；核心ETF+衛星個股結構</td></tr>
<tr><td>時間分散</td><td>DCA定期定額，避免集中單筆買在高點</td></tr>
<tr><td>流動性預留</td><td>至少保留6個月生活費為現金，不借錢投資</td></tr>
<tr><td>財報風險</td><td>財報前1週，減少高波動個股倉位至30%以下</td></tr>
<tr><td>心理紀律</td><td>設定年度虧損上限（如-20%），觸碰立即停損重新評估</td></tr>
</table>
<div class="eg"><b>巴菲特的建議（直接引用）</b>「我告訴股東，如果你不能看著持有的股票跌50%還能保持冷靜，你就不應該持有股票。對大多數人，買入低費率的指數型基金並長期持有，會打敗大多數專業投資人。」</div>`,

];

function saveDone(){ localStorage.setItem('us-stock-done', JSON.stringify([...done])); }
function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

function buildSidebar(){
  const list = document.getElementById('chList');
  list.innerHTML = CHAPTERS.map(ch=>`
    <div class="ch-label">${ch.label}</div>
    ${ch.lessons.map(i=>`
    <div class="ls-item${i===current?' active':''}${done.has(i)?' done':''}" onclick="goTo(${i})" id="ls-${i}">

      <span>${LESSONS[i].title}</span>
      ${done.has(i)?'<span class="ls-check">✓</span>':''}
    </div>`).join('')}
  `).join('');
  const p = Math.round(done.size/LESSONS.length*100);
  document.getElementById('prog-fill').style.width=p+'%';
  document.getElementById('prog-txt').textContent=`${done.size} / ${LESSONS.length}`;
}

function renderLesson(i){
  const l = LESSONS[i];
  document.getElementById('topbar-title').textContent = l.title;
  document.title = l.title + ' — 美股課程';
  const prev = i > 0;
  const next = i < LESSONS.length - 1;
  document.getElementById('lw').innerHTML = `
<div class="lc">
  <div class="lc-cap"><svg viewBox="0 0 580 ${l.svg.match(/viewBox="0 0 \d+ (\d+)"/)?.[1]||148}" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif">${l.svg.replace(/<\/?svg[^>]*>/g,'')}</svg></div>

      <span class="lc-rt">${l.rt}</span>
    </div>
    <div class="lc-title">${l.title}</div>
    <div class="lc-sub">${l.sub}</div>
    <div class="lc-content">${l.body}</div>
  </div>
  <div class="lc-nav">
    <button class="nav-btn${prev?'':' disabled'}" onclick="${prev?`goTo(${i-1})`:''}">← 上一課</button>
    <button class="done-btn${done.has(i)?' marked':''}" onclick="markDone(${i})">
      ${done.has(i)?'已完成':'標記完成'}
    </button>
    <button class="nav-btn primary" onclick="${next?`goTo(${i+1})`:''}">下一課 →</button>
  </div>
</div>`;
}

function goTo(i){
  current = i;
  renderLesson(i);
  buildSidebar();
  closeSidebar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function markDone(i){
  if(done.has(i)) done.delete(i); else done.add(i);
  saveDone();
  buildSidebar();
  document.querySelector('.done-btn').textContent = done.has(i)?'已完成':'標記完成';
  document.querySelector('.done-btn').classList.toggle('marked', done.has(i));
}

// init
buildSidebar();
renderLesson(0);
</script>
