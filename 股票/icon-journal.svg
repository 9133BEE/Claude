<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#1c1c1f"/>
  <!-- Book body -->
  <rect x="90" y="88" width="310" height="350" rx="18" fill="#28282d"/>
  <!-- Spine (orange) -->
  <rect x="90" y="88" width="44" height="350" rx="18" fill="#e8a228"/>
  <rect x="112" y="88" width="22" height="350" fill="#e8a228"/>
  <!-- Binding dots -->
  <circle cx="112" cy="168" r="9" fill="#c8881a"/>
  <circle cx="112" cy="256" r="9" fill="#c8881a"/>
  <circle cx="112" cy="344" r="9" fill="#c8881a"/>
  <!-- Journal entry lines -->
  <line x1="155" y1="175" x2="368" y2="175" stroke="#3c3c44" stroke-width="9" stroke-linecap="round"/>
  <line x1="155" y1="218" x2="340" y2="218" stroke="#3c3c44" stroke-width="9" stroke-linecap="round"/>
  <line x1="155" y1="261" x2="368" y2="261" stroke="#3c3c44" stroke-width="9" stroke-linecap="round"/>
  <line x1="155" y1="304" x2="310" y2="304" stroke="#3c3c44" stroke-width="9" stroke-linecap="round"/>
  <!-- Upward equity curve (green) -->
  <polyline points="155,378 215,358 275,365 368,330"
    fill="none" stroke="#3ecf8e" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
