body:`<h3>為什麼要理解市場結構？</h3>
<p>很多人買了股票，卻不知道自己買的是上市還是上櫃。這個差別非常重要：上市股票流動性更好（容易進出），但上櫃公司有時因規模較小，波動更劇烈，主力更容易操控。</p>
<div class="hl"><b>📌 關鍵差異一張表</b>上市：市值通常較大，機構參與多，外資持有比例高。上櫃：中小企業，散戶比例高，籌碼較集中，波動大但機會也多。</div>
<h3>台灣加權指數怎麼算</h3>
<p>台灣加權指數（TAIEX）是所有上市股票的<strong>市值加權平均</strong>。台積電市值佔整個上市市場的28%以上，所以台積電漲跌1%，大盤就動0.28%。這就是為什麼「台積電=台股晴雨表」。</p>
<div class="pro"><b>💡 專業視角：外資重壓台積電的意義</b>當外資大量賣超台積電時，不只是在賣一支股票——他們同時在打壓整個大盤指數。這是台灣股市特有的「集中度風險」，任何研究台股的人都必須盯緊台積電。</div>
<h3>ETF不等於安全</h3>
<p>0050追蹤台灣50大市值，聽起來很分散，但前10大持股就佔了65%以上，而台積電一家就佔35%。ETF在大盤系統性下跌時一樣跌，只是比個股跌少一點。<strong>ETF不是「買了就放著」的安全港灣</strong>，同樣需要看大盤趨勢和買賣時機。</p>`,

body:`<h3>五檔報價的秘密</h3>
<p>五檔報價（Level 2）顯示目前市場上最近五個價位的買賣掛單量。這是理解當下多空力道最直接的工具。從上圖看到，<strong>買1有520張、遠多於賣1的42張</strong>——這代表買方力道遠強，股價極可能被往上推。</p>
<div class="pro"><b>💡 職業交易者看五檔的方式</b>不只看掛單數量，更看「掛單的真實性」。假掛單（幌騙/Spoofing）：主力掛出大量買單，讓散戶以為有強力支撐而追入，但實際成交前撤單。識別方式：掛單量出現但沒有成交量對應，或掛單在快要成交前消失。</div>
<h3>分時走勢圖怎麼看</h3>
<p>分時圖（Tick Chart）顯示當日每筆成交的走勢，配合成交量柱狀圖。<strong>關鍵觀察點</strong>：<br>
1. 開盤15分鐘的強弱，通常決定當日趨勢<br>
2. 成交量突然放大的時間點（主力活動訊號）<br>
3. 尾盤（13:00後）的拉尾盤或打壓，可能是隔日訊號</p>
<div class="eg"><b>✅ 尾盤觀察法</b>尾盤（13:00~13:30）突然出現大買單拉高，並且收在當日高點附近 → 隔日通常繼續強。相反，尾盤被打壓到低點收盤 → 隔日開盤可能繼續弱。</div>
<h3>K線週期選擇</h3>
<p>日K：最常用，一根K線=一天。週K：中線趨勢判斷，過濾日K的雜訊。月K：長線佈局，看大趨勢。<strong>黃金原則</strong>：用大週期定方向，用小週期找進場點。例：月K確認多頭、週K形成黃金交叉後，再用日K找最佳切入點。</p>`,

svg:`<svg viewBox="0 0 580 140" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif">
<rect width="580" height="140" fill="#f8fafc" rx="8"/>
<text x="290" y="22" text-anchor="middle" fill="#374151" font-size="12" font-weight="700">買賣一次的成本</text>
<rect x="20" y="32" width="250" height="98" fill="#eff6ff" stroke="#bfdbfe" rx="6" stroke-width="1"/>
<text x="145" y="52" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="700">買進成本</text>
<text x="40" y="72" fill="#374151" font-size="10">手續費：</text><text x="260" y="72" text-anchor="end" fill="#1d4ed8" font-size="10" font-weight="700">0.1425%（可折扣至6折）</text>
<text x="40" y="90" fill="#374151" font-size="10">買進100萬股票實際付：</text><text x="260" y="90" text-anchor="end" fill="#1d4ed8" font-size="10" font-weight="700">~$1,425（可低至$855）</text>
<text x="40" y="108" fill="#374151" font-size="10">網路下單：</text><text x="260" y="108" text-anchor="end" fill="#059669" font-size="10" font-weight="700">通常5~6折手續費</text>
<text x="40" y="124" fill="#64748b" font-size="9">（越大額越可談更低折扣）</text>
<rect x="310" y="32" width="250" height="98" fill="#fff1f2" stroke="#fecdd3" rx="6" stroke-width="1"/>
<text x="435" y="52" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="700">賣出成本</text>
<text x="330" y="72" fill="#374151" font-size="10">手續費：</text><text x="550" y="72" text-anchor="end" fill="#dc2626" font-size="10" font-weight="700">0.1425%（同買進）</text>
<text x="330" y="90" fill="#374151" font-size="10">證交稅（台灣特有）：</text><text x="550" y="90" text-anchor="end" fill="#dc2626" font-size="10" font-weight="700">0.3%（ETF為0.1%）</text>
<text x="330" y="108" fill="#374151" font-size="10">總賣出成本：</text><text x="550" y="108" text-anchor="end" fill="#dc2626" font-size="10" font-weight="700">~0.4425%</text>
<text x="330" y="124" fill="#64748b" font-size="9">來回一次約0.585%（網路折扣後）</text>
</svg>`,
body:`<h3>成本對你的影響有多大</h3>
<p>買進100萬、賣出100萬，來回成本約0.585%（手續費折6折計算），等於一次交易就花掉約5,850元。做短線的人每週交易10次，一個月成本就是23萬——光要打平手續費就需要2.3%的月報酬率。<strong>這就是為什麼短線難賺錢</strong>：成本吃掉利潤。</p>
<div class="formula">交易成本計算：
買進手續費 = 交易金額 × 0.1425% × 折扣（如0.6）
賣出手續費 = 交易金額 × 0.1425% × 折扣
證交稅    = 賣出金額 × 0.3%
來回總成本 ≈ 交易金額 × 0.585%（6折後）</div>
<h3>漲跌停的操作意義</h3>
<p>台股每日漲跌幅限制為±10%。<strong>漲停鎖死</strong>代表當日沒有賣單，想買也買不到——這是主力創造「FOMO（害怕錯過）」的工具。隔日是否繼續上漲，取決於：1) 漲停前是否有大量爆量出貨 2) 融資是否大量增加（散戶追高訊號）。</p>
<div class="warn"><b>⚠️ 漲停追入的最大風險</b>主力在鎖漲停前已大量出貨（量大、但股價被維持在高位），隔日一旦開盤沒有守住，追高者全部套牢。這種情況在小型股非常常見。</div>`,
pts:['來回交易成本約0.585%（6折手續費），頻繁短線的人光成本就難以獲利','漲停鎖死是FOMO心理戰，追入前先看量和融資','ETF的證交稅只有0.1%，長期投資成本優勢大','T+2交割：買了要第二個交易日才完成交割']},
