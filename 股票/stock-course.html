/* 0 */
{num:'1-1',title:'台股市場結構全解析',sub:'搞懂市場骨架，才能看清資金流向',ch:'第一章：認識台股市場',rt:'8 分鐘',
cap:'上市、上櫃、ETF：三種市場的關鍵差異',
svg:`<svg viewBox="0 0 580 130" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif">
<rect width="580" height="130" fill="#f8fafc" rx="8"/>
<rect x="15" y="18" width="170" height="95" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
<text x="100" y="42" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700">上市（TWSE）</text>
<text x="100" y="62" text-anchor="middle" fill="#374151" font-size="10">1,000+ 家大型公司</text>
<text x="100" y="80" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="600">台積電 佔大盤28%</text>
<text x="100" y="104" text-anchor="middle" fill="#64748b" font-size="9">外資主導 · 流動性最佳</text>
<rect x="205" y="18" width="170" height="95" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="8"/>
<text x="290" y="42" text-anchor="middle" fill="#166534" font-size="13" font-weight="700">上櫃（TPEx）</text>
<text x="290" y="62" text-anchor="middle" fill="#374151" font-size="10">800+ 家中小型公司</text>
<text x="290" y="80" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">散戶比例高</text>
<text x="290" y="104" text-anchor="middle" fill="#64748b" font-size="9">波動大 · 籌碼易集中</text>
<rect x="395" y="18" width="170" height="95" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5" rx="8"/>
<text x="480" y="42" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700">ETF / 指數</text>
<text x="480" y="62" text-anchor="middle" fill="#374151" font-size="10">追蹤一籃子股票</text>
<text x="480" y="80" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">0050 台積電佔35%</text>
<text x="480" y="104" text-anchor="middle" fill="#64748b" font-size="9">分散風險 · 仍需擇時</text>
</svg>`,
body:`<h3>市場結構決定你的操作策略</h3>
<p>上市大型股外資參與多、波動穩定；上櫃中小型股散戶比例高，籌碼集中，主力更容易推高也更容易砸盤。選不同市場，等於選擇不同的敵人和戰場。</p>
<div class="pro"><b>💡 台積電＝台股晴雨表</b>台積電市值佔上市市場28%以上。外資大賣台積電，等於同時打壓大盤指數。研究台股，每天必看台積電外資買賣超，這是最重要的單一指標。</div>
<h3>ETF的真相</h3>
<p>0050前10大持股佔65%，台積電一家佔35%。ETF在大盤系統性下跌時一樣跌，<strong>ETF不是「買了就放著」的安全港灣</strong>，一樣需要看趨勢和進出場時機。</p>`,
pts:['上市股流動性佳；上櫃股波動大、籌碼易集中','台積電佔大盤28%，台積電方向就是台股方向','ETF分散個股風險，但無法避開系統性下跌','研究台股，每天先看台積電外資動向']},

/* 1 */
{num:'1-2',title:'看盤工具完全操作指南',sub:'五檔、分時圖、K線——你真的看懂了嗎？',ch:'第一章：認識台股市場',rt:'10 分鐘',
cap:'五檔報價：買賣力道一目了然',
svg:`<svg viewBox="0 0 580 130" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif">
<rect width="580" height="130" fill="#f8fafc" rx="8"/>
<rect x="20" y="15" width="255" height="105" fill="#fff0f0" stroke="#fecaca" rx="6" stroke-width="1"/>
<text x="147" y="36" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="700">賣方（Ask）</text>
<text x="50" y="54" fill="#374151" font-size="10">賣5 152.0</text><text x="255" y="54" text-anchor="end" fill="#64748b" font-size="9">320張</text>
<text x="50" y="70" fill="#374151" font-size="10">賣3 151.0</text><text x="255" y="70" text-anchor="end" fill="#64748b" font-size="9">195張</text>
<text x="50" y="86" fill="#dc2626" font-size="10" font-weight="700">賣1 150.0</text><text x="255" y="86" text-anchor="end" fill="#dc2626" font-size="9" font-weight="700">42張 ← 最佳賣價</text>
<text x="50" y="108" fill="#64748b" font-size="9">賣單少=容易被吃掉→股價上推</text>
<rect x="305" y="15" width="255" height="105" fill="#f0fdf4" stroke="#bbf7d0" rx="6" stroke-width="1"/>
<text x="432" y="36" text-anchor="middle" fill="#166534" font-size="11" font-weight="700">買方（Bid）</text>
<text x="325" y="54" fill="#166534" font-size="10" font-weight="700">買1 149.5</text><text x="550" y="54" text-anchor="end" fill="#166534" font-size="9" font-weight="700">520張 ← 強力支撐</text>
<text x="325" y="70" fill="#374151" font-size="10">買3 148.5</text><text x="550" y="70" text-anchor="end" fill="#64748b" font-size="9">200張</text>
<text x="325" y="86" fill="#374151" font-size="10">買5 147.5</text><text x="550" y="86" text-anchor="end" fill="#64748b" font-size="9">140張</text>
<text x="325" y="108" fill="#64748b" font-size="9">買單遠多於賣單→多方力道強</text>
</svg>`,
body:`<h3>五檔報價的秘密</h3>
<p>五檔（Level 2）顯示市場上最近五個價位的買賣掛單量。買1掛520張、賣1只有42張——買方力道遠強於賣方，股價極可能被往上推。</p>
<div class="pro"><b>💡 識別假掛單（Spoofing）</b>主力掛出大量買單製造「有人撐盤」的假象，讓散戶追入，快成交前撤單。識別方式：掛單量龐大但一直沒有對應成交量，或是買單在股價靠近時神秘消失。這是台股小型股最常見的騙局。</div>
<h3>分時圖三個關鍵觀察</h3>
<p>1. <strong>開盤15分鐘強弱</strong>通常決定當日趨勢方向。2. <strong>成交量突然放大的時間點</strong>，代表主力在活動。3. <strong>尾盤（13:00後）</strong>突然大買單拉高收在高點→隔日通常續強；尾盤被打壓到低點→隔日開盤可能繼續弱。</p>`,
pts:['五檔掛單量反映即時多空力道，但需注意主力假掛單（Spoofing）','開盤15分鐘強弱通常決定全日趨勢','尾盤拉高收在高點是隔日續強訊號','大週期定方向，小週期找進場點']},

{num:'1-3',title:'交易成本與機制',sub:'手續費、稅、漲跌停——這些細節決定實際報酬',ch:'第一章：認識台股市場',rt:'6 分鐘',
cap:'買賣一次的真實成本拆解',
svg:`<svg viewBox="0 0 580 120" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif">
<rect width="580" height="120" fill="#f8fafc" rx="8"/>
<rect x="15" y="15" width="258" height="92" fill="#eff6ff" stroke="#bfdbfe" rx="6" stroke-width="1"/>
<text x="144" y="36" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="700">買進成本</text>
<text x="30" y="56" fill="#374151" font-size="10">手續費：0.1425%（可折到6折）</text>
<text x="30" y="74" fill="#374151" font-size="10">100萬實付：$1,425 → 折後 $855</text>
<text x="30" y="92" fill="#059669" font-size="9" font-weight="600">網路下單通常5~6折</text>
<rect x="307" y="15" width="258" height="92" fill="#fff1f2" stroke="#fecdd3" rx="6" stroke-width="1"/>
<text x="436" y="36" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="700">賣出成本</text>
<text x="322" y="56" fill="#374151" font-size="10">手續費：0.1425%（同買進）</text>
<text x="322" y="74" fill="#dc2626" font-size="10" font-weight="700">+ 證交稅：0.3%（ETF為0.1%）</text>
<text x="322" y="92" fill="#dc2626" font-size="9" font-weight="700">來回總成本≈0.585%（6折後）</text>
</svg>`,
body:`<h3>成本吃掉你的利潤</h3>
<p>買賣100萬，來回成本約5,850元。做短線每週交易10次，一個月光手續費就23萬，等於需要2.3%的月報酬率才能打平。<strong>這就是為什麼短線散戶難賺錢</strong>——券商的利潤來自你的頻繁交易。</p>
<div class="formula">來回成本 = 買進 × 0.1425% × 折扣 + 賣出 × (0.1425% × 折扣 + 0.3%)
100萬買賣（6折）：855 + 855 + 3,000 = 4,710元
ETF100萬買賣（6折）：855 + 855 + 1,000 = 2,710元</div>
<h3>漲停板的操作意義</h3>
<p>台股±10%漲跌停。<strong>漲停鎖死代表沒有賣單</strong>，是主力製造FOMO的工具。判斷隔日能否續漲的關鍵：漲停前有沒有爆量出貨？融資有沒有大幅增加（散戶追高）？</p>
<div class="warn"><b>⚠️ 追漲停最大風險</b>主力在鎖停前已分批出貨，鎖停只是讓散戶以為「有人撐盤」。隔日一旦打開跌停，追高者全部套牢。小型股每年都在發生這種戲碼。</div>`,

body:`<h3>K線的靈魂在「位置」和「量」</h3>
<p>同樣一根錘型線，出現在下跌趨勢的低點是強力止跌訊號；出現在高位是「上影小、下影長」，代表買了被出貨，要小心。<strong>K線形狀是手段，位置才是答案。</strong></p>
<div class="pro"><b>💡 大陽線爆量的兩種情境（外面不會告訴你）</b>
情境A：大陽線爆量後股價繼續上漲，且隔日開高走高→主力確認突破，繼續追。
情境B：大陽線爆量後，隔日開低或量縮下跌→當日爆量是主力出貨日，散戶全部接了。
區別在於「之後三天的走勢」，不是當天的K線形狀。</div>
<h3>主力吸籌的K線特徵</h3>
<p>主力在吸貨時，<strong>不會讓你看到長陽線</strong>。他們用的方式是：連續小量的十字線和小紅K，股價橫在低位，成交量萎縮到極低。散戶以為沒希望就賣掉，主力默默吸收。等到吸夠了才拉。</p>
<div class="eg"><b>✅ 吸籌識別法：低位量縮橫盤</b>股價跌了一段後，出現10~20天的橫盤，成交量比跌勢中還低（量縮到平均量的30%以下），K線小陰小陽交錯——這是最強的吸籌訊號，等爆量突破確認後進場。</div>
<h3>長上影線：最被低估的出貨訊號</h3>
<p>長上影線代表當天被推高後又被賣回來。高位出現長上影線，代表有人在高點出貨，多方攻擊被空方打回。連續出現長上影線且無法突破同一壓力區→這個區間有大量賣壓，需要時間消化。</p>`,
pts:['K線位置比形狀重要，同一形狀在不同位置意義完全相反','大陽爆量後隔日不漲=主力出貨日，散戶都接到貨','低位量縮橫盤是吸籌訊號，等爆量突破後才進場','長上影線高位連續出現=有賣壓，謹慎做多']},

body:`<h3>量是主力的腳印</h3>
<p>主力買賣的規模龐大，無法隱藏成交量。量的異常放大，代表「有人在做某件事」。<strong>散戶的交易量不足以讓成交量爆增——爆量一定是主力或法人在動作。</strong></p>
<div class="pro"><b>💡 量縮底部識別法（最重要技巧）</b>真正的底部有個特徵：量縮到你覺得「這支票是不是沒人要了」的地步。當跌幅越來越小（從跌3%→跌1%→微跌），但量也同步萎縮，代表賣壓消化完畢。等第一根爆量的陽線出現，才是確認進場訊號。光量縮不夠，要等量爆。</div>
<h3>爆量出貨 vs 爆量突破：如何區分</h3>
<table class="cmp-table">
<tr><th>特徵</th><th>爆量突破（做多）</th><th>爆量出貨（離場）</th></tr>
<tr><td>位置</td><td>長期盤整後首次突破</td><td>漲了一大段後的高位</td></tr>
<tr><td>收盤</td><td>收在突破點之上</td><td>收在當日最高點下方</td></tr>
<tr><td>隔日</td><td>開高或持平繼續漲</td><td>開低或拉高後賣壓出現</td></tr>
<tr><td>融資</td><td>融資小幅增加</td><td>融資大幅增加（散戶追）</td></tr>
</table>
<div class="warn"><b>⚠️ 最危險的假突破陷阱</b>爆量衝高，很多人興奮追入，但收盤回到突破點之下——這是主力刻意製造的假突破。衝高時散戶追，收盤回落時主力出貨。判斷突破真偽，必須看<strong>收盤價</strong>，不是盤中最高價。</div>`,
pts:['量增價漲最強，量縮價漲要謹慎（買氣可能不足）','底部特徵：量縮到極低，跌幅越來越小，等爆量陽線確認','爆量後看收盤位置：收在高點→突破；收在低點→出貨','假突破識別：衝高後收盤跌回突破點以下，是主力出貨陷阱']},

cap:'MACD零軸理論：金叉在哪裡發生決定一切',
svg:`<svg viewBox="0 0 580 140" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif">

<rect x="380" y="15" width="190" height="70" fill="#fffbeb" stroke="#fde68a" rx="6" stroke-width="1"/>
<text x="475" y="32" text-anchor="middle" fill="#92400e" font-size="10" font-weight="700">MACD強度排名</text>
<text x="393" y="48" fill="#374151" font-size="9">★★★ 零軸上方金叉</text>
<text x="393" y="63" fill="#374151" font-size="9">★★ 零軸下方金叉+底背離</text>
<text x="393" y="78" fill="#374151" font-size="9">★ 零軸下方普通金叉</text>
</svg>`,
body:`<h3>零軸位置決定金叉的力度</h3>
<p>大多數人只看「金叉就做多」，但這是不完整的。<strong>零軸上方的金叉比零軸下方的金叉強三倍以上</strong>。零軸上方代表中期均線的多頭排列已確立，此時金叉是趨勢的確認，不是反彈。零軸下方的金叉只是技術性反彈，常常「金叉之後繼續跌」。</p>
<div class="pro"><b>💡 DIF線斜率：專業交易者的隱藏觀察</b>DIF線本身的斜率和方向比柱狀圖更早出現訊號。DIF線由平坦轉向上揚（斜率增加），通常比金叉早2~3天出現。當你在等金叉，專業交易者已經在DIF線斜率轉正時進場。</div>
<h3>底背離：逆勢操作的最強依據</h3>
<p><strong>底背離定義</strong>：股價創新低，但MACD的低點比前一個低點高（不創低）。這代表下跌動能在衰減，賣方力量正在枯竭。底背離不是立即進場訊號——需要等MACD金叉確認後才買入。光有背離沒有金叉，股價可能繼續創低。</p>
<div class="eg"><b>✅ 底背離操作SOP</b>① 確認股價創新低 ② 確認MACD低點未創低（背離成立）③ 等待MACD出現金叉 ④ 進場，停損設在股價低點之下1~2%</div>
<h3>週線MACD vs 日線MACD</h3>
<p>週線MACD的訊號比日線可靠3~5倍，因為週線過濾了更多雜訊。週線MACD在零軸以上金叉，對應日線MACD出現底背離→這是罕見但威力極強的多重確認訊號。</p>`,
pts:['零軸上方金叉最強（趨勢確認），零軸下方金叉只是反彈','DIF線斜率轉正比金叉早2~3天出現，是更早的進場訊號','底背離需等MACD金叉確認，光背離不夠','週線MACD比日線可靠，兩者共振時訊號最強']},

</svg>`,
body:`<h3>KD鈍化：散戶最常犯的錯誤</h3>
<p>很多人看到KD到80就急著賣，結果賣掉後股票繼續漲。<strong>強勢股的KD會在80以上橫走很久，這叫「鈍化」</strong>，是主力持續推高的表現。鈍化期間死叉通常是洗盤，不是真正的出場訊號。</p>
<div class="pro"><b>💡 第二次死叉才是真訊號（職業交易者秘訣）</b>強勢股的第一次死叉，KD從高位交叉向下，但股價只是短暫回檔就繼續創高。第二次死叉才是趨勢真正轉弱的訊號——此時配合MACD死叉或週線走弱，確認性更高。台股超過70%的強勢股符合「第二次死叉才出場」的規律。</div>
<h3>KD在低位的應用</h3>
<p>KD低於20出現黃金交叉，是短線超賣反彈的訊號。但不能只看這一個訊號——需要同時確認：① 量能有沒有回升 ② 股價有沒有守住支撐 ③ 日線有沒有止跌的K線型態（錘型、長下影）。三個條件同時滿足，才是高勝率的買點。</p>
<h3>RSI的隱藏用法</h3>
<p>RSI 50是多空分界線，不只是看超買超賣。<strong>RSI重新站上50</strong>代表中期多頭重新確立，是追強勢股的確認訊號。RSI跌破50，代表中期趨勢走弱，不宜逆勢做多。</p>`,

body:`<h3>20MA = 主力平均成本線</h3>
<p>20日均線代表過去20天的平均成交價，也就是近期持有者的平均成本。<strong>主力不會輕易讓股價跌破自己的成本線</strong>，因此20MA在多頭格局中是強力支撐，跌到20MA附近往往是好買點。</p>
<div class="pro"><b>💡 均線扣抵值：預測均線方向（外面幾乎沒人教）</b>20MA今天的值，會受到「今天新增的收盤價」和「20天前的收盤價」共同影響——新進來的值扣掉20天前的值。如果20天前是一個高價日，今天的均線即使股價平盤，均線也會向下彎。你可以提前知道均線未來的走向，這叫「扣抵值效應」。操作應用：如果接下來幾天要扣掉的都是低價，均線將持續上揚——這是正向加速訊號。</div>
<h3>均線糾結後的爆發</h3>
<p>當5MA、20MA、60MA三條均線糾結在一起（三線合一），代表多空力量完全平衡，一旦爆量突破，就是主力正式宣告方向。<strong>均線糾結後的突破方向，就是主力選擇的方向</strong>，這種走勢往往有很大的延伸空間。</p>
<h3>葛蘭碧八法精選兩個最強買點</h3>
<p><strong>買點1</strong>：均線由下彎轉為走平，股價由下突破均線 → 趨勢反轉的最早訊號。<strong>買點2</strong>：均線持續上揚，股價回踩均線後獲得支撐 → 多頭格局中最穩定的加碼點。這兩個買點佔了台股超過60%的最佳進場機會。</p>`,
pts:['20MA是主力平均成本線，多頭格局中是強力支撐','扣抵值效應：可提前預測均線未來走向', '三線糾結後的爆量突破，方向就是主力選擇的方向','葛蘭碧買點2（回踩上升均線）是多頭格局最穩定進場點']},

body:`<h3>K線組合的力量</h3>
<p>單根K線只能反映當天的多空，K線組合才能反映趨勢轉折。<strong>最強的反轉訊號需要2~3根K線的確認</strong>，配合成交量和位置，勝率才能超過70%。</p>
<div class="pro"><b>💡 島型反轉：最被忽略的最強型態</b>島型反轉需要兩個跳空缺口。第一個跳空讓股價「跳到孤島」，第二個跳空讓股價「逃離孤島」。這種型態在台股出現的頻率低，但準確率極高（約80%以上）。跳空缺口產生的原因是重大消息——公司利空消化後的機構收購、或重大利多出現。一旦出現，通常是一波大行情的開始。</div>
<h3>多頭吞噬的進場技巧</h3>
<p>多頭吞噬的標準：大陽K的實體必須<strong>完全包住</strong>前一天陰K的實體（不是整根K線，是實體）。進場時機：吞噬陽線收盤後隔日開盤確認，停損設在吞噬陽線的最低點。如果吞噬後的量比前一天的量還小，可信度打折。</p>
<h3>為什麼位置比型態更重要</h3>
<p>同樣的晨星型態，出現在下跌趨勢中的長期支撐區（如前一個底部或整數關卡）勝率超過70%；隨機出現在下跌中途，勝率只有40%。<strong>型態是形，位置是神。</strong>學型態之前，先學會看位置。</p>`,
pts:['島型反轉需兩個跳空缺口，罕見但準確率超過80%','多頭吞噬需大陽K完全吞噬前日陰K實體，量需放大','晨星三根K線確認，低點附近的晨星勝率超過70%','型態需在關鍵支撐位出現才有意義，位置比形狀重要']},

body:`<h3>旗形：最穩定的連續型態</h3>
<p>旗形由「旗桿」（急漲段）和「旗面」（小幅回檔整理）組成。旗面通常維持2~4週，成交量在整理期間萎縮。<strong>目標價 = 突破點 + 旗桿的長度</strong>，勝率在強勢市場中高達75%以上。</p>
<div class="pro"><b>💡 旗形最佳進場點（大多數人都搞錯了）</b>大多數人等突破才買，但那時候風險報酬比已經變差。專業做法是在旗面整理期間，等股價<strong>回踩旗頂線</strong>（也就是前一波高點）時買入。此時停損只需設在旗底，賺的是整個突破後的漲幅。回踩旗頂線沒跌破，加上量縮，是最佳進場條件。</div>
<h3>假突破陷阱識別</h3>
<p>三角收斂的假突破是散戶的噩夢。識別假突破的三個標準：① <strong>收盤必須在突破點之上</strong>（盤中突破不算）② 突破時成交量必須明顯放大 ③ 突破後隔日不能跌回突破點之下。三個條件缺一，都需要謹慎。</p>
<div class="warn"><b>⚠️ 最常見的陷阱：量縮突破</b>如果突破時量沒有放大，這個突破99%是假的。主力在量縮的情況下用少量資金製造假突破，散戶追入後主力再賣壓回去。量是真假突破的最終仲裁者。</div>
<h3>上升三角的操作邏輯</h3>
<p>上升三角的頂部是水平壓力，底部逐步墊高——每次回檔的低點都比上次高，代表買方越來越積極。當底部墊高到壓力附近，幾乎每一筆回落都被立即買回，代表賣壓快被吸收完了。一旦放量突破水平壓力，通常有很大的延伸空間。</p>`,
pts:['旗形最佳進場：回踩旗頂線+量縮，勝率優於等突破','假突破識別：收盤需在突破點之上，且量必須放大','三角收斂量縮到極限後的爆量突破才可信','目標價計算：旗形=旗桿等距；三角=型態高度']},

body:`<h3>頭肩頂的形成邏輯</h3>
<p>頭肩頂代表多頭力量逐漸衰竭：左肩創高，回檔後反彈再創更高（頭部），但右肩的反彈明顯比左肩弱——多方力量在衰減。三個峰點之間的低點連成「頸線」，跌破頸線代表趨勢反轉。</p>
<div class="pro"><b>💡 成交量是頭肩頂的靈魂</b>標準的頭肩頂，成交量有規律：左肩量最大，頭部量次之（已比左肩小），右肩量最小。這個量能遞減的過程，代表多頭每次推高都越來越沒有力氣。如果右肩量反而比頭部大，頭肩頂的可信度大幅降低。</div>
<h3>頸線突破的操作細節</h3>
<p>不能只看股價跌破頸線——必須收盤在頸線之下，且破頸線當天成交量放大。破頸後常見「回測頸線」（反彈回到頸線附近），這是做空的最佳時機：此時頸線由支撐變為壓力，放空風險低報酬高。</p>
<div class="eg"><b>✅ 頭肩頂做空SOP</b>① 確認右肩高點低於頭部 ② 確認右肩量縮 ③ 等收盤跌破頸線+量放大 ④ 在回測頸線時放空，停損設在頸線上方2%</div>
<h3>目標價計算</h3>
<p>頭肩頂目標價 = 頸線價格 − (頭部高點 − 頸線)。也就是說，跌破頸線後，下跌的幅度等於從頸線到頭部的距離。這個計算法在台股的準確率約65~70%。</p>`,
pts:['頭肩頂三重確認：型態+量能遞減+收盤跌破頸線','右肩量必須比頭部小，否則頭肩頂可信度低','破頸後回測頸線是最佳做空點（頸線由支撐變壓力）','目標價=頸線−（頭部高點−頸線），準確率約65~70%']},

body:`<h3>頭肩底的形成邏輯</h3>
<p>頭肩底是頭肩頂的鏡像，代表空頭力量逐漸衰竭：左肩創低，反彈後再跌至更低（頭部），但右肩的跌幅明顯比頭部淺——空方力量在衰減。三個底部之間的高點連成「頸線」，突破頸線代表趨勢正式從空頭轉為多頭。</p>
<div class="pro"><b>💡 頭肩底的量能模式與頭肩頂相反</b>頭肩底的關鍵在<strong>突破頸線時必須爆量</strong>——這筆量代表主力確認進場，是型態成立的最重要確認。右肩縮量代表賣壓已經耗盡。若突破頸線時沒有量，有高機率是假突破，不要貿然追進。</div>
<h3>頸線突破的操作細節</h3>
<p>頭肩底的頸線有時略呈上斜，代表每次反彈都越來越高，型態更強勁。突破後常見「回測頸線」（漲上去後回落測試頸線支撐），這是比突破時更安全的進場點：停損只需設在頸線下方，風險清晰。</p>
<div class="eg"><b>✅ 頭肩底做多SOP</b>① 確認右肩低點高於頭部低點 ② 確認右肩縮量（賣壓耗盡）③ 等收盤突破頸線＋量明顯放大 ④ 在回測頸線時買入，停損設在頸線下方2%</div>
<h3>目標價計算</h3>
<p>頭肩底目標價 = 頸線價格 + (頸線 − 頭部低點)。突破頸線後的上漲幅度，等於從頭部最低點到頸線的距離。這個算法和頭肩頂完全對稱，在台股的準確率約 65~70%。</p>`,
pts:['頭肩底三重確認：型態＋右肩縮量＋收盤放量突破頸線','突破頸線無量是假訊號，必須爆量才可信','回測頸線是比突破時更安全的進場點（停損清晰）','目標價＝頸線＋（頸線−頭部低點），與頭肩頂計算完全對稱']},

body:`<h3>W底最常見的錯誤進場</h3>
<p>散戶最常在第二個底部（看起來是底部）就進場，結果股票繼續創低，第二個底比第一個低——這就是「虛假W底」。<strong>真正的W底進場點不是在底部，而是在突破頸線的時候。</strong>頸線是兩個底之間的高點連成的水平線。</p>
<div class="pro"><b>💡 W底的量能鑑別法</b>第一個底通常伴隨恐慌性爆量，第二個底的成交量應該<strong>明顯小於第一個底</strong>——代表賣壓越來越弱。如果第二個底的量反而比第一個底大，代表還有新的賣壓出現，W底可信度很低，不要輕易買入。</div>
<h3>W底突破後的「回測進場法」</h3>
<p>W底突破頸線後，有約40%的機率會回測頸線（即漲上去後回落測試頸線是否支撐）。<strong>回測頸線是比突破時更安全的進場點</strong>：停損清晰（跌破頸線就出），且已確認頸線轉為支撐。</p>
<h3>杯柄型態：美股最喜歡的型態</h3>
<p>杯柄由圓弧底（「杯」）加上小幅整理（「柄」）組成。杯的深度通常在12~35%，柄的回檔不超過杯深的50%。突破點是杯左緣的高點，目標價 = 突破點 + 杯深。這個型態在台積電、台達電等大型股中出現頻率很高。</p>`,
pts:['W底真正進場點是突破頸線，不是在第二個底','第二個底的量應小於第一個底，否則W底不可信','突破後回測頸線是更安全的進場機會','杯柄型態：目標=突破點+杯深，柄回檔不超過杯深50%']},

body:`<h3>外資是最大的莊家</h3>
<p>外資（外國機構投資人）持有台股約40%的市值，單日買賣動輒數百億。<strong>外資的方向決定大趨勢</strong>，但對個股而言，外資的連續買賣比單日更重要——連續5天以上的買超，通常代表外資正在建立中期部位。</p>
<div class="pro"><b>💡 外資買賣超的隱藏觀察法</b>外資「賣超但股價不跌」往往比「買超股價上漲」更有意義。代表有人（投信或主力）正在吸收外資的賣壓，籌碼轉移到更積極的手中。這種情況出現在底部區，通常預示大行情。相反，外資買超但股價漲幅越來越小，代表上方有其他賣壓，後市有隱憂。</div>
<h3>外資期貨未平倉部位</h3>
<p>外資在台指期的未平倉量也是重要指標。外資期貨<strong>大量淨多單</strong>代表外資看多大盤；大量淨空單代表外資在避險（可能準備賣股）。期貨未平倉量的方向，往往領先現貨市場2~3天。</p>
<h3>台積電外資動向 = 台股晴雨表</h3>
<p>每日台積電外資買賣超是必看指標。外資連買台積電5天以上，台股幾乎可以放心做多。外資連賣台積電且期貨轉空，就算個股強勢也要謹慎，整體市場有下行風險。</p>`,
pts:['外資連買5天以上才算中期佈局，單日買超只是短線','外資賣超但股價不跌=有人在吸籌，比買超更值得注意','外資期貨未平倉淨多/空單，領先現貨市場2~3天','台積電外資動向是台股最重要的單一指標']},

body:`<h3>投信為什麼要「作帳」</h3>
<p>基金的績效是按季度或年度向投資人報告的。每到績效結算前，投信基金經理會積極拉抬手中的持股，讓淨值好看——這就是「作帳行情」。<strong>每年最強的兩個作帳期是3~5月（Q1季末）和10~12月（年底）</strong>，這兩段時間跟著投信連買的標的，往往有穩定的短期漲幅。</p>
<div class="pro"><b>💡 追蹤投信的正確方法</b>不要看單日投信買賣超，要看「連續買超累積張數」。投信連續5天以上買超同一標的，且買超金額逐日擴大，代表該標的已被列入「作帳名單」。特別注意：投信開始買的前幾天，通常已有大股東或主力先行佈局（因為他們知道投信要買）——所以在投信首次買超出現前，分點資料可能已經出現異動。</div>
<h3>自營商的操作特性</h3>
<p>自營商以<strong>短線操作</strong>為主，看自營商買超方向只適合當沖或隔日沖。自營商還涉及大量的<strong>選擇權避險</strong>，所以他們的現貨買賣不一定代表真實看法——可能只是對沖期貨或選擇權部位的操作。新手不要過度解讀自營商的單日動作。</p>
<h3>投信＋外資齊買的威力</h3>
<p>當外資和投信同步買超同一支股票，且各自連買5天以上，這是台股中極為罕見的強力訊號。這代表：外資看好（國際資金進場）+ 投信看好（有作帳動機）+ 籌碼同步集中，三個條件同時成立，短中期幾乎不可能跌。</p>`,
pts:['投信作帳行情在3~5月和10~12月最強，跟買連買標的','投信連買5天且金額擴大=被列入作帳名單','自營商以短線和避險為主，不適合長期解讀方向','外資+投信齊買是台股最強的籌碼訊號']},

body:`<h3>融資是散戶情緒的溫度計</h3>
<p>融資代表散戶向券商借錢買股（槓桿1.4倍左右）。融資增加代表散戶在買，融資減少代表散戶在賣或被斷頭。<strong>但融資的意義完全取決於股價的位置。</strong></p>
<div class="pro"><b>💡 融資大減+股價不跌＝最強底部訊號</b>這是最重要的籌碼底部訊號。融資大減代表大量散戶恐慌斷頭賣出（或主動認賠），但股價卻沒有繼續跌——代表有人（主力或機構）正在吸收所有的賣壓。這種「融資清洗」後的股票，往往在接下來幾週會出現大幅上漲。歷史統計：台股在融資使用率從高峰下降30%以上後，有超過75%的機率見底。</div>
<h3>融資斷頭的市場效應</h3>
<p>大跌時，融資維持率低於130%會被強制斷頭（強制賣出）。當市場恐慌，大量融資同時斷頭，會形成「斷頭潮」——股價加速下跌，創造超跌機會。<strong>斷頭潮結束後，往往是最好的短期買點</strong>，因為弱手已經被清洗完畢。</p>
<h3>融券（放空）的觀察</h3>
<p>融券增加代表散戶在放空，融券大增+股價橫盤，後續可能出現「軋空行情」——主力拉高，放空的人被迫回補，反而助長漲勢。台股每年都有幾次這樣的軋空行情，識別方法：融券使用率超過市值的2%，且股價沒有繼續跌。</p>`,

body:`<h3>什麼是分點資料？</h3>
<p>台股每天收盤後，會公布各券商分支機構（分點）的買賣明細。透過分析哪個券商持續在買或賣特定股票，可以推斷主力或法人的動向。<strong>這是台股獨有的透明度，是籌碼分析最直接的工具。</strong></p>
<div class="pro"><b>💡 追蹤主力的三步驟</b>
步驟1：找近30天內對某支股票集中買超最多的券商分點（通常1~3家佔買超的70%以上）。
步驟2：確認這些分點是否持續買入，買超量是否增加。
步驟3：當這些分點開始轉為賣超，這是出場訊號，比技術面訊號早2~5天。
這個方法在中小型股上效果最佳，因為主力規模相對大盤的比例較高，更容易留下足跡。</div>
<h3>主力「洗盤」的分點特徵</h3>
<p>主力在拉高前常常「洗盤」——故意讓股價下跌嚇走散戶，同時自己繼續買入。洗盤期間的分點特徵：當天整體市場賣超，但特定1~2家分點仍在買入或只是小幅賣出。這代表主力沒有真的要出貨，只是在震盪中收集更多籌碼。</p>
<h3>實際操作資源</h3>
<p>台灣可以透過「籌碼K線」App、「XQ全球贏家」、「MoneyDJ」等工具查詢分點資料。建議配合K線和量能一起看：分點集中買超（主力吸籌）+ 量縮底部（賣壓消化）= 最高確信度的買點。</p>`,
pts:['1~2家券商連續大量買超同一標的=主力吸籌，值得追蹤','主力分點由買轉賣是出場訊號，比技術面早2~5天','洗盤期間特定分點持續買入，代表主力不是真出貨','分點資料在中小型股最有效，大型股受外資干擾較多']}
];

const DONE_KEY='sc-done';
let done=new Set(JSON.parse(localStorage.getItem(DONE_KEY)||'[]'));
let cur=0;
function save(){localStorage.setItem(DONE_KEY,JSON.stringify([...done]))}
function updateProg(){
  const n=done.size,t=LESSONS.length;
  document.getElementById('pFill').style.width=(n/t*100)+'%';
  document.getElementById('pText').textContent=n+' / '+t+' 堂課完成';
}
function chOf(id){return CHAPTERS.find(c=>c.ids.includes(id))}
function prevOf(id){
  const ch=chOf(id),ci=CHAPTERS.indexOf(ch),li=ch.ids.indexOf(id);
  if(li>0)return ch.ids[li-1];
  if(ci>0)return CHAPTERS[ci-1].ids.slice(-1)[0];
  return null;
}
function nextOf(id){
  const ch=chOf(id),ci=CHAPTERS.indexOf(ch),li=ch.ids.indexOf(id);
  if(li<ch.ids.length-1)return ch.ids[li+1];
  if(ci<CHAPTERS.length-1)return CHAPTERS[ci+1].ids[0];
  return null;
}
function buildSidebar(){
  const el=document.getElementById('chList');
  el.innerHTML='';
  CHAPTERS.forEach(ch=>{
    const lbl=document.createElement('div');
    lbl.className='ch-label';lbl.textContent=ch.label;el.appendChild(lbl);
    ch.ids.forEach(id=>{
      const L=LESSONS[id];
      const div=document.createElement('div');
      div.className='ls-item'+(id===cur?' active':'')+(done.has(id)?' done':'');
      div.innerHTML=`<div class="ls-num">${L.num}</div><span>${L.title}</span><span class="ls-check">${done.has(id)?'&#10003;':''}</span>`;
      div.onclick=()=>{cur=id;render();closeSB()};
      el.appendChild(div);
    });
  });
}
function render(){
  const L=LESSONS[cur];
  const ch=chOf(cur);
  const prev=prevOf(cur),next=nextOf(cur);
  const isDone=done.has(cur);
  document.getElementById('lw').innerHTML=`
<div class="breadcrumb">台股完整課程<span class="bc-sep"> &#x203a; </span>${ch.label}<span class="bc-sep"> &#x203a; </span><span class="bc-cur">${L.title}</span></div>
<div class="lesson-header">
<div class="ch-badge">${ch.label}</div>
<div class="ls-title">${L.title}</div>
<div class="ls-sub">${L.sub}</div>
<div class="ls-meta-row">&#9201; ${L.rt}${isDone?' <span class="done-tag">&#10003; 已完成</span>':''}</div>
</div>
<div class="diag">${L.svg}<div class="diag-cap">${L.cap}</div></div>
<div class="body-card">${L.body}</div>
<div class="kp-box"><h4>本課重點</h4><ul>${L.pts.map(p=>`<li>${p}</li>`).join('')}</ul></div>
<div class="ls-footer">
<button class="btn btn-ghost${prev===null?' btn-dim':''}" onclick="go(${prev})">&#8592; 上一課</button>
<button class="btn ${isDone?'btn-undone':'btn-done'}" onclick="toggleDone()">${isDone?'&#8617; 標記未讀':'&#10003; 完成本課'}</button>
<button class="btn btn-primary${next===null?' btn-dim':''}" onclick="go(${next})">下一課 &#8594;</button>
</div>`;
  buildSidebar();updateProg();
  document.querySelector('.main').scrollTo(0,0);
}
function go(id){if(id!==null){cur=id;render()}}
function toggleDone(){if(done.has(cur))done.delete(cur);else done.add(cur);save();render()}
function openSB(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show')}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}
render();
</script>
