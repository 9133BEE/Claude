name: 每日台股財經簡報

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 台灣時間週一至週五 早上 9:00
  workflow_dispatch:        # 允許手動觸發測試

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 抓取財經新聞並推播 Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install requests feedparser --quiet
          python3 .github/workflows/send_news.py
