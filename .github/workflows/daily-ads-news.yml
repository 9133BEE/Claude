name: 每日廣告投放簡報

on:
  schedule:
    - cron: '30 1 * * *'   # 每天 09:30 台灣時間
  workflow_dispatch:        # 允許手動觸發測試

jobs:
  send-ads-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 安裝 Python 套件
        run: pip install requests feedparser --quiet

      - name: Groq AI 分析廣告業界新聞並推播 Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 .github/workflows/send_ads_news.py
